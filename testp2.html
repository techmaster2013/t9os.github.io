
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banana Pealed | Browser</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            /* --- BANANA PEALED COLOR PALETTE --- */
            --bg-dark: #0a0a0a;
            --bg-gradient: radial-gradient(circle at 50% 0%, #2a2200 0%, #0a0a0a 70%);
            
            --glass-surface: rgba(20, 20, 20, 0.6);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 195, 0, 0.15); /* Subtle Yellow Border */
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            
            --accent-primary: #FFC300; /* Banana Yellow */
            --accent-glow: rgba(255, 195, 0, 0.3);
            --accent-hover: #e6b000;
            
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            
            --danger: #ff4d4d;
            --success: #00e676;

            /* --- ANIMATION (Optimized) --- */
            --ease-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
            --blur-amount: 12px; /* Reduced for better performance */
        }

        /* --- INCOGNITO THEME OVERRIDES --- */
        body.incognito-mode {
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a0000 0%, #050505 70%);
            --accent-primary: #ff3333; 
            --glass-border: rgba(255, 50, 50, 0.2);
            --accent-glow: rgba(255, 51, 51, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "Outfit", sans-serif;
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            transition: background 0.8s var(--ease-smooth);
        }

        /* --- START PAGE --- */
        #start-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12vh;
            z-index: 10;
            transition: 0.5s var(--ease-smooth);
        }

        body.browser-active #start-page {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-40px) scale(0.98);
        }

        /* Animations */
        .animate-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s var(--ease-elastic) forwards;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Clock */
        .clock-container {
            text-align: center;
            margin-bottom: 50px;
        }
        .clock-time {
            font-family: "Space Grotesk", sans-serif;
            font-size: 8rem;
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -4px;
            color: var(--text-main);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }
        .clock-date {
            font-size: 1.2rem;
            color: var(--accent-primary);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 15px;
            font-weight: 500;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        /* Search Bar */
        .search-container {
            position: relative;
            width: 700px;
            max-width: 90%;
            z-index: 100;
        }
        .search-pill {
            width: 100%;
            height: 68px;
            background: var(--glass-surface);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--glass-border);
            border-radius: 34px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s var(--ease-smooth);
        }
        .search-pill:focus-within {
            transform: translateY(-3px);
            border-color: var(--accent-primary);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px var(--accent-glow);
            background: rgba(30, 30, 30, 0.8);
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.3rem;
            margin-left: 15px;
            font-family: "Outfit", sans-serif;
            font-weight: 300;
        }
        .search-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        /* App Grid */
        .app-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            margin-top: 70px;
            max-width: 900px;
        }
        .app-shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s var(--ease-elastic);
            opacity: 0.85;
        }
        .app-shortcut:hover {
            opacity: 1;
            transform: translateY(-8px) scale(1.05);
        }
        .app-shortcut:hover .app-icon-box {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 30px var(--accent-glow);
            color: var(--accent-primary);
        }
        .app-icon-box {
            width: 70px;
            height: 70px;
            background: var(--glass-surface);
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: var(--text-main);
            transition: all 0.3s var(--ease-smooth);
        }
        .app-label {
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Bookmarks */
        .bookmarks-section {
            width: 100%;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .section-title {
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* --- BROWSER UI --- */
        #browser-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
            transition: 0.4s var(--ease-smooth);
            background: var(--bg-dark);
        }
        body.browser-active #browser-ui {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        
        /* Topbar & Tabs */
        .browser-topbar {
            height: 50px;
            background: #111;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
        }
        .brand {
            font-family: "Space Grotesk", sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: white;
            cursor: pointer;
        }
        .brand span { color: var(--accent-primary); }
        
        .tabs-strip {
            flex: 1;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 5px 0;
        }
        .tabs-strip::-webkit-scrollbar { height: 4px; }
        .tabs-strip::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .tab {
            max-width: 220px;
            min-width: 140px;
            height: 36px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-sub);
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .tab:hover { background: rgba(255, 255, 255, 0.08); }
        .tab.active {
            background: #222;
            color: var(--accent-primary);
            border: 1px solid var(--glass-border);
        }
        .tab-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .tab-close { margin-left: auto; padding: 4px; border-radius: 4px; opacity: 0; transition: 0.2s; }
        .tab:hover .tab-close { opacity: 0.7; }
        .tab-close:hover { background: var(--danger); color: white; opacity: 1 !important; }

        /* Address Bar */
        .address-bar-container {
            height: 54px;
            background: #181818;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            gap: 15px;
        }
        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }

        .url-display {
            flex: 1;
            background: #0a0a0a;
            height: 38px;
            border-radius: 19px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            color: var(--text-sub);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .url-display:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .url-input {
            background: transparent; border: none; width: 100%; color: white; height: 100%; font-family: "Outfit"; font-size: 0.95rem;
        }
        
        .bookmark-btn { color: var(--text-sub); cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .bookmark-btn:hover { color: var(--accent-primary); transform: scale(1.1); }
        .bookmark-btn.active { color: var(--accent-primary); animation: pop 0.3s var(--ease-elastic); }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        /* Iframe Area */
        #content-area { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #fff; }
        iframe.active { display: block; }

        /* Settings Menus */
        .settings-menu {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 260px;
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 8px;
            z-index: 1000;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transform-origin: top right;
        }
        .settings-menu.open {
            display: block;
            animation: menuPop 0.2s var(--ease-smooth);
        }
        .menu-item {
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: white; }

        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Toasts */
        #toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: #111; border: 1px solid var(--glass-border); color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 0.95rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s var(--ease-elastic);
            border-left: 4px solid var(--accent-primary);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Resume Button */
        .resume-btn {
            position: absolute; top: 30px; right: 40px;
            padding: 10px 24px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; font-weight: 500; cursor: pointer; display: none; align-items: center; gap: 10px;
            transition: 0.3s;
        }
        .resume-btn:hover { background: var(--accent-primary); color: black; border-color: var(--accent-primary); }
        .resume-btn.visible { display: flex; animation: fadeInUp 0.5s; }

    </style>
</head>
<body>

    <!-- START PAGE -->
    <div id="start-page">
        
        <div class="resume-btn" id="resume-btn" onclick="resumeSession()">
            <i class="ph ph-arrows-in-simple"></i>
            <span>Resume Session</span>
        </div>

        <div class="clock-container animate-in">
            <div class="clock-time" id="clock-time">00:00</div>
            <div class="clock-date" id="clock-date">LOADING SYSTEM</div>
        </div>

        <div class="search-container animate-in delay-1">
            <div class="search-pill">
                <i class="ph ph-magnifying-glass" style="font-size: 1.5rem; color: var(--accent-primary)"></i>
                <input type="text" class="search-input" id="home-search" placeholder="Search the web or enter URL..." autocomplete="off" />
            </div>
        </div>

        <div class="app-grid animate-in delay-2" id="app-grid"></div>

        <div class="bookmarks-section animate-in delay-3" id="bookmarks-section">
            <div class="section-title">Saved Destinations</div>
        </div>
    </div>

    <!-- BROWSER UI -->
    <div id="browser-ui">
        <div class="browser-topbar">
            <div class="brand" onclick="goHome()">
                BANANA <span>PEALED</span>
            </div>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
            
            <div class="tabs-strip" id="tabs-strip"></div>
            
            <div class="nav-btn" onclick="createNewTab()" title="New Tab">
                <i class="ph ph-plus" style="font-weight: bold"></i>
            </div>
            <div class="nav-btn" id="menu-btn" onclick="toggleMenu('settings-menu', event)" title="Menu">
                <i class="ph ph-list" style="font-weight: bold"></i>
            </div>
        </div>

        <div class="address-bar-container">
            <div style="display: flex; gap: 4px">
                <div class="nav-btn" onclick="history.back()"><i class="ph ph-arrow-left"></i></div>
                <div class="nav-btn" onclick="history.forward()"><i class="ph ph-arrow-right"></i></div>
                <div class="nav-btn" onclick="reloadTab()"><i class="ph ph-arrow-clockwise"></i></div>
            </div>

            <div class="url-display">
                <i class="ph ph-lock-key" style="margin-right: 12px; color: var(--accent-primary); font-size: 1rem;"></i>
                <input type="text" class="url-input" id="address-input" autocomplete="off" />
                <i class="ph ph-star bookmark-btn" id="bookmark-icon" onclick="toggleBookmark()" title="Bookmark"></i>
            </div>

            <div class="nav-btn" id="incognito-toggle" onclick="toggleIncognito()" title="Toggle Incognito">
                <i class="ph ph-sunglasses"></i>
            </div>
        </div>

        <div id="content-area"></div>
    </div>

    <!-- MENUS -->
    <div class="settings-menu" id="settings-menu">
        <div class="menu-item" onclick="goHome(); closeMenus()">
            <i class="ph ph-house"></i> Minimize Browser
        </div>
        <div class="menu-item" onclick="toggleIncognito(); closeMenus()">
            <i class="ph ph-user-secret"></i> Toggle Incognito
        </div>
        <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 6px 0;"></div>
        <div class="menu-item" onclick="toggleMenu('search-engine-menu', event)">
            <i class="ph ph-globe"></i> Change Search Engine
        </div>
        <div style="height: 1px; background: rgba(255, 255, 255, 0.1); margin: 6px 0;"></div>
        <div class="menu-item" style="color: var(--danger)" onclick="closeAllTabs(); closeMenus()">
            <i class="ph ph-trash"></i> Clear Session
        </div>
    </div>

    <div class="settings-menu" id="search-engine-menu">
        <div class="section-title" style="margin-top:5px">Select Engine</div>
        <div class="menu-item" onclick="setSearchEngine('google'); closeMenus()">
            <i class="ph ph-google-logo"></i> Google
        </div>
        <div class="menu-item" onclick="setSearchEngine('duckduckgo'); closeMenus()">
            <i class="ph ph-duck"></i> DuckDuckGo
        </div>
        <div class="menu-item" onclick="setSearchEngine('bing'); closeMenus()">
            <i class="ph ph-microsoft"></i> Bing
        </div>
        <div class="menu-item" onclick="setSearchEngine('yahoo'); closeMenus()">
            <i class="ph ph-yin-yang"></i> Yahoo
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // --- CORE DATA ---
        let normalTabs = [];
        let incognitoTabs = [];
        let isIncognito = false;
        let activeTabId = null;
        let tabCounter = 0;
        
        let bookmarks = JSON.parse(localStorage.getItem("banana_bookmarks") || "[]");
        let currentSearchEngine = localStorage.getItem("banana_engine") || "google";

        const defaultApps = [
            { name: "Google", icon: "ph-google-logo", url: "https://google.com" },
            { name: "DuckDuckGo", icon: "ph-duck", url: "https://duckduckgo.com" },
            { name: "YouTube", icon: "ph-youtube-logo", url: "https://youtube.com" },
            { name: "GitHub", icon: "ph-github-logo", url: "https://github.com" },
            { name: "Spotify", icon: "ph-spotify-logo", url: "https://open.spotify.com" },
            { name: "Reddit", icon: "ph-reddit-logo", url: "https://reddit.com" },
        ];

        // --- INIT ---
        window.onload = () => {
            renderApps();
            renderBookmarks();
            updateClock();
            setInterval(updateClock, 1000);
            loadSession();
            updateSearchPlaceholder();
        };

        // --- SEARCH ENGINE ---
        function setSearchEngine(engine) {
            currentSearchEngine = engine;
            localStorage.setItem("banana_engine", engine);
            updateSearchPlaceholder();
            showToast(`Search engine changed to ${engine.charAt(0).toUpperCase() + engine.slice(1)}`);
        }

        function updateSearchPlaceholder() {
            const names = { 'google': 'Google', 'duckduckgo': 'DuckDuckGo', 'bing': 'Bing', 'yahoo': 'Yahoo' };
            document.getElementById('home-search').placeholder = `Search ${names[currentSearchEngine]} or enter URL...`;
        }

        function getSearchUrl(query) {
            if (!query) return `https://www.${currentSearchEngine}.com`;
            const engines = {
                'google': `https://www.google.com/search?q=${encodeURIComponent(query)}`,
                'duckduckgo': `https://duckduckgo.com/?q=${encodeURIComponent(query)}`,
                'bing': `https://www.bing.com/search?q=${encodeURIComponent(query)}`,
                'yahoo': `https://search.yahoo.com/search?p=${encodeURIComponent(query)}`
            };
            return engines[currentSearchEngine] || engines.google;
        }

        // --- CLOCK ---
        function updateClock() {
            const now = new Date();
            document.getElementById("clock-time").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            document.getElementById("clock-date").textContent = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
        }

        // --- SESSION LOGIC ---
        function saveSession() {
            if (isIncognito) return;
            localStorage.setItem("banana_tabs", JSON.stringify(normalTabs));
            localStorage.setItem("banana_active", activeTabId);
        }

        function loadSession() {
            const savedTabs = JSON.parse(localStorage.getItem("banana_tabs") || "[]");
            const savedActiveId = localStorage.getItem("banana_active");
            if (savedTabs.length > 0) {
                normalTabs = savedTabs;
                savedTabs.forEach((t) => {
                    const num = parseInt(t.id.replace("tab-", ""));
                    if (num > tabCounter) tabCounter = num;
                    addTabToStrip(t.id, t.title || new URL(t.url).hostname);
                    createIframe(t.id, t.url);
                });
                if (savedActiveId && normalTabs.some((t) => t.id === savedActiveId)) {
                    switchTab(savedActiveId);
                } else {
                    switchTab(normalTabs[normalTabs.length - 1].id);
                }
                updateResumeButton();
            }
        }

        function updateResumeButton() {
            const btn = document.getElementById("resume-btn");
            const currentTabs = isIncognito ? incognitoTabs : normalTabs;
            if (currentTabs.length > 0) {
                btn.classList.add("visible");
            } else {
                btn.classList.remove("visible");
            }
        }

        // --- TABS ---
        function createNewTab(url = getSearchUrl("")) {
            tabCounter++;
            const id = `tab-${tabCounter}`;
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            
            tabs.push({ id, url, title: "New Tab" });
            addTabToStrip(id, "New Tab");
            createIframe(id, url);
            switchTab(id);
            if (!isIncognito) saveSession();
        }

        function addTabToStrip(id, title) {
            const tab = document.createElement("div");
            tab.className = "tab";
            tab.id = `tab-ui-${id}`;
            tab.innerHTML = `<span class="tab-text">${title}</span><i class="ph ph-x tab-close"></i>`;
            
            tab.addEventListener("click", (e) => {
                if (e.target.classList.contains("tab-close")) closeTab(id, e);
                else switchTab(id);
            });
            document.getElementById("tabs-strip").appendChild(tab);
            tab.scrollIntoView({ behavior: "smooth" });
        }

        function createIframe(id, url) {
            const iframe = document.createElement("iframe");
            iframe.id = `frame-${id}`;
            // Simple embed logic - for a real browser you need a proxy.
            iframe.src = `/embed.html?url=${encodeURIComponent(url)}`; 
            // Fallback if embed.html doesn't exist to show it tries to load
            iframe.onerror = () => iframe.src = url; 

            iframe.onload = () => {
                try {
                    const domain = new URL(url).hostname.replace("www.", "");
                    document.querySelector(`#tab-ui-${id} .tab-text`).innerText = domain;
                    const tabs = isIncognito ? incognitoTabs : normalTabs;
                    const tab = tabs.find(t => t.id === id);
                    if (tab) { tab.title = domain; if (!isIncognito) saveSession(); }
                } catch(e) {}
            };
            document.getElementById("content-area").appendChild(iframe);
        }

        function switchTab(id) {
            activeTabId = id;
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const tabData = tabs.find((t) => t.id === id);

            document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
            const activeUi = document.getElementById(`tab-ui-${id}`);
            if (activeUi) activeUi.classList.add("active");

            document.querySelectorAll("iframe").forEach((f) => f.classList.remove("active"));
            const activeFrame = document.getElementById(`frame-${id}`);
            if (activeFrame) activeFrame.classList.add("active");

            if (tabData) {
                document.getElementById("address-input").value = tabData.url;
                checkBookmarkStatus(tabData.url);
            }
            if (!isIncognito) saveSession();
        }

        function closeTab(id, e) {
            e.stopPropagation();
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const idx = tabs.findIndex((t) => t.id === id);
            
            if (idx > -1) {
                tabs.splice(idx, 1);
                document.getElementById(`tab-ui-${id}`).remove();
                document.getElementById(`frame-${id}`).remove();
                if (tabs.length === 0) goHome();
                else switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
            }
            if (!isIncognito) saveSession();
        }

        function closeAllTabs() {
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            tabs.length = 0;
            document.getElementById("tabs-strip").innerHTML = "";
            document.getElementById("content-area").innerHTML = "";
            showToast("Session Cleared");
            goHome();
            if (!isIncognito) saveSession();
        }

        // --- NAVIGATION ---
        function openBrowser(url) {
            document.body.classList.add("browser-active");
            createNewTab(url);
        }

        function resumeSession() {
            document.body.classList.add("browser-active");
        }

        function goHome() {
            document.body.classList.remove("browser-active");
            updateResumeButton();
        }

        function reloadTab() {
            const f = document.getElementById(`frame-${activeTabId}`);
            if (f) {
                showToast("Reloading...");
                const temp = f.src;
                f.src = '';
                setTimeout(() => f.src = temp, 100);
            }
        }

        function toggleIncognito() {
            document.getElementById("tabs-strip").innerHTML = "";
            document.getElementById("content-area").innerHTML = "";
            isIncognito = !isIncognito;
            document.body.classList.toggle("incognito-mode");

            const btn = document.getElementById("incognito-toggle");
            btn.style.color = isIncognito ? "var(--accent-primary)" : "inherit";

            showToast(isIncognito ? "Incognito Mode Active" : "Standard Mode Active");

            const targetTabs = isIncognito ? incognitoTabs : normalTabs;
            if (targetTabs.length > 0) {
                targetTabs.forEach((t) => {
                    addTabToStrip(t.id, t.title || "Loaded");
                    createIframe(t.id, t.url);
                });
                switchTab(targetTabs[targetTabs.length - 1].id);
            } else {
                if (document.body.classList.contains("browser-active")) createNewTab();
            }
            updateResumeButton();
        }

        function handleSearch(val) {
            if (!val) return;
            let url = val;
            if (url.includes('.') && !url.includes(' ')) {
                if (!url.startsWith('http')) url = 'https://' + url;
            } else {
                url = getSearchUrl(val);
            }

            if (document.body.classList.contains("browser-active")) {
                const tabs = isIncognito ? incognitoTabs : normalTabs;
                const tab = tabs.find((t) => t.id === activeTabId);
                if (tab) {
                    tab.url = url;
                    // Replace toEmbedUrl logic with direct assignment for demo
                    document.getElementById(`frame-${activeTabId}`).src = `/embed.html?url=${encodeURIComponent(url)}`;
                    document.getElementById("address-input").value = url;
                    document.querySelector(`#tab-ui-${activeTabId} .tab-text`).innerText = "Loading...";
                    if (!isIncognito) saveSession();
                    checkBookmarkStatus(url);
                }
            } else {
                openBrowser(url);
            }
        }

        // Search Input Listeners
        document.getElementById("home-search").addEventListener("keypress", (e) => {
            if (e.key === "Enter") { handleSearch(e.target.value); e.target.value = ""; }
        });
        document.getElementById("address-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") { handleSearch(e.target.value); document.getElementById("address-input").blur(); }
        });
        document.getElementById("address-input").addEventListener("focus", function() { this.select(); });

        // --- BOOKMARKS ---
        function toggleBookmark() {
            const tabs = isIncognito ? incognitoTabs : normalTabs;
            const tab = tabs.find((t) => t.id === activeTabId);
            if (!tab) return;

            const idx = bookmarks.findIndex((b) => b.url === tab.url);
            const icon = document.getElementById("bookmark-icon");

            icon.classList.remove("active");
            void icon.offsetWidth; // trigger reflow

            if (idx > -1) {
                bookmarks.splice(idx, 1);
                icon.classList.replace("ph-star-fill", "ph-star");
                showToast("Bookmark Removed");
            } else {
                let defaultName = new URL(tab.url).hostname.replace("www.", "");
                const name = prompt("Bookmark Name:", defaultName);
                if (name) {
                    bookmarks.push({ title: name, url: tab.url });
                    icon.classList.replace("ph-star", "ph-star-fill");
                    icon.classList.add("active");
                    showToast("Bookmark Added");
                }
            }
            localStorage.setItem("banana_bookmarks", JSON.stringify(bookmarks));
            renderBookmarks();
        }

        function checkBookmarkStatus(url) {
            const isBookmarked = bookmarks.some((b) => b.url === url);
            const icon = document.getElementById("bookmark-icon");
            if (isBookmarked) {
                icon.classList.replace("ph-star", "ph-star-fill");
                icon.classList.add("active");
            } else {
                icon.classList.replace("ph-star-fill", "ph-star");
                icon.classList.remove("active");
            }
        }

        function renderBookmarks() {
            const section = document.getElementById("bookmarks-section");
            section.innerHTML = `<div class="section-title">Saved Destinations</div>`;
            
            if (bookmarks.length === 0) {
                section.style.display = "none";
                return;
            }
            section.style.display = "flex";

            bookmarks.forEach((bm) => {
                const el = document.createElement("div");
                el.className = "app-shortcut";
                el.innerHTML = `
                    <div class="app-icon-box" style="border-radius:50%; width:50px; height:50px; font-size:22px; border-color: var(--accent-primary);">
                        <i class="ph ph-star-fill"></i>
                    </div>
                    <div class="app-label">${bm.title}</div>
                `;
                el.onclick = () => openBrowser(bm.url);
                el.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (confirm(`Delete bookmark "${bm.title}"?`)) {
                        bookmarks = bookmarks.filter((b) => b.url !== bm.url);
                        localStorage.setItem("banana_bookmarks", JSON.stringify(bookmarks));
                        renderBookmarks();
                        if (activeTabId) checkBookmarkStatus(document.getElementById("address-input").value);
                    }
                };
                section.appendChild(el);
            });
        }

        function renderApps() {
            const grid = document.getElementById("app-grid");
            grid.innerHTML = "";
            defaultApps.forEach((app) => {
                const el = document.createElement("div");
                el.className = "app-shortcut";
                el.innerHTML = `
                    <div class="app-icon-box"><i class="ph ${app.icon}"></i></div>
                    <div class="app-label">${app.name}</div>
                `;
                el.onclick = () => openBrowser(app.url);
                grid.appendChild(el);
            });
        }

        // --- UTILS ---
        function toggleMenu(menuId, event) {
            event.stopPropagation();
            closeMenus();
            document.getElementById(menuId).classList.toggle("open");
        }

        function closeMenus() {
            document.querySelectorAll(".settings-menu").forEach(m => m.classList.remove("open"));
        }

        document.addEventListener("click", () => closeMenus());

        function showToast(msg) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateY(10px)";
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }
    </script>
</body>
</html>
