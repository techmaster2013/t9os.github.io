        /* ── Modal overlay ── */
        #cheat-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
            opacity: 0; transition: opacity 0.15s ease;
            padding: 16px;
        }
        #cheat-modal-overlay.visible { opacity: 1; }

        #cheat-modal {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 12px 40px #0004;
            width: 100%; max-width: 520px; max-height: 80vh;
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(8px); transition: transform 0.15s ease;
        }
        #cheat-modal-overlay.visible #cheat-modal { transform: translateY(0); }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 2px solid #f0f0f0; flex-shrink: 0;
        }
        .modal-title { font-family: 'Titan One', sans-serif; font-size: 20px; color: #1a1a2e; }
        .modal-close {
            background: #f0f0f0; border: none; border-radius: 8px;
            width: 32px; height: 32px; font-size: 14px; cursor: pointer;
            color: #666; display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: #e0e0e0; }

        .modal-body {
            padding: 16px 20px 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }

        .modal-input {
            width: 100%; height: 46px;
            border: 2px solid #e8e8e8; border-radius: 12px;
            padding: 0 14px; font-size: 16px; font-weight: 700;
            font-family: Nunito, sans-serif; outline: none; background: #fafafa;
            transition: border-color 0.15s; box-sizing: border-box;
        }
        .modal-input:focus { border-color: #ffb300; background: #fff; }

        .modal-confirm-btn {
            width: 100%; height: 46px;
            background: #ffb300; border: none; border-radius: 12px;
            box-shadow: 0 4px 0 #c98a00;
            font-family: 'Titan One', sans-serif; font-size: 18px; color: #fff; cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .modal-confirm-btn:hover  { transform: translateY(-1px); box-shadow: 0 5px 0 #c98a00; }
        .modal-confirm-btn:active { transform: translateY(2px);  box-shadow: 0 2px 0 #c98a00; }

        .modal-amount-row {
            display: flex; gap: 8px; align-items: center;
            padding-top: 8px; border-top: 2px solid #f0f0f0;
        }
        .modal-amount-row .modal-input { flex: 1; }
        .modal-amount-row .modal-confirm-btn { width: auto; padding: 0 20px; flex-shrink: 0; }

        .modal-player-list { display: flex; flex-direction: column; gap: 4px; }
        .modal-player-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 12px; cursor: pointer;
            border: 2px solid transparent; transition: background 0.1s, border-color 0.1s;
        }
        .modal-player-row:hover  { background: #fff8e6; border-color: #ffb300; }
        .modal-player-row.selected { background: #fff8e6; border-color: #ffb300; }
        .modal-player-img { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
        .modal-player-name { font-size: 15px; font-weight: 800; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .modal-player-val  { font-size: 14px; font-weight: 800; color: #ffb300; white-space: nowrap; }

        .modal-blook-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(76px, 1fr));
            gap: 6px; max-height: 400px; overflow-y: auto;
        }
        .modal-blook-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 4px; border-radius: 12px; cursor: pointer;
            border: 2px solid transparent; background: #f7f7f7;
            transition: background 0.1s, border-color 0.1s;
        }
        .modal-blook-item:hover { background: #fff8e6; border-color: #ffb300; }
        .modal-blook-item img  { width: 48px; height: 48px; object-fit: contain; }
        .modal-blook-item span { font-size: 10px; font-weight: 700; color: #555; text-align: center; line-height: 1.2; word-break: break-word; }

        /* ── Cheat panel ── */
        #cheat-panel {
            position: fixed; top: 55px; right: -420px; width: 380px;
            height: calc(100% - 55px); background: #fff; z-index: 9999;
            box-shadow: -4px 0 24px rgba(0,0,0,0.18);
            transition: right 0.3s cubic-bezier(.39,.5,.15,1.36);
            display: flex; flex-direction: column; overflow: hidden;
        }
        #cheat-panel.open { right: 0; }
        #cheat-panel-header {
            background: #8b3a8e; padding: 16px 20px 20px;
            box-shadow: 0 -6px rgba(0,0,0,0.2) inset;
            display: flex; align-items: center; justify-content: space-between;
        }
        #cheat-panel-header h2 {
            font-family: 'Titan One', sans-serif; font-size: 22px; color: white;
            margin: 0; text-shadow: 0 2px rgba(0,0,0,0.2);
        }
        #cheat-panel-close {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #cheat-panel-close:hover { background: rgba(255,255,255,0.35); }
        #cheat-panel-body { flex: 1; overflow-y: auto; padding: 16px; }

        .cheat-section-title {
            font-family: Nunito, sans-serif; font-size: 11px; font-weight: 800;
            color: #aaa; text-transform: uppercase; letter-spacing: 1px;
            margin: 16px 0 8px; padding: 0 4px;
        }
        .cheat-section-title:first-child { margin-top: 4px; }

        #cheat-items-game, #cheat-items-global, #cheat-items-questions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 4px;
        }

        .cheat-item {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 8px;
            border-radius: 14px; cursor: pointer;
            transition: filter 0.1s, transform 0.1s, box-shadow 0.1s;
            font-family: Nunito, sans-serif; font-size: 14px; font-weight: 800;
            margin-bottom: 0; width: 100%; box-sizing: border-box;
            box-shadow: 0 5px 0 #1a5acc; background: #3378ff;
            color: white; border: none; text-align: center;
            line-height: 1.2; min-height: 52px;
        }
        .cheat-item:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 7px 0 #1a5acc; }
        .cheat-item:active { transform: translateY(4px); box-shadow: 0 1px 0 #1a5acc; }

        #cheat-panel-hint {
            padding: 12px 16px; text-align: center;
            font-family: Nunito, sans-serif; font-size: 12px; color: #bbb;
            border-top: 1px solid #f0f0f0;
        }

        /* ── Error toast ── */
        .errorBar {
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: #e84135; color: #fff; padding: 12px 24px;
            border-radius: 12px; font-size: 16px; font-weight: 700;
            box-shadow: 0 6px 20px #0003; z-index: 9999;
            transition: bottom 0.2s ease; white-space: nowrap; pointer-events: none;
            font-family: Nunito, sans-serif;
        }
        .errorBar.show { bottom: 24px; }

        #status, #cheat-menu { display: none !important; }
    </style>
</head>

function coerceValue(val) {
	if (typeof val === "number") return val;
	if (typeof val === "string") {
		if (val.trim() === "") return val;
		const n = Number(val);
		if (Number.isFinite(n)) return n;
	}
	return val;
}

function joinGame(code, name, icog) {
	if (!canJoin) { errorBar("Stop spamming the button!"); return; }
	canJoin = false;
	if (botinfo.connecting) { errorBar("Already connecting..."); canJoin = true; return; }
	oname = name;
	connect(code, name, icog);
	setTimeout(() => { canJoin = true; }, 3000);
}

function onFirstData(d) {
	var gm = d.s?.t || "Unknown";
	if (gm === "Rush" && d.s?.m === "Teams") gm = "Rush (teams)";
	window.currentGameMode = gm;
	console.log("Game type: " + gm);

	// If still in pregame lobby or instructions screen, show waiting UI
	if (d.stg === "waiting" || d.stg === "instructions") {
		showWaitingScreen(d.stg);
		return;
	}

	// Fetch questions using question set ID from Firebase
	const questionSetId = d.set || d.s?.set || d.s?.qs;
	if (questionSetId) {
		fetchQuestions(questionSetId);
	} else {
		renderCheats(gm);
	}
}

function showWaitingScreen(stg) {
	const joinForm = document.getElementById('join-form');
	if (joinForm) joinForm.style.display = 'none';
	const nickForm = document.getElementById('nickname-form');
	if (nickForm) nickForm.style.display = 'none';
	const bg = document.querySelector('._background_l90pt_1');
	if (bg) bg.style.display = 'none';

	let existing = document.getElementById('waiting-screen');
	if (existing) existing.remove();

	const ws = document.createElement('div');
	ws.id = 'waiting-screen';

async function fetchQuestions(setId) {
	try {
		const response = await fetch(`${JOIN_URL}?q=${setId}`);
		if (!response.ok) { renderCheats(window.currentGameMode); return; }
		const data = await response.json();
		if (data.questions && Array.isArray(data.questions)) {
			window.gameQuestions = data.questions;
			window.currentQuestionIndex = 0;
			console.log(`? Loaded ${data.questions.length} questions`);
			renderCheats(window.currentGameMode);
			startQuestionGame();
		} else {
			renderCheats(window.currentGameMode);
		}
	} catch (e) {
		console.error("? fetchQuestions error:", e);
		renderCheats(window.currentGameMode);
	}
}

// Convert common math notation to readable Unicode
function parseMath(text) {
	if (!text) return '';
	return String(text)
		// degree: 180\degree or 180° or *180\degree*
		.replace(/\*?\\degree\*?/g, '°')
		// fractions: \frac{a}{b} → a/b
		.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, '$1/$2')
		// square root: \sqrt{x} → √x
		.replace(/\\sqrt\{([^}]+)\}/g, '√$1')
		// superscript: x^{2} or x^2 → x²  (handles 0-9)
		.replace(/\^{?([0-9]+)}?/g, (_, n) => n.split('').map(d => '⁰¹²³⁴⁵⁶⁷⁸⁹'[d]).join(''))
		// subscript: x_{2} → x₂
		.replace(/_{([0-9]+)}/g, (_, n) => n.split('').map(d => '₀₁₂₃₄₅₆₇₈₉'[d]).join(''))
		// pi
		.replace(/\\pi/g, 'π')
		// times
		.replace(/\\times/g, '×')
		// div
		.replace(/\\div/g, '÷')
		// leq / geq
		.replace(/\\leq/g, '≤')
		.replace(/\\geq/g, '≥')
		// neq
		.replace(/\\neq/g, '≠')
		// plus-minus
		.replace(/\\pm/g, '±')
		// strip remaining backslash commands
		.replace(/\\[a-zA-Z]+/g, '')
		// strip leftover braces
		.replace(/[{}]/g, '')
		// strip asterisk bold markers
		.replace(/\*/g, '');
}

function displayQuestion(index) {
	const gc = document.getElementById('game-container');
	if (!gc) return;
	if (!window.gameQuestions || index >= window.gameQuestions.length) {
		gc.remove(); return;
	}

	const q = window.gameQuestions[index];
	const questionText  = q.question || q.text || '';
	const answers       = q.answers || [];
	const correctAnswer = (q.correctAnswers && q.correctAnswers[0]) || q.correctAnswer || '';

	const colorClasses = ['answer-orange','answer-blue','answer-green','answer-red'];

	gc.innerHTML = '';
	gc.className = '';

	// Question area
	const qPage = document.createElement('div');
	qPage.className = 'page active bg-light';
	qPage.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;';

	const qWrap = document.createElement('div');
	qWrap.className = 'question-container';

	// Optional image
	const rawImg = q.image || q.img || null;
	let qImage = null;
	if (rawImg) {
		qImage = typeof rawImg === 'string' && rawImg.startsWith('http') ? rawImg
			: (rawImg.url || rawImg.src || rawImg.uri || null);
	}
	if (qImage) {
		const imgEl = document.createElement('img');
		imgEl.src = qImage;
		imgEl.style.cssText = 'max-height:100%;max-width:30%;object-fit:contain;border-radius:5px;cursor:pointer;margin-right:20px;';
		imgEl.onclick = () => {
			const zoom = document.createElement('div');
			zoom.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
			zoom.innerHTML = `<img src="${qImage}" style="max-width:90%;max-height:90%;object-fit:contain;border-radius:8px;">`;
			zoom.onclick = () => zoom.remove();
			document.body.appendChild(zoom);
		};
		qWrap.appendChild(imgEl);
	}

	const qText = document.createElement('div');
	qText.className = 'question-text';
	qText.textContent = parseMath(questionText);
	qWrap.appendChild(qText);
	qPage.appendChild(qWrap);

	// Answers — split into rows of 2
	const aWrap = document.createElement('div');
	aWrap.className = 'answers-container';

	for (let i = 0; i < answers.length; i += 2) {
		const row = document.createElement('div');
		row.className = 'answer-row';
		[answers[i], answers[i+1]].forEach((ans, j) => {
			if (ans === undefined) return;
			const idx = i + j;
			const isCorrect = ans === correctAnswer;
			const box = document.createElement('div');
			box.className = `answer-box ${colorClasses[idx % colorClasses.length]}`;
			box.dataset.correct = isCorrect;
			box.innerHTML = `<span>${parseMath(ans)}</span>`;
			box.onclick = () => handleAnswerClick(box, isCorrect);
			row.appendChild(box);
		});
		aWrap.appendChild(row);
	}

	qPage.appendChild(aWrap);
	gc.appendChild(qPage);
}

function handleAnswerClick(box, isCorrect) {
	document.querySelectorAll('.answer-box').forEach(b => b.style.pointerEvents = 'none');

	if (isCorrect) {
		box.style.filter = 'brightness(1.3)';
		if (window.currentGameMode === 'Gold') {
			setTimeout(showCorrectScreen, 700);
		} else {
			setTimeout(showCorrectScreen, 700);
		}
	} else {
		box.style.filter = 'brightness(0.6)';
		let correctText = '';
		document.querySelectorAll('.answer-box').forEach(b => {
			if (b.dataset.correct === 'true') {
				b.style.filter = 'brightness(1.3)';
				correctText = b.querySelector('span')?.textContent || '';
			}
		});
		setTimeout(() => showIncorrectScreen(correctText), 700);
	}
}

function onData(d) {
	if (!d) {
		console.log("Game disconnected!");
		errorBar("Game crashed!");
		leaveGame();
		finishG();
		return;
	}
	procData(d);

	// Detect game start: was waiting/instructions, now moved to active game
	if (window._waitingForStart) {
		const prevStg = gameobject?.stg;
		const newStg  = d?.stg;
		const wasWaiting = prevStg === "waiting" || prevStg === "instructions";
		const nowActive  = newStg !== "waiting" && newStg !== "instructions" && newStg !== "fin";

		// Also handle: instructions → waiting (host went back) — update the screen text
		if (prevStg === "waiting" && newStg === "instructions") {
			const ws = document.getElementById('waiting-screen');
			if (ws) {
				const title = ws.querySelector('div');
				if (title) title.textContent = 'Look at Host';
				const sub = ws.querySelectorAll('div')[1];
				if (sub) sub.textContent = 'Host is showing instructions...';
			}
		}

		if (wasWaiting && nowActive) {
			window._waitingForStart = false;
			const ws = document.getElementById('waiting-screen');
			if (ws) ws.remove();
			// Now kick off the game
			const questionSetId = d.set || d.s?.set || d.s?.qs;
			if (questionSetId) {
				fetchQuestions(questionSetId);
			} else {
				renderCheats(window.currentGameMode);
			}
		}
	}

	if (gameobject.c?.[botinfo.name]) {
		if (gameobject.c[botinfo.name].tat && !d.c[botinfo.name]?.tat) {
			errorBar("Attack complete!");
		}
	}
	if (d.stg === "fin" && botinfo.connected) {
		botinfo.connected = false;
		leaveGame();
		finishG();
		return;
	}
}

function procData(data) {
	// Sync gold display from live Firebase data
	if (data?.c?.[botinfo.name]) {
		const p = data.c[botinfo.name];
		const val = p.g ?? p.cr ?? p.d ?? p.xp ?? p.ca ?? p.t ?? p.w ?? p.f ?? null;
		if (val !== null) {
			const el = document.getElementById('gold-count');
			if (el) el.textContent = Number(val).toLocaleString();
		}
	}
}

function leaveGame() {
	if (botinfo.connected) {

		botinfo.liveApp = false;

	}
}

function renderCheats(gm) {
	botinfo.type = gm;

	const gameContainer = document.getElementById('cheat-items-game');
	const globalContainer = document.getElementById('cheat-items-global');
	if (!gameContainer) return;

	gameContainer.innerHTML = '';
	if (globalContainer) globalContainer.innerHTML = '';

	function mkEl(cheat) {
		var el;
		switch (cheat.type) {
			case 'button':    el = createButton(cheat.name, cheat.action); break;
			case 'input':     el = createInp(cheat.name, cheat.action); break;
			case 'select':    el = createSel(cheat.name, cheat.computed, cheat.action); break;
			case 'staticsel': el = createStaticSel(cheat.name, cheat.values, cheat.action); break;
			case 'adtext':    el = createAdText(cheat.name, cheat.playerSelect, cheat.action); break;
			case 'attack':    el = createAttack(cheat.name, cheat.computed, cheat.spam, cheat.action); break;
			case 'cselect':   el = createCsSel(cheat.name, cheat.values, cheat.action); break;
			default:          el = createButton(cheat.name, cheat.action);
		}
		el.className = 'cheat-item';
		el.style.cssText = ''; // clear any inline styles from oldhacks builders
		return el;
	}

	const gameCheats = cheats[gm] || [];
	if (gameCheats.length === 0) {
		const msg = document.createElement('div');
		msg.style.cssText = 'grid-column:1/-1;text-align:center;color:#aaa;font-size:13px;padding:8px;font-family:Nunito,sans-serif;';
		msg.textContent = gm === 'Unknown' ? 'Join a game to see cheats' : `No cheats for ${gm}`;
		gameContainer.appendChild(msg);
	} else {
		gameCheats.forEach(c => gameContainer.appendChild(mkEl(c)));
	}

	if (globalContainer) global.forEach(c => globalContainer.appendChild(mkEl(c)));
}

function finishG() {

function buildPlayerList(modal, players, onSelect) {
	var list = document.createElement("div");
	list.className = "modal-player-list";
	var selected = { v: null, el: null };
	players.sort().forEach(function(name) {
		var pdata = gameobject?.c?.[name];
		var val = playerValue(pdata);
		var blook = pdata?.b ?? '';
		var row = document.createElement("div");
		row.className = "modal-player-row";
		var img = document.createElement("img");
		img.className = "modal-player-img";
		img.src = blook ? blookToUrl(blook) : '';
		img.alt = blook;
		img.onerror = function() { this.style.opacity='0.15'; };
		var nameSpan = document.createElement("span");
		nameSpan.className = "modal-player-name";
		nameSpan.textContent = name;
		row.appendChild(img);
		row.appendChild(nameSpan);
		if (val !== null) {
			var valSpan = document.createElement("span");
			valSpan.className = "modal-player-val";
			valSpan.textContent = Number(val).toLocaleString();
			row.appendChild(valSpan);
		}
		row.addEventListener("click", function() {
			if (selected.el) selected.el.classList.remove('selected');
			row.classList.add('selected');
			selected.v = name; selected.el = row;
			if (onSelect) onSelect(name, selected);
		});
		list.appendChild(row);
	});
	modal.appendChild(list);
	return selected;
}

// ── Modal system ─────────────────────────────────────────────────────────────
function showModal(title, buildFn) {
	closeModal();

	var overlay = document.createElement("div");
	overlay.id = "cheat-modal-overlay";
	overlay.addEventListener("click", function(e) {
		if (e.target === overlay) closeModal();
	});

	var box = document.createElement("div");
	box.id = "cheat-modal";

	var header = document.createElement("div");
	header.className = "modal-header";

	var titleEl = document.createElement("div");
	titleEl.className = "modal-title";
	titleEl.textContent = title;

	var closeBtn = document.createElement("button");
	closeBtn.className = "modal-close";
	closeBtn.textContent = "x";
	closeBtn.addEventListener("click", closeModal);

	header.appendChild(titleEl);
	header.appendChild(closeBtn);
	box.appendChild(header);

	var body = document.createElement("div");
	body.className = "modal-body";
	box.appendChild(body);

	overlay.appendChild(box);
	document.body.appendChild(overlay);

	buildFn(body);

	// animate in
	requestAnimationFrame(() => overlay.classList.add("visible"));
}

function closeModal() {
	var el = document.getElementById("cheat-modal-overlay");
	if (el) el.remove();
}

// ── Blook image helpers ──────────────────────────────────────────────────────
function blookToUrl(name) {
	// strip any ad-text spam that got appended after a colon
	var clean = (name || '').split(':')[0].trim();
	return 'https://ac.blooket.com/marketassets/blooks/' +
		clean.toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '') + '.svg';
}

function playerValue(playerData) {
	if (!playerData) return null;
	const v = playerData.g ?? playerData.cr ?? playerData.d ?? playerData.xp ??
	          playerData.ca ?? playerData.t ?? playerData.w ?? playerData.f ?? null;
	return v !== null ? v : null;
}

function createStaticSel(text, vals, action) {
	const isBlookSel = text === 'Set Blook';

				search.placeholder = "Search blooks...";
				search.style.marginBottom = "10px";
				modal.appendChild(search);

				var grid = document.createElement("div");
				grid.className = "modal-blook-grid";

				function renderGrid(filter) {
					grid.innerHTML = '';
					vals.filter(v => v.toLowerCase().includes(filter.toLowerCase())).forEach(v => {
						var item = document.createElement("div");
						item.className = "modal-blook-item";
						item.title = v;

						var img = document.createElement("img");
						img.src = blookToUrl(v);
						img.alt = v;
						img.onerror = function() { this.style.opacity = '0.2'; };

						var label = document.createElement("span");
						label.textContent = v;

						item.appendChild(img);
						item.appendChild(label);
						item.addEventListener("click", function() {
							action(v);
							closeModal();
						});
						grid.appendChild(item);
					});
				}

				renderGrid('');
				search.addEventListener("input", () => renderGrid(search.value));
				modal.appendChild(grid);
				search.focus();
			} else {
				// generic static select — show as scrollable list
				var list = document.createElement("div");
				list.className = "modal-player-list";
				vals.sort().forEach(v => {
					var row = document.createElement("div");
					row.className = "modal-player-row";
					row.style.justifyContent = "center";
					row.textContent = v;
					row.addEventListener("click", function() {
						action(v);
						closeModal();
					});
					list.appendChild(row);
				});
				modal.appendChild(list);
			}
		});
	});
	return btn;
}

function bypassFilter(str) {
	return str
		.replace(/a/g, "\u0430")
		.replace(/c/g, "\u0441")
		.replace(/e/g, "\u0435")
		.replace(/i/g, "\u0456")
		.replace(/j/g, "\u0458")
		.replace(/o/g, "\u043E")
		.replace(/p/g, "\u0440")
		.replace(/s/g, "\u0455")
		.replace(/x/g, "\u0445")
		.replace(/y/g, "\u0443")
		.replace(/A/g, "\u0410")
		.replace(/B/g, "\u0412")
		.replace(/C/g, "\u0421")
		.replace(/E/g, "\u0415")
		.replace(/H/g, "\u041D")
		.replace(/I/g, "\u0406")
		.replace(/K/g, "\u039A")
		.replace(/M/g, "\u041C")
		.replace(/N/g, "\u039D")
		.replace(/O/g, "\u041E")
		.replace(/P/g, "\u0420")
		.replace(/S/g, "\u0405")
		.replace(/T/g, "\u0422")
		.replace(/X/g, "\u0425")
		.replace(/Y/g, "\u03A5")
		.replace(/Z/g, "\u0396")
		.replace(/!/g, "\u01C3")
		.replace(/\./g, "\u2024")
		.replace(/;/g, "\u037E")
		.replace(/,/g, "\u201A")
		.replace(/-/g, "\u2010");
}
