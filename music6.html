<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoti-Pipe</title>
  <style>
    :root {
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --bg4: #242424;
      --line: rgba(255,255,255,0.07); --line2: rgba(255,255,255,0.12);
      --text: #f0ede8; --muted: #6b6860; --muted2: #9e9b95;
      --accent: #c8f060; --accent2: #a8d040; --player-h: 88px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .app { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--line); padding: 28px 0 24px; flex-shrink: 0; display: flex; flex-direction: column; }
    .logo { font-size: 20px; font-weight: 800; padding: 0 20px 28px; border-bottom: 1px solid var(--line); }
    .nav-section { padding: 20px 0; border-bottom: 1px solid var(--line); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 14px; color: var(--muted2); cursor: pointer; background: none; border: none; width: 100%; text-align: left; }
    .nav-item:hover, .nav-item.active { color: var(--text); }
    .playlist-section { padding: 20px 0; flex: 1; overflow-y: auto; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted); padding: 0 20px 10px; letter-spacing: 1px; }
    .pl-item { display: flex; align-items: center; gap: 10px; padding: 8px 20px; font-size: 13px; color: var(--muted2); cursor: pointer; background: none; border: none; width: 100%; text-align: left; }
    .pl-item:hover { color: var(--text); }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; gap: 16px; align-items: center; }
    .search-input { flex: 1; max-width: 400px; padding: 10px 16px; background: var(--bg3); border: 1px solid var(--line2); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .content { flex: 1; overflow-y: auto; padding: 24px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .card { background: var(--bg2); border: 1px solid var(--line); border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; }
    .card:hover { background: var(--bg3); transform: translateY(-2px); }
    .card-img { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; background: var(--bg4); margin-bottom: 10px; }
    .card-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: var(--muted2); }
    .track-list { display: flex; flex-direction: column; gap: 2px; }
    .track-row { display: grid; grid-template-columns: 36px 1fr auto; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: 0.15s; background: none; border: none; color: var(--text); text-align: left; width: 100%; }
    .track-row:hover { background: var(--bg3); }
    .track-row.playing { background: rgba(200,240,96,0.06); }
    .track-num { color: var(--muted); text-align: center; font-size: 13px; }
    .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .track-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; background: var(--bg4); flex-shrink: 0; }
    .track-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 11px; color: var(--muted2); margin-top: 2px; }
    .track-dur { font-size: 12px; color: var(--muted); }
    .state-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 240px; gap: 14px; color: var(--muted2); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--bg4); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn { background: var(--accent); border: none; color: #000; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .player { height: var(--player-h); min-height: var(--player-h); background: var(--bg2); border-top: 1px solid var(--line); display: grid; grid-template-columns: 240px 1fr 200px; align-items: center; padding: 0 24px; gap: 16px; }
    .player.hidden { display: none; }
    .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .player-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; background: var(--bg4); flex-shrink: 0; }
    .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 11px; color: var(--muted2); }
    .player-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ctrl-btns { display: flex; align-items: center; gap: 12px; }
    .ctrl-btn { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 18px; padding: 6px; }
    .ctrl-btn:hover { color: var(--text); }
    .play-btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .time-label { font-size: 10px; color: var(--muted); min-width: 34px; text-align: center; }
    .prog-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; cursor: pointer; }
    .prog-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; }
    .player-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .vol-track { width: 80px; height: 4px; background: var(--bg4); border-radius: 2px; cursor: pointer; }
    .vol-fill { height: 100%; background: #fff; border-radius: 2px; width: 70%; }
    @media (max-width: 768px) { .sidebar { display: none; } .player { grid-template-columns: 1fr auto; } .player-right { display: none; } }
  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">🎵 Spoti-Pipe</div>
    <div class="nav-section">
      <button class="nav-item active" data-page="home">🏠 Home</button>
      <button class="nav-item" data-page="search">🔍 Search</button>
    </div>
    <div class="playlist-section">
      <p class="section-label">Quick Picks</p>
      <button class="pl-item" data-search="trending music 2025">🔥 Trending</button>
      <button class="pl-item" data-search="top hits 2025">🏆 Top Hits</button>
      <button class="pl-item" data-search="lofi hip hop">🎵 LoFi Beats</button>
      <button class="pl-item" data-search="rock classics">🎸 Rock</button>
      <button class="pl-item" data-search="pop music 2025">⭐ Pop</button>
      <button class="pl-item" data-search="hip hop 2025">🎤 Hip Hop</button>
      <button class="pl-item" data-search="electronic music">🎧 EDM</button>
      <button class="pl-item" data-search="acoustic covers">🎻 Acoustic</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <input class="search-input" id="searchInput" placeholder="Search for songs..." type="text" autocomplete="off">
    </div>
    <div class="content" id="content">
      <div class="state-view"><div class="spinner"></div><span>Loading...</span></div>
    </div>
  </div>
</div>

<div class="player hidden" id="player">
  <div class="now-playing">
    <img class="player-thumb" id="playerThumb" src="">
    <div>
      <div class="player-title" id="playerTitle">Nothing playing</div>
      <div class="player-artist" id="playerArtist">Select a track</div>
    </div>
  </div>
  <div class="player-center">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="prevBtn">⏮</button>
      <button class="play-btn" id="playBtn">▶</button>
      <button class="ctrl-btn" id="nextBtn">⏭</button>
    </div>
    <div class="progress-row">
      <span class="time-label" id="curTime">0:00</span>
      <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
      <span class="time-label" id="totalTime">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <button class="ctrl-btn" id="muteBtn">🔊</button>
    <div class="vol-track" id="volTrack"><div class="vol-fill" id="volFill"></div></div>
  </div>
</div>

<script>
let audio = null;
let isPlaying = false;
let queue = [];
let queueIndex = -1;
let volume = 0.7;
let isMuted = false;

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  return `${m}:${Math.floor(s % 60).toString().padStart(2,'0')}`;
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// Use a CORS proxy to fetch YouTube data
const PROXY = 'https://api.allorigins.win/raw?url=';

async function searchYouTube(query) {
  const url = `${PROXY}${encodeURIComponent(`https://www.youtube.com/results?search_query=${encodeURIComponent(query + ' music')}`)}`;
  const res = await fetch(url);
  const html = await res.text();
  
  const tracks = [];
  const regex = /\/watch\?v=([a-zA-Z0-9_-]{11})/g;
  const seen = new Set();
  let match;
  
  while ((match = regex.exec(html)) !== null && tracks.length < 30) {
    if (!seen.has(match[1])) {
      seen.add(match[1]);
      tracks.push({
        type: 'stream',
        title: 'Loading title...',
        videoId: match[1],
        url: `/watch?v=${match[1]}`,
        uploaderName: 'YouTube',
        duration: 0,
        thumbnail: `https://i.ytimg.com/vi/${match[1]}/hqdefault.jpg`
      });
    }
  }

  // Fetch titles using oEmbed API (no API key needed)
  await Promise.all(tracks.map(async (t, i) => {
    try {
      const oembedRes = await fetch(`${PROXY}${encodeURIComponent(`https://www.youtube.com/oembed?url=https://youtube.com/watch?v=${t.videoId}&format=json`)}`);
      const data = await oembedRes.json();
      tracks[i].title = data.title;
      tracks[i].uploaderName = data.author_name;
    } catch(e) {}
  }));

  return tracks;
}

async function loadTrending() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="state-view"><div class="spinner"></div><span>Loading trending...</span></div>';
  try {
    const tracks = await searchYouTube('trending music 2025');
    renderCards(tracks, el, '🔥 Trending Now');
  } catch(e) {
    el.innerHTML = '<div class="state-view"><span>Failed to load</span><button class="retry-btn" onclick="loadTrending()">Retry</button></div>';
  }
}

async function search(q) {
  const el = document.getElementById('content');
  if (!q.trim()) return loadTrending();
  el.innerHTML = '<div class="state-view"><div class="spinner"></div><span>Searching...</span></div>';
  try {
    const tracks = await searchYouTube(q);
    if (!tracks.length) {
      el.innerHTML = `<div class="state-view"><span>No results for "${esc(q)}"</span></div>`;
      return;
    }
    renderTrackList(tracks, el, `Results for "${esc(q)}"`);
  } catch(e) {
    el.innerHTML = `<div class="state-view"><span>Search failed</span><button class="retry-btn" onclick="search('${esc(q)}')">Retry</button></div>`;
  }
}

function renderCards(tracks, el, title) {
  el.innerHTML = `<h2 class="page-title">${title}</h2><div class="card-grid">
    ${tracks.map((t,i) => `
      <button class="card" data-idx="${i}">
        <img class="card-img" src="${esc(t.thumbnail)}" onerror="this.style.background='var(--bg4)'">
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-sub">${esc(t.uploaderName)}</div>
      </button>
    `).join('')}
  </div>`;
  el.dataset.tracks = JSON.stringify(tracks);
  el.querySelectorAll('.card').forEach(c => {
    c.onclick = () => {
      const all = JSON.parse(el.dataset.tracks);
      queue = all;
      playTrack(all[+c.dataset.idx], +c.dataset.idx);
    };
  });
}

function renderTrackList(tracks, el, title) {
  el.innerHTML = `<h2 class="page-title">${title}</h2><div class="track-list">
    ${tracks.map((t,i) => `
      <button class="track-row" data-idx="${i}">
        <span class="track-num">${i+1}</span>
        <div class="track-info">
          <img class="track-thumb" src="${esc(t.thumbnail)}" onerror="this.style.background='var(--bg4)'">
          <div>
            <div class="track-name">${esc(t.title)}</div>
            <div class="track-artist">${esc(t.uploaderName)}</div>
          </div>
        </div>
        <span class="track-dur">${fmt(t.duration)}</span>
      </button>
    `).join('')}
  </div>`;
  el.dataset.tracks = JSON.stringify(tracks);
  el.querySelectorAll('.track-row').forEach(r => {
    r.onclick = () => {
      const all = JSON.parse(el.dataset.tracks);
      queue = all;
      playTrack(all[+r.dataset.idx], +r.dataset.idx);
    };
  });
}

function markActiveRow() {
  document.querySelectorAll('.track-row').forEach((r,i) => {
    r.classList.toggle('playing', i === queueIndex);
  });
}

async function playTrack(track, idx) {
  const videoId = track.videoId;
  if (!videoId) return;

  queueIndex = idx;
  markActiveRow();

  document.getElementById('player').classList.remove('hidden');
  document.getElementById('playerThumb').src = track.thumbnail || '';
  document.getElementById('playerTitle').textContent = track.title;
  document.getElementById('playerArtist').textContent = 'Loading...';

  if (audio) { audio.pause(); audio.src = ''; }

  // Try multiple audio sources
  const sources = [
    `https://inv.nadeko.net/latest_version?id=${videoId}&itag=140`,
    `https://vid.puffyan.us/latest_version?id=${videoId}&itag=140`,
    `https://yewtu.be/latest_version?id=${videoId}&itag=140`,
  ];

  audio = new Audio();
  audio.volume = isMuted ? 0 : volume;

  // Try sources sequentially
  let loaded = false;
  for (const src of sources) {
    if (loaded) break;
    try {
      audio.src = src;
      await new Promise((resolve) => {
        audio.oncanplay = () => {
          loaded = true;
          document.getElementById('playerArtist').textContent = track.uploaderName || 'Unknown';
          audio.play();
          isPlaying = true;
          document.getElementById('playBtn').textContent = '⏸';
          resolve();
        };
        audio.onerror = () => resolve();
        setTimeout(() => resolve(), 3000);
      });
    } catch(e) {}
  }

  if (!loaded) {
    document.getElementById('playerArtist').textContent = 'Cannot play this track';
  }

  audio.ontimeupdate = () => {
    if (!audio.duration) return;
    document.getElementById('progFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('curTime').textContent = fmt(audio.currentTime);
    document.getElementById('totalTime').textContent = fmt(audio.duration);
  };

  audio.onended = () => {
    isPlaying = false;
    document.getElementById('playBtn').textContent = '▶';
    if (queueIndex < queue.length - 1) playTrack(queue[queueIndex+1], queueIndex+1);
  };
}

document.getElementById('playBtn').onclick = () => {
  if (!audio) return;
  if (isPlaying) { audio.pause(); document.getElementById('playBtn').textContent = '▶'; }
  else { audio.play(); document.getElementById('playBtn').textContent = '⏸'; }
  isPlaying = !isPlaying;
};

document.getElementById('nextBtn').onclick = () => {
  if (queueIndex < queue.length - 1) playTrack(queue[queueIndex+1], queueIndex+1);
};

document.getElementById('prevBtn').onclick = () => {
  if (audio && audio.currentTime > 3) audio.currentTime = 0;
  else if (queueIndex > 0) playTrack(queue[queueIndex-1], queueIndex-1);
};

document.getElementById('progTrack').onclick = (e) => {
  if (!audio?.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
};

document.getElementById('volTrack').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  document.getElementById('volFill').style.width = (volume * 100) + '%';
  if (audio) audio.volume = isMuted ? 0 : volume;
};

document.getElementById('muteBtn').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  document.getElementById('volFill').style.width = isMuted ? '0%' : (volume * 100) + '%';
  if (audio) audio.volume = isMuted ? 0 : volume;
};

document.getElementById('searchInput').onkeydown = (e) => {
  if (e.key !== 'Enter') return;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('[data-page="search"]').classList.add('active');
  search(e.target.value);
};

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.page === 'home') {
      document.getElementById('searchInput').value = '';
      loadTrending();
    } else {
      document.getElementById('searchInput').focus();
    }
  };
});

document.querySelectorAll('.pl-item').forEach(btn => {
  btn.onclick = () => {
    const q = btn.dataset.search;
    document.getElementById('searchInput').value = q;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector('[data-page="search"]').classList.add('active');
    search(q);
  };
});

document.onkeydown = (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
  if (e.code === 'ArrowLeft' && audio) audio.currentTime -= 5;
  if (e.code === 'ArrowRight' && audio) audio.currentTime += 5;
};

loadTrending();
</script>

</body>
</html>
