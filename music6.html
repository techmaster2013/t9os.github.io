<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoti-Pipe</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-elevated: #1a1a1a;
            --bg-highlight: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1ed760;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 240px;
            background: #000;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item, .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { color: #fff; }
        .playlist-item:hover { color: #fff; }
        .playlist-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, #1f1f1f 0%, var(--bg-base) 300px);
        }
        .top-bar {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            gap: 16px;
        }
        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 500px;
            border: none;
            background: var(--bg-highlight);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus { box-shadow: 0 0 0 2px #fff; }
        .search-input::placeholder { color: var(--text-secondary); }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 32px;
        }
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 16px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .card {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-align: left;
            color: #fff;
            width: 100%;
            position: relative;
        }
        .card:hover { background: var(--bg-highlight); }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg-highlight);
            margin-bottom: 14px;
        }
        .card-title {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .track-list { display: flex; flex-direction: column; gap: 2px; }
        .track-row {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: none;
            color: #fff;
            text-align: left;
            width: 100%;
            font-size: 14px;
        }
        .track-row:hover { background: rgba(255,255,255,0.08); }
        .track-num { color: var(--text-secondary); text-align: center; font-size: 13px; }
        .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .track-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-highlight);
        }
        .track-details { min-width: 0; }
        .track-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--text-secondary); font-size: 12px; }
        .track-dur { color: var(--text-secondary); font-size: 13px; }
        .player-bar {
            height: 80px;
            min-height: 80px;
            background: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        .player-bar.hidden { display: none; }
        .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .player-img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: #333;
        }
        .player-info { min-width: 0; }
        .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 11px; color: var(--text-secondary); }
        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 6px; max-width: 600px; width: 100%; margin: 0 auto; }
        .ctrl-btns { display: flex; align-items: center; gap: 12px; }
        .ctrl-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            font-size: 18px;
            transition: 0.2s;
        }
        .ctrl-btn:hover { color: #fff; }
        .play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .time { font-size: 10px; color: var(--text-secondary); min-width: 35px; text-align: center; }
        .prog-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
        }
        .prog-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
        }
        .prog-bar:hover .prog-fill { background: var(--accent); }
        .extra-ctrl { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .vol-bar {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
        }
        .vol-fill { height: 100%; background: #fff; border-radius: 2px; width: 70%; }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .content-area::-webkit-scrollbar { width: 10px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .player-bar { grid-template-columns: 1fr 1fr; }
            .extra-ctrl { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo">🎵 Spoti-Pipe</div>
            <button class="nav-item active" data-page="home">🏠 Home</button>
            <button class="nav-item" data-page="search">🔍 Search</button>
            <div style="margin-top:auto;padding-top:20px;border-top:1px solid #222;">
                <p style="font-size:11px;color:var(--text-secondary);padding:0 12px;margin-bottom:8px;">QUICK PLAYLISTS</p>
                <button class="playlist-item" data-search="trending music 2024">🔥 Trending</button>
                <button class="playlist-item" data-search="top hits 2024">🏆 Top Hits</button>
                <button class="playlist-item" data-search="lofi hip hop beats">🎵 LoFi Beats</button>
                <button class="playlist-item" data-search="rock classics">🎸 Rock Classics</button>
                <button class="playlist-item" data-search="jazz relaxing">🎷 Jazz Vibes</button>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search songs, artists..." id="searchInput">
                </div>
                <span style="color:var(--accent);font-size:12px;">● Connected</span>
            </div>
            <div class="content-area" id="contentArea">
                <div class="loading"><div class="spinner"></div>Loading music...</div>
            </div>
        </div>
    </div>

    <div class="player-bar hidden" id="playerBar">
        <div class="now-playing">
            <img class="player-img" id="playerImg" src="" alt="">
            <div class="player-info">
                <div class="player-title" id="playerTitle">Nothing playing</div>
                <div class="player-artist" id="playerArtist">Select a track</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="ctrl-btns">
                <button class="ctrl-btn" id="prevBtn">⏮</button>
                <button class="play-btn" id="playBtn">▶</button>
                <button class="ctrl-btn" id="nextBtn">⏭</button>
            </div>
            <div class="progress-row">
                <span class="time" id="curTime">0:00</span>
                <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="extra-ctrl">
            <button class="ctrl-btn" id="muteBtn">🔊</button>
            <div class="vol-bar" id="volBar"><div class="vol-fill" id="volFill"></div></div>
        </div>
    </div>

    <script>
    const API = 'https://broad-sea-cc62.t9osta.workers.dev';
    
    let audio = null;
    let isPlaying = false;
    let queue = [];
    let queueIndex = -1;
    let volume = 0.7;
    let isMuted = false;

    function formatTime(s) {
        if (!s || isNaN(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadTrending() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<div class="loading"><div class="spinner"></div>Loading trending music...</div>';
        
        try {
            const res = await fetch(`${API}/trending`);
            const data = await res.json();
            const tracks = data.filter(i => i.type === 'stream').slice(0, 24);
            
            area.innerHTML = `<h2 class="section-title">🔥 Trending Now</h2><div class="card-grid">
                ${tracks.map((t, i) => `
                    <div class="card" data-idx="${i}">
                        <img class="card-img" src="${t.thumbnail}" onerror="this.style.background='#333'">
                        <div class="card-title">${escHtml(t.title)}</div>
                        <div class="card-subtitle">${escHtml(t.uploaderName || 'Unknown')}</div>
                    </div>
                `).join('')}
            </div>`;
            
            area.dataset.tracks = JSON.stringify(tracks);
            area.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const all = JSON.parse(area.dataset.tracks);
                    queue = all;
                    playTrack(all[parseInt(card.dataset.idx)], parseInt(card.dataset.idx));
                });
            });
        } catch(e) {
            area.innerHTML = `<div class="loading">Failed to load. <button onclick="loadTrending()" style="color:var(--accent);background:none;border:none;cursor:pointer;">Retry</button></div>`;
        }
    }

    async function search(q) {
        const area = document.getElementById('contentArea');
        if (!q.trim()) return loadTrending();
        area.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
        
        try {
            const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            const tracks = (data.items || []).filter(i => i.type === 'stream').slice(0, 30);
            
            if (!tracks.length) {
                area.innerHTML = `<h2 class="section-title" style="text-align:center;padding-top:40px;">No results for "${q}"</h2>`;
                return;
            }
            
            area.innerHTML = `<h2 class="section-title">Results for "${escHtml(q)}"</h2><div class="track-list">
                ${tracks.map((t, i) => `
                    <div class="track-row" data-idx="${i}">
                        <span class="track-num">${i + 1}</span>
                        <div class="track-info">
                            <img class="track-thumb" src="${t.thumbnail}" onerror="this.style.background='#333'">
                            <div class="track-details">
                                <div class="track-name">${escHtml(t.title)}</div>
                                <div class="track-artist">${escHtml(t.uploaderName || 'Unknown')}</div>
                            </div>
                        </div>
                        <span class="track-dur">${formatTime(t.duration)}</span>
                    </div>
                `).join('')}
            </div>`;
            
            area.dataset.tracks = JSON.stringify(tracks);
            area.querySelectorAll('.track-row').forEach(row => {
                row.addEventListener('click', () => {
                    const all = JSON.parse(area.dataset.tracks);
                    queue = all;
                    playTrack(all[parseInt(row.dataset.idx)], parseInt(row.dataset.idx));
                });
            });
        } catch(e) {
            area.innerHTML = `<div class="loading">Search failed. <button onclick="search('${q}')" style="color:var(--accent);background:none;border:none;cursor:pointer;">Retry</button></div>`;
        }
    }

    async function playTrack(track, idx) {
        if (!track?.url) return;
        
        const videoId = track.url.split('v=')[1];
        if (!videoId) return;
        
        queueIndex = idx;
        document.getElementById('playerBar').classList.remove('hidden');
        document.getElementById('playerImg').src = track.thumbnail || '';
        document.getElementById('playerTitle').textContent = track.title;
        document.getElementById('playerArtist').textContent = 'Loading...';
        
        if (audio) {
            audio.pause();
            audio.src = '';
        }
        
        audio = new Audio(`${API}/stream/${videoId}`);
        audio.volume = isMuted ? 0 : volume;
        
        audio.oncanplay = () => {
            document.getElementById('playerArtist').textContent = track.uploaderName || 'Unknown';
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸';
        };
        
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progFill').style.width = pct + '%';
            document.getElementById('curTime').textContent = formatTime(audio.currentTime);
            document.getElementById('totalTime').textContent = formatTime(audio.duration);
        };
        
        audio.onended = () => {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            if (queueIndex < queue.length - 1) {
                playTrack(queue[queueIndex + 1], queueIndex + 1);
            }
        };
        
        audio.load();
    }

    document.getElementById('playBtn').onclick = () => {
        if (!audio) return;
        if (isPlaying) {
            audio.pause();
            document.getElementById('playBtn').textContent = '▶';
        } else {
            audio.play();
            document.getElementById('playBtn').textContent = '⏸';
        }
        isPlaying = !isPlaying;
    };

    document.getElementById('nextBtn').onclick = () => {
        if (queueIndex < queue.length - 1) playTrack(queue[queueIndex + 1], queueIndex + 1);
    };

    document.getElementById('prevBtn').onclick = () => {
        if (audio && audio.currentTime > 3) audio.currentTime = 0;
        else if (queueIndex > 0) playTrack(queue[queueIndex - 1], queueIndex - 1);
    };

    document.getElementById('progBar').onclick = (e) => {
        if (!audio) return;
        const rect = e.target.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    };

    document.getElementById('volBar').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        document.getElementById('volFill').style.width = (volume * 100) + '%';
        if (audio) audio.volume = isMuted ? 0 : volume;
    };

    document.getElementById('muteBtn').onclick = () => {
        isMuted = !isMuted;
        document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
        document.getElementById('volFill').style.width = isMuted ? '0%' : (volume * 100) + '%';
        if (audio) audio.volume = isMuted ? 0 : volume;
    };

    document.getElementById('searchInput').onkeydown = (e) => {
        if (e.key === 'Enter') {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('[data-page="search"]').classList.add('active');
            search(e.target.value);
        }
    };

    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            if (item.dataset.page === 'home') {
                document.getElementById('searchInput').value = '';
                loadTrending();
            } else {
                document.getElementById('searchInput').focus();
            }
        };
    });

    document.querySelectorAll('.playlist-item').forEach(item => {
        item.onclick = () => {
            const q = item.dataset.search;
            document.getElementById('searchInput').value = q;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelector('[data-page="search"]').classList.add('active');
            search(q);
        };
    });

    document.onkeydown = (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
        if (e.code === 'ArrowLeft' && audio) audio.currentTime -= 5;
        if (e.code === 'ArrowRight' && audio) audio.currentTime += 5;
    };

    loadTrending();
    </script>
</body>
</html>
