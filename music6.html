<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoti-Pipe</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-elevated: #1a1a1a;
            --bg-highlight: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1ed760;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 240px;
            background: #000;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item, .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { color: #fff; }
        .playlist-item:hover { color: #fff; }
        .playlist-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, #1f1f1f 0%, var(--bg-base) 300px);
        }

        .top-bar {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            gap: 16px;
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 2;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 500px;
            border: none;
            background: var(--bg-highlight);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus { box-shadow: 0 0 0 2px #fff; }
        .search-input::placeholder { color: var(--text-secondary); }

        .instance-badge {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--bg-highlight);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #333;
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .instance-badge.ok { border-color: var(--accent); color: var(--accent); }
        .instance-badge.err { border-color: #ff6b6b; color: #ff6b6b; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 32px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 16px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-align: left;
            color: #fff;
            width: 100%;
            position: relative;
        }
        .card:hover { background: var(--bg-highlight); }
        .card:hover .play-overlay { opacity: 1; transform: translateY(0); }

        .card-img-wrap { position: relative; margin-bottom: 14px; }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg-highlight);
        }
        .play-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(8px);
            transition: 0.3s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .play-overlay svg { width: 22px; height: 22px; fill: #000; margin-left: 2px; }
        .card-title {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .track-list { display: flex; flex-direction: column; gap: 2px; }
        .track-row {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: none;
            color: #fff;
            text-align: left;
            width: 100%;
            font-size: 14px;
        }
        .track-row:hover { background: rgba(255,255,255,0.08); }
        .track-num { color: var(--text-secondary); text-align: center; font-size: 13px; }
        .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .track-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-highlight);
        }
        .track-details { min-width: 0; }
        .track-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--text-secondary); font-size: 12px; }
        .track-dur { color: var(--text-secondary); font-size: 13px; }

        .player-bar {
            height: 80px;
            min-height: 80px;
            background: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        .player-bar.hidden { display: none; }

        .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .player-img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: #333;
        }
        .player-info { min-width: 0; }
        .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 11px; color: var(--text-secondary); }

        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 6px; max-width: 600px; width: 100%; margin: 0 auto; }
        .ctrl-btns { display: flex; align-items: center; gap: 12px; }
        .ctrl-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            font-size: 18px;
            transition: 0.2s;
            line-height: 1;
        }
        .ctrl-btn:hover { color: #fff; }

        .play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
        }

        .progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .time { font-size: 10px; color: var(--text-secondary); min-width: 35px; text-align: center; }
        .prog-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.1s;
        }
        .prog-bar:hover { height: 6px; }
        .prog-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.5s linear;
        }
        .prog-bar:hover .prog-fill { background: var(--accent); }

        .extra-ctrl { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .vol-bar {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            transition: height 0.1s;
        }
        .vol-bar:hover { height: 6px; }
        .vol-fill { height: 100%; background: #fff; border-radius: 2px; width: 70%; }
        .vol-bar:hover .vol-fill { background: var(--accent); }

        .loading, .error-msg {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .error-msg { color: #ff6b6b; flex-direction: column; gap: 12px; text-align: center; padding: 24px; }
        .error-msg p { color: var(--text-secondary); font-size: 13px; max-width: 400px; line-height: 1.5; }
        .retry-btn, .error-msg button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .buffering-indicator {
            display: none;
            width: 12px;
            height: 12px;
            border: 2px solid #555;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .buffering-indicator.active { display: inline-block; }

        .content-area::-webkit-scrollbar { width: 10px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

        .playing-indicator {
            display: inline-flex;
            gap: 2px;
            align-items: flex-end;
            height: 14px;
        }
        .playing-indicator span {
            display: block;
            width: 3px;
            background: var(--accent);
            border-radius: 1px;
            animation: eq 1s ease-in-out infinite;
        }
        .playing-indicator span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .playing-indicator span:nth-child(2) { height: 10px; animation-delay: 0.2s; }
        .playing-indicator span:nth-child(3) { height: 8px; animation-delay: 0.1s; }
        @keyframes eq {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .player-bar { grid-template-columns: 1fr 1fr; }
            .extra-ctrl { display: none; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo">🎵 Spoti-Pipe</div>
            <button class="nav-item active" data-page="home">🏠 Home</button>
            <button class="nav-item" data-page="search">🔍 Search</button>
            <div style="margin-top:auto;padding-top:20px;border-top:1px solid #222;">
                <p style="font-size:11px;color:var(--text-secondary);padding:0 12px;margin-bottom:8px;">QUICK PLAYLISTS</p>
                <button class="playlist-item" data-search="trending music 2024">🔥 Trending</button>
                <button class="playlist-item" data-search="top hits 2024">🏆 Top Hits</button>
                <button class="playlist-item" data-search="lofi hip hop beats">🎵 LoFi Beats</button>
                <button class="playlist-item" data-search="rock classics">🎸 Rock Classics</button>
                <button class="playlist-item" data-search="jazz relaxing">🎷 Jazz Vibes</button>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16" y1="16" x2="21" y2="21"/></svg>
                    <input type="text" class="search-input" placeholder="Search songs, artists..." id="searchInput">
                </div>
                <div class="instance-badge" id="instanceBadge">Connecting...</div>
            </div>
            <div class="content-area" id="contentArea">
                <div class="loading"><div class="spinner"></div>Connecting to music server...</div>
            </div>
        </div>
    </div>

    <div class="player-bar hidden" id="playerBar">
        <div class="now-playing">
            <img class="player-img" id="playerImg" src="" alt="">
            <div class="player-info">
                <div class="player-title" id="playerTitle">Nothing playing</div>
                <div class="player-artist" id="playerArtist">Select a track</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="ctrl-btns">
                <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
                <button class="play-btn" id="playBtn">▶</button>
                <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
                <div class="buffering-indicator" id="bufferingIndicator"></div>
            </div>
            <div class="progress-row">
                <span class="time" id="curTime">0:00</span>
                <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="extra-ctrl">
            <button class="ctrl-btn" id="muteBtn" title="Mute">🔊</button>
            <div class="vol-bar" id="volBar"><div class="vol-fill" id="volFill"></div></div>
        </div>
    </div>

    <script>
    (function() {
        // =============================================
        // MULTI-BACKEND: Invidious (primary) + Piped (fallback)
        // Both wrapped with CORS proxy if direct fails
        // =============================================

        // Invidious instances — these support CORS and return streamable URLs directly
        const INVIDIOUS_INSTANCES = [
            'https://yewtu.be',
            'https://invidious.privacydev.net',
            'https://inv.riverside.rocks',
            'https://invidious.nerdvpn.de',
            'https://invidious.fdn.fr',
            'https://invidious.io.lol',
            'https://vid.puffyan.us',
            'https://invidious.kavin.rocks',
        ];

        // Piped API instances (fallback)
        const PIPED_INSTANCES = [
            'https://pipedapi.kavin.rocks',
            'https://pipedapi.adminforge.de',
            'https://pipedapi.private.coffee',
            'https://api.piped.video',
        ];

        // CORS proxies to wrap around API calls when direct access fails
        const CORS_PROXIES = [
            'https://corsproxy.io/?url=',
            'https://api.allorigins.win/raw?url=',
            '',  // no proxy (direct)
        ];

        // ---- STATE ----
        let backend = null;  // { type: 'invidious'|'piped', base: string, proxy: string }
        let audio = null;
        let isPlaying = false;
        let isBuffering = false;
        let queue = [];
        let queueIndex = -1;
        let volume = 0.7;
        let isMuted = false;
        let currentVideoId = null;

        // ---- UTILS ----
        function formatTime(s) {
            if (!s || isNaN(s) || s < 0) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function proxyUrl(url, proxy) {
            if (!proxy) return url;
            return proxy + encodeURIComponent(url);
        }

        function setBadge(text, state) {
            const b = document.getElementById('instanceBadge');
            b.textContent = text;
            b.className = 'instance-badge' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
        }

        function setBuffering(active) {
            isBuffering = active;
            const ind = document.getElementById('bufferingIndicator');
            if (active) ind.classList.add('active');
            else ind.classList.remove('active');
        }

        // ---- BACKEND DETECTION ----
        async function tryFetch(url, timeout = 5000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const r = await fetch(url, { signal: controller.signal });
                clearTimeout(timer);
                if (!r.ok) return null;
                const data = await r.json();
                return data;
            } catch(e) {
                clearTimeout(timer);
                return null;
            }
        }

        async function findBackend() {
            setBadge('Connecting...', '');

            // Test Invidious instances with each CORS proxy combo
            for (const proxy of CORS_PROXIES) {
                for (const base of INVIDIOUS_INSTANCES) {
                    const url = proxyUrl(`${base}/api/v1/trending?type=music&region=US&fields=videoId,title,author,authorId,lengthSeconds,videoThumbnails`, proxy);
                    const data = await tryFetch(url, 5000);
                    if (data && Array.isArray(data) && data.length > 0) {
                        console.log('✅ Invidious backend:', base, proxy ? `(proxy: ${proxy})` : '(direct)');
                        return { type: 'invidious', base, proxy };
                    }
                }
            }

            // Fallback: try Piped
            for (const proxy of CORS_PROXIES) {
                for (const base of PIPED_INSTANCES) {
                    const url = proxyUrl(`${base}/trending?region=US`, proxy);
                    const data = await tryFetch(url, 5000);
                    if (data && Array.isArray(data) && data.length > 0) {
                        console.log('✅ Piped backend:', base, proxy ? `(proxy: ${proxy})` : '(direct)');
                        return { type: 'piped', base, proxy };
                    }
                }
            }

            throw new Error('No music servers reachable');
        }

        async function apiFetch(path) {
            if (!backend) backend = await findBackend();
            const url = proxyUrl(`${backend.base}${path}`, backend.proxy);
            const data = await tryFetch(url, 8000);
            if (!data) {
                // Try re-detecting backend
                backend = null;
                backend = await findBackend();
                const url2 = proxyUrl(`${backend.base}${path}`, backend.proxy);
                const data2 = await tryFetch(url2, 8000);
                if (!data2) throw new Error('Failed to fetch data');
                return data2;
            }
            return data;
        }

        // ---- AUDIO STREAM ----
        async function getStreamUrl(videoId) {
            if (backend.type === 'invidious') {
                // Invidious /api/v1/videos/{id} returns adaptiveFormats with direct URLs
                try {
                    const url = proxyUrl(`${backend.base}/api/v1/videos/${videoId}?fields=adaptiveFormats,formatStreams`, backend.proxy);
                    const data = await tryFetch(url, 8000);
                    if (data) {
                        // Find audio-only format (itag 140 = m4a 128kbps, 251 = webm/opus)
                        const formats = data.adaptiveFormats || [];
                        const audio140 = formats.find(f => f.itag === '140' || f.itag === 140);
                        const audioOpus = formats.find(f => f.itag === '251' || f.itag === 251);
                        const audioAny = formats.find(f => f.type && f.type.startsWith('audio/'));
                        const chosen = audio140 || audioOpus || audioAny;
                        if (chosen && chosen.url) return chosen.url;

                        // Fall back to format streams (lower quality but more compatible)
                        const streams = data.formatStreams || [];
                        if (streams.length > 0) return streams[0].url;
                    }
                } catch(e) { console.warn('Invidious stream fetch failed:', e); }

                // Fallback: use Invidious's legacy endpoint
                return `${backend.base}/latest_version?id=${videoId}&itag=140`;
            }

            // Piped backend
            return `${backend.base}/latest_version?id=${videoId}&itag=140`;
        }

        // ---- THUMBNAIL ----
        function getThumbnail(item) {
            if (backend && backend.type === 'invidious') {
                // Invidious returns videoThumbnails array
                if (item.videoThumbnails && item.videoThumbnails.length > 0) {
                    // Prefer medium quality
                    const med = item.videoThumbnails.find(t => t.quality === 'medium' || t.quality === 'mqdefault');
                    const any = item.videoThumbnails[item.videoThumbnails.length - 1];
                    return (med || any).url;
                }
                if (item.thumbnail) return item.thumbnail;
                return `https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg`;
            }
            // Piped
            return item.thumbnail || '';
        }

        function getVideoId(item) {
            if (item.videoId) return item.videoId;
            if (item.url) {
                try {
                    return new URL(item.url, 'https://youtube.com').searchParams.get('v') || '';
                } catch(e) { return ''; }
            }
            return item.id || '';
        }

        function getTitle(item) {
            return item.title || 'Unknown';
        }

        function getArtist(item) {
            return item.author || item.uploaderName || item.uploader || 'Unknown';
        }

        function getDuration(item) {
            return item.lengthSeconds || item.duration || 0;
        }

        function normalizeTrack(item) {
            return {
                videoId: getVideoId(item),
                title: getTitle(item),
                artist: getArtist(item),
                thumbnail: getThumbnail(item),
                duration: getDuration(item),
            };
        }

        // ---- FALLBACK THUMBNAIL ----
        const BLANK_THUMB = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="170" height="170"><rect fill="%23333" width="170" height="170"/><text x="50%25" y="50%25" text-anchor="middle" fill="%23666" dy=".3em" font-size="40">🎵</text></svg>`;
        const BLANK_THUMB_SM = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect fill="%23333" width="40" height="40"/></svg>`;

        // ---- CONTENT LOADING ----
        async function loadTrending() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '<div class="loading"><div class="spinner"></div>Loading trending music...</div>';
            try {
                let tracks = [];
                if (!backend) backend = await findBackend();

                if (backend.type === 'invidious') {
                    const data = await apiFetch('/api/v1/trending?type=music&region=US');
                    tracks = (Array.isArray(data) ? data : []).slice(0, 24).map(normalizeTrack);
                } else {
                    const data = await apiFetch('/trending?region=US');
                    tracks = (Array.isArray(data) ? data : []).filter(i => i.type === 'stream').slice(0, 24).map(normalizeTrack);
                }

                if (tracks.length === 0) throw new Error('No tracks returned');

                const hostname = new URL(backend.base).hostname;
                setBadge(`✓ ${hostname}`, 'ok');

                renderCards(area, '🔥 Trending Now', tracks);
            } catch(e) {
                console.error('Trending failed:', e);
                setBadge('Error', 'err');
                area.innerHTML = `<div class="error-msg">
                    <h3>Couldn't load trending music</h3>
                    <p>${e.message}</p>
                    <p>All music servers may be blocked on this network. Try searching for something specific, or use a VPN.</p>
                    <button onclick="App.init()">🔄 Retry</button>
                </div>`;
            }
        }

        async function search(query) {
            const area = document.getElementById('contentArea');
            if (!query || !query.trim()) return loadTrending();
            area.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';

            try {
                let tracks = [];
                if (!backend) backend = await findBackend();

                if (backend.type === 'invidious') {
                    const data = await apiFetch(`/api/v1/search?q=${encodeURIComponent(query)}&type=video&sort_by=relevance`);
                    tracks = (data || []).filter(i => i.type === 'video').slice(0, 30).map(normalizeTrack);
                } else {
                    const data = await apiFetch(`/search?q=${encodeURIComponent(query)}&filter=videos`);
                    tracks = ((data && data.items) || []).filter(i => i.type === 'stream').slice(0, 30).map(normalizeTrack);
                }

                if (tracks.length === 0) {
                    area.innerHTML = `<h2 class="section-title" style="text-align:center;padding-top:40px;">No results for "${query}"</h2>`;
                    return;
                }

                renderList(area, `Results for "${query}"`, tracks);
            } catch(e) {
                area.innerHTML = `<div class="error-msg">
                    <h3>Search failed</h3>
                    <p>${e.message}</p>
                    <button onclick="App.search('${query.replace(/'/g, "\\'")}')">Retry</button>
                </div>`;
            }
        }

        function renderCards(area, title, tracks) {
            area.innerHTML = `
                <h2 class="section-title">${title}</h2>
                <div class="card-grid">
                    ${tracks.map((t, i) => `
                        <div class="card" data-idx="${i}">
                            <div class="card-img-wrap">
                                <img class="card-img" src="${t.thumbnail}" alt="" loading="lazy"
                                     onerror="this.src='${BLANK_THUMB}'">
                                <div class="play-overlay">
                                    <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19" fill="black"/></svg>
                                </div>
                            </div>
                            <div class="card-title" title="${escHtml(t.title)}">${escHtml(t.title)}</div>
                            <div class="card-subtitle">${escHtml(t.artist)}</div>
                        </div>
                    `).join('')}
                </div>`;

            area.dataset.tracks = JSON.stringify(tracks);
            area.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const all = JSON.parse(area.dataset.tracks);
                    const idx = parseInt(card.dataset.idx);
                    queue = all;
                    playTrack(all[idx], idx);
                });
            });
        }

        function renderList(area, title, tracks) {
            area.innerHTML = `
                <h2 class="section-title">${title}</h2>
                <div class="track-list">
                    ${tracks.map((t, i) => `
                        <div class="track-row" data-idx="${i}">
                            <span class="track-num">${i + 1}</span>
                            <div class="track-info">
                                <img class="track-thumb" src="${t.thumbnail}" loading="lazy"
                                     onerror="this.src='${BLANK_THUMB_SM}'">
                                <div class="track-details">
                                    <div class="track-name">${escHtml(t.title)}</div>
                                    <div class="track-artist">${escHtml(t.artist)}</div>
                                </div>
                            </div>
                            <span class="track-dur">${formatTime(t.duration)}</span>
                        </div>
                    `).join('')}
                </div>`;

            area.dataset.tracks = JSON.stringify(tracks);
            area.querySelectorAll('.track-row').forEach(row => {
                row.addEventListener('click', () => {
                    const all = JSON.parse(area.dataset.tracks);
                    const idx = parseInt(row.dataset.idx);
                    queue = all;
                    playTrack(all[idx], idx);
                });
            });
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ---- AUDIO PLAYBACK ----
        async function playTrack(track, idx) {
            if (!track || !track.videoId) return;
            queueIndex = idx;
            currentVideoId = track.videoId;

            const playerBar = document.getElementById('playerBar');

            // Cleanup old audio
            if (audio) {
                audio.pause();
                audio.src = '';
                audio = null;
            }

            // Update UI immediately
            document.getElementById('playerImg').src = track.thumbnail || '';
            document.getElementById('playerTitle').textContent = track.title || 'Unknown';
            document.getElementById('playerArtist').textContent = '⏳ Loading stream...';
            document.getElementById('totalTime').textContent = formatTime(track.duration);
            document.getElementById('curTime').textContent = '0:00';
            document.getElementById('progFill').style.width = '0%';
            playerBar.classList.remove('hidden');
            setBuffering(true);

            try {
                const streamUrl = await getStreamUrl(track.videoId);
                console.log('Stream URL:', streamUrl.substring(0, 80) + '...');

                // Make sure this is still the right track
                if (currentVideoId !== track.videoId) return;

                audio = new Audio();
                audio.volume = isMuted ? 0 : volume;
                audio.crossOrigin = 'anonymous';

                audio.addEventListener('canplay', () => {
                    setBuffering(false);
                    document.getElementById('playerArtist').textContent = track.artist || 'Unknown';
                    audio.play().then(() => {
                        isPlaying = true;
                        updatePlayBtn();
                    }).catch(() => {
                        document.getElementById('playerArtist').textContent = '▶ Click play to start';
                    });
                });

                audio.addEventListener('waiting', () => setBuffering(true));
                audio.addEventListener('playing', () => setBuffering(false));

                audio.addEventListener('timeupdate', () => {
                    if (audio.duration) {
                        const pct = (audio.currentTime / audio.duration) * 100;
                        document.getElementById('progFill').style.width = pct + '%';
                        document.getElementById('curTime').textContent = formatTime(audio.currentTime);
                    }
                });

                audio.addEventListener('ended', () => {
                    isPlaying = false;
                    updatePlayBtn();
                    if (queueIndex < queue.length - 1) {
                        playTrack(queue[queueIndex + 1], queueIndex + 1);
                    }
                });

                audio.addEventListener('error', (e) => {
                    setBuffering(false);
                    isPlaying = false;
                    updatePlayBtn();
                    const err = audio?.error;
                    let msg = '⚠ Playback error';
                    if (err) {
                        if (err.code === MediaError.MEDIA_ERR_NETWORK) msg = '⚠ Network error — try next track';
                        else if (err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) msg = '⚠ Format not supported';
                    }
                    document.getElementById('playerArtist').textContent = msg;
                    console.error('Audio error code:', err?.code, err?.message);
                });

                audio.src = streamUrl;
                audio.load();

            } catch(e) {
                setBuffering(false);
                document.getElementById('playerArtist').textContent = '⚠ Could not load stream';
                console.error('Stream load error:', e);
            }
        }

        function updatePlayBtn() {
            document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
        }

        function togglePlay() {
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                updatePlayBtn();
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayBtn();
                }).catch(console.warn);
            }
        }

        function playNext() {
            if (queueIndex < queue.length - 1) playTrack(queue[queueIndex + 1], queueIndex + 1);
        }

        function playPrev() {
            if (audio && audio.currentTime > 3) {
                audio.currentTime = 0;
            } else if (queueIndex > 0) {
                playTrack(queue[queueIndex - 1], queueIndex - 1);
            }
        }

        // ---- INIT ----
        async function init() {
            setBadge('Connecting...', '');
            document.getElementById('contentArea').innerHTML = '<div class="loading"><div class="spinner"></div>Finding best music server...</div>';
            try {
                backend = null;
                backend = await findBackend();
                const hostname = new URL(backend.base).hostname;
                setBadge(`✓ ${hostname}`, 'ok');
                loadTrending();
            } catch(e) {
                setBadge('Offline', 'err');
                document.getElementById('contentArea').innerHTML = `
                    <div class="error-msg">
                        <h3>All music servers are unreachable 😞</h3>
                        <p>This is usually caused by a school/work network firewall or an ad blocker blocking the API requests.</p>
                        <p><strong>Things to try:</strong><br>
                        • Disable your ad blocker for this page<br>
                        • Connect to a different Wi-Fi or use mobile data<br>
                        • Use a VPN</p>
                        <button onclick="App.init()">🔄 Try Again</button>
                    </div>`;
            }
        }

        // ---- EVENTS ----
        document.getElementById('playBtn').addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', playNext);
        document.getElementById('prevBtn').addEventListener('click', playPrev);

        document.getElementById('progBar').addEventListener('click', (e) => {
            if (!audio || !audio.duration) return;
            const rect = document.getElementById('progBar').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        document.getElementById('volBar').addEventListener('click', (e) => {
            const rect = document.getElementById('volBar').getBoundingClientRect();
            volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            document.getElementById('volFill').style.width = (volume * 100) + '%';
            if (audio) audio.volume = isMuted ? 0 : volume;
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
            document.getElementById('volFill').style.width = isMuted ? '0%' : (volume * 100) + '%';
            if (audio) audio.volume = isMuted ? 0 : volume;
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const q = e.target.value.trim();
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelector('[data-page="search"]').classList.add('active');
                search(q);
            }
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                if (item.dataset.page === 'home') {
                    document.getElementById('searchInput').value = '';
                    loadTrending();
                } else {
                    document.getElementById('searchInput').focus();
                }
            });
        });

        document.querySelectorAll('.playlist-item').forEach(item => {
            item.addEventListener('click', () => {
                const q = item.dataset.search;
                if (q) {
                    document.getElementById('searchInput').value = q;
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelector('[data-page="search"]').classList.add('active');
                    search(q);
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch(e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'ArrowLeft': if (audio) audio.currentTime = Math.max(0, audio.currentTime - 5); break;
                case 'ArrowRight': if (audio) audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5); break;
                case 'ArrowUp': e.preventDefault(); volume = Math.min(1, volume + 0.1); if (audio) audio.volume = volume; document.getElementById('volFill').style.width = (volume * 100) + '%'; break;
                case 'ArrowDown': e.preventDefault(); volume = Math.max(0, volume - 0.1); if (audio) audio.volume = volume; document.getElementById('volFill').style.width = (volume * 100) + '%'; break;
            }
        });

        window.App = { init, loadTrending, search };
        init();
    })();
    </script>
</body>
</html>
