<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoti-Pipe</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --bg4: #242424;
      --line: rgba(255,255,255,0.07);
      --line2: rgba(255,255,255,0.12);
      --text: #f0ede8;
      --muted: #6b6860;
      --muted2: #9e9b95;
      --accent: #c8f060;
      --accent2: #a8d040;
      --player-h: 88px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 28px 0 24px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      padding: 0 20px 28px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text);
      border-bottom: 1px solid var(--line);
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .nav-section { padding: 20px 0; border-bottom: 1px solid var(--line); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--muted2);
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: color 0.15s;
      letter-spacing: 0.1px;
      position: relative;
    }
    .nav-item svg { flex-shrink: 0; opacity: 0.6; transition: opacity 0.15s; }
    .nav-item:hover { color: var(--text); }
    .nav-item:hover svg { opacity: 1; }
    .nav-item.active { color: var(--text); font-weight: 500; }
    .nav-item.active svg { opacity: 1; }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      width: 3px;
      height: 22px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .playlist-section { padding: 20px 0; flex: 1; overflow-y: auto; }
    .playlist-section::-webkit-scrollbar { display: none; }

    .section-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 20px 10px;
    }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 20px;
      font-size: 13px;
      color: var(--muted2);
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      text-align: left;
      transition: color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pl-item:hover { color: var(--text); }
    .pl-icon { font-size: 14px; flex-shrink: 0; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 20px 28px;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .search-wrap {
      flex: 1;
      max-width: 360px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 9px 16px 9px 40px;
      background: var(--bg3);
      border: 1px solid var(--line2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-input:focus { background: var(--bg4); border-color: rgba(255,255,255,0.2); }
    .search-input::placeholder { color: var(--muted); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--muted2);
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 5px 12px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 24px;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 22px;
      color: var(--text);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-align: left;
      color: var(--text);
      width: 100%;
      position: relative;
      overflow: hidden;
      border: none;
    }
    .card:hover {
      background: var(--bg3);
      border-color: var(--line2);
      transform: translateY(-2px);
    }
    .card:hover .card-play { opacity: 1; transform: translateY(0); }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      object-fit: cover;
      background: var(--bg4);
      margin-bottom: 12px;
      display: block;
    }

    .card-play {
      position: absolute;
      bottom: 72px;
      right: 16px;
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 12px rgba(200,240,96,0.3);
    }
    .card-play svg { color: #000; margin-left: 2px; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .card-sub {
      font-size: 11.5px;
      color: var(--muted2);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .track-list { display: flex; flex-direction: column; gap: 2px; }

    .track-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      background: none;
      border: none;
      color: var(--text);
      text-align: left;
      width: 100%;
    }
    .track-row:hover { background: var(--bg3); }
    .track-row.playing { background: rgba(200,240,96,0.06); }

    .track-num {
      font-size: 12.5px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .track-row.playing .track-num { color: var(--accent); }

    .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .track-thumb {
      width: 42px; height: 42px;
      border-radius: 5px;
      object-fit: cover;
      background: var(--bg4);
      flex-shrink: 0;
    }
    .track-meta { min-width: 0; }
    .track-name {
      font-size: 13.5px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-row.playing .track-name { color: var(--accent); }
    .track-artist { font-size: 11.5px; color: var(--muted2); margin-top: 2px; }
    .track-dur { font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }

    .state-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 240px;
      gap: 14px;
      color: var(--muted2);
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--bg4);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-msg { font-size: 13.5px; }
    .retry-btn {
      background: none;
      border: 1px solid var(--line2);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: var(--bg3); }

    .player {
      height: var(--player-h);
      min-height: var(--player-h);
      background: var(--bg2);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .player.hidden { display: none; }

    .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .player-thumb {
      width: 46px; height: 46px;
      border-radius: 5px;
      object-fit: cover;
      background: var(--bg4);
      flex-shrink: 0;
    }
    .player-meta { min-width: 0; }
    .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 11.5px; color: var(--muted2); margin-top: 2px; }

    .player-center { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .ctrl-btns { display: flex; align-items: center; gap: 8px; }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--bg3); }

    .play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .play-btn:hover { background: var(--accent2); transform: scale(1.05); }
    .play-btn:active { transform: scale(0.96); }

    .progress-row { display: flex; align-items: center; gap: 10px; width: 100%; }
    .time-label { font-size: 10.5px; color: var(--muted); min-width: 34px; text-align: center; font-variant-numeric: tabular-nums; }

    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--bg4);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .prog-fill {
      height: 100%;
      background: var(--muted2);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .prog-track:hover .prog-fill { background: var(--accent); }

    .player-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }

    .vol-wrap { display: flex; align-items: center; gap: 8px; }
    .vol-track {
      width: 72px;
      height: 3px;
      background: var(--bg4);
      border-radius: 2px;
      cursor: pointer;
    }
    .vol-fill { height: 100%; background: var(--muted2); border-radius: 2px; width: 70%; }
    .vol-track:hover .vol-fill { background: var(--text); }

    .toast {
      position: fixed;
      bottom: calc(var(--player-h) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg3);
      border: 1px solid var(--line2);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      color: var(--muted2);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 800px) {
      .sidebar { display: none; }
      .player { grid-template-columns: 1fr auto; }
      .player-right { display: none; }
      .now-playing { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo"><div class="logo-dot"></div>Spoti-Pipe</div>
    <div class="nav-section">
      <button class="nav-item active" data-page="home">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
        Home
      </button>
      <button class="nav-item" data-page="search">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </button>
    </div>
    <div class="playlist-section">
      <p class="section-label">Quick Picks</p>
      <button class="pl-item" data-search="trending music 2024"><span class="pl-icon">🔥</span>Trending</button>
      <button class="pl-item" data-search="top hits 2024"><span class="pl-icon">🏆</span>Top Hits</button>
      <button class="pl-item" data-search="lofi hip hop beats"><span class="pl-icon">🎵</span>LoFi Beats</button>
      <button class="pl-item" data-search="rock classics"><span class="pl-icon">🎸</span>Rock Classics</button>
      <button class="pl-item" data-search="jazz relaxing"><span class="pl-icon">🎷</span>Jazz Vibes</button>
      <button class="pl-item" data-search="pop hits 2024"><span class="pl-icon">⭐</span>Pop Hits</button>
      <button class="pl-item" data-search="hip hop 2024"><span class="pl-icon">🎤</span>Hip Hop</button>
      <button class="pl-item" data-search="electronic dance music"><span class="pl-icon">🎧</span>EDM</button>
      <button class="pl-item" data-search="classical music relaxing"><span class="pl-icon">🎻</span>Classical</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="searchInput" placeholder="Search songs, artists…" type="text" autocomplete="off">
      </div>
      <div class="status-pill"><div class="status-dot"></div>Connected</div>
    </div>
    <div class="content" id="content">
      <div class="state-view"><div class="spinner"></div><span class="state-msg">Loading trending music…</span></div>
    </div>
  </div>
</div>

<div class="player hidden" id="player">
  <div class="now-playing">
    <img class="player-thumb" id="playerThumb" src="" alt="">
    <div class="player-meta">
      <div class="player-title" id="playerTitle">Nothing playing</div>
      <div class="player-artist" id="playerArtist">Select a track</div>
    </div>
  </div>
  <div class="player-center">
    <div class="ctrl-btns">
      <button class="ctrl-btn" id="prevBtn" title="Previous">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
      </button>
      <button class="play-btn" id="playBtn" title="Play/Pause">
        <svg id="playIcon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" title="Next">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span class="time-label" id="curTime">0:00</span>
      <div class="prog-track" id="progTrack"><div class="prog-fill" id="progFill"></div></div>
      <span class="time-label" id="totalTime">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <button class="ctrl-btn" id="muteBtn" title="Mute">
      <svg id="volIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <div class="vol-wrap">
      <div class="vol-track" id="volTrack"><div class="vol-fill" id="volFill"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://broad-sea-cc62.t9osta.workers.dev';

let audio = null;
let isPlaying = false;
let queue = [];
let queueIndex = -1;
let volume = 0.7;
let isMuted = false;
let currentTrackId = null;

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  return `${m}:${Math.floor(s % 60).toString().padStart(2,'0')}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

async function loadTrending() {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="state-view"><div class="spinner"></div><span class="state-msg">Loading trending music…</span></div>`;
  try {
    const res = await fetch(`${API}/trending`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const tracks = data.filter(i => i.type === 'stream').slice(0, 24);
    renderCards(tracks, el, '🔥 Trending Now');
  } catch(e) {
    el.innerHTML = `<div class="state-view"><span class="state-msg">Couldn't load trending</span><button class="retry-btn" onclick="loadTrending()">Try again</button></div>`;
  }
}

async function search(q) {
  const el = document.getElementById('content');
  if (!q.trim()) return loadTrending();
  el.innerHTML = `<div class="state-view"><div class="spinner"></div><span class="state-msg">Searching…</span></div>`;
  try {
    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const tracks = (data.items||[]).filter(i => i.type === 'stream').slice(0, 30);
    if (!tracks.length) {
      el.innerHTML = `<div class="state-view"><span class="state-msg">No results for "${esc(q)}"</span></div>`;
      return;
    }
    renderTrackList(tracks, el, `Results for "${esc(q)}"`);
  } catch(e) {
    el.innerHTML = `<div class="state-view"><span class="state-msg">Search failed</span><button class="retry-btn" onclick="search('${esc(q)}')">Try again</button></div>`;
  }
}

function renderCards(tracks, el, title) {
  el.innerHTML = `<h2 class="page-title">${title}</h2><div class="card-grid">
    ${tracks.map((t,i) => `
      <button class="card" data-idx="${i}">
        <img class="card-img" src="${esc(t.thumbnail)}" onerror="this.style.background='var(--bg4)'" alt="">
        <div class="card-play"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21"/></svg></div>
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-sub">${esc(t.uploaderName||'Unknown')}</div>
      </button>
    `).join('')}
  </div>`;
  el.dataset.tracks = JSON.stringify(tracks);
  el.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => {
      const all = JSON.parse(el.dataset.tracks);
      queue = all; playTrack(all[+c.dataset.idx], +c.dataset.idx);
    });
  });
}

function renderTrackList(tracks, el, title) {
  el.innerHTML = `<h2 class="page-title">${title}</h2><div class="track-list">
    ${tracks.map((t,i) => `
      <button class="track-row" data-idx="${i}">
        <span class="track-num">${i+1}</span>
        <div class="track-info">
          <img class="track-thumb" src="${esc(t.thumbnail)}" onerror="this.style.background='var(--bg4)'" alt="">
          <div class="track-meta">
            <div class="track-name">${esc(t.title)}</div>
            <div class="track-artist">${esc(t.uploaderName||'Unknown')}</div>
          </div>
        </div>
        <span class="track-dur">${fmt(t.duration)}</span>
      </button>
    `).join('')}
  </div>`;
  el.dataset.tracks = JSON.stringify(tracks);
  el.querySelectorAll('.track-row').forEach(r => {
    r.addEventListener('click', () => {
      const all = JSON.parse(el.dataset.tracks);
      queue = all; playTrack(all[+r.dataset.idx], +r.dataset.idx);
    });
  });
}

function markActiveRow() {
  document.querySelectorAll('.track-row').forEach((r,i) => {
    r.classList.toggle('playing', i === queueIndex);
  });
}

async function playTrack(track, idx) {
  if (!track?.videoId && !track?.url) return;
  
  const videoId = track.videoId || (track.url ? track.url.split('v=')[1] : null);
  if (!videoId) return;

  queueIndex = idx;
  currentTrackId = videoId;
  markActiveRow();

  document.getElementById('player').classList.remove('hidden');
  document.getElementById('playerThumb').src = track.thumbnail || '';
  document.getElementById('playerTitle').textContent = track.title;
  document.getElementById('playerArtist').textContent = 'Loading…';

  setPlayIcon(false);

  if (audio) { audio.pause(); audio.src = ''; }

  const sources = [
    `https://pipedapi.kavin.rocks/streams/${videoId}`,
    `https://pipedapi.adminforge.de/streams/${videoId}`,
  ];

  let audioUrl = null;
  for (const src of sources) {
    try {
      const res = await fetch(src);
      if (res.ok) {
        const data = await res.json();
        if (data.audioStreams?.[0]?.url) {
          audioUrl = data.audioStreams[0].url;
          break;
        }
      }
    } catch(e) { continue; }
  }

  if (!audioUrl) {
    audioUrl = `https://inv.nadeko.net/latest_version?id=${videoId}&itag=140`;
  }

  audio = new Audio(audioUrl);
  audio.volume = isMuted ? 0 : volume;

  audio.oncanplay = () => {
    document.getElementById('playerArtist').textContent = track.uploaderName || 'Unknown';
    audio.play();
    isPlaying = true;
    setPlayIcon(true);
  };

  audio.onerror = () => {
    document.getElementById('playerArtist').textContent = 'Playback error';
    showToast('Skipping unavailable track');
    setTimeout(() => {
      if (queueIndex < queue.length - 1) playTrack(queue[queueIndex+1], queueIndex+1);
    }, 1500);
  };

  audio.ontimeupdate = () => {
    if (!audio.duration) return;
    document.getElementById('progFill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('curTime').textContent = fmt(audio.currentTime);
    document.getElementById('totalTime').textContent = fmt(audio.duration);
  };

  audio.onended = () => {
    isPlaying = false;
    setPlayIcon(false);
    if (queueIndex < queue.length - 1) playTrack(queue[queueIndex+1], queueIndex+1);
  };

  audio.load();
}

function setPlayIcon(playing) {
  const icon = document.getElementById('playIcon');
  if (playing) {
    icon.innerHTML = `<line x1="6" y1="4" x2="6" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="18" y1="4" x2="18" y2="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>`;
    icon.setAttribute('fill','none');
  } else {
    icon.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"/>`;
    icon.setAttribute('fill','currentColor');
  }
}

document.getElementById('playBtn').onclick = () => {
  if (!audio) return;
  if (isPlaying) { audio.pause(); setPlayIcon(false); }
  else { audio.play(); setPlayIcon(true); }
  isPlaying = !isPlaying;
};

document.getElementById('nextBtn').onclick = () => {
  if (queueIndex < queue.length - 1) playTrack(queue[queueIndex+1], queueIndex+1);
};

document.getElementById('prevBtn').onclick = () => {
  if (audio && audio.currentTime > 3) audio.currentTime = 0;
  else if (queueIndex > 0) playTrack(queue[queueIndex-1], queueIndex-1);
};

document.getElementById('progTrack').onclick = (e) => {
  if (!audio?.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
};

document.getElementById('volTrack').onclick = (e) => {
  const r = e.currentTarget.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  document.getElementById('volFill').style.width = (volume * 100) + '%';
  if (audio) audio.volume = isMuted ? 0 : volume;
};

document.getElementById('muteBtn').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('volFill').style.width = isMuted ? '0%' : (volume * 100) + '%';
  if (audio) audio.volume = isMuted ? 0 : volume;
};

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('[data-page="search"]').classList.add('active');
  search(e.target.value);
});

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.page === 'home') {
      document.getElementById('searchInput').value = '';
      loadTrending();
    } else {
      document.getElementById('searchInput').focus();
    }
  };
});

document.querySelectorAll('.pl-item').forEach(btn => {
  btn.onclick = () => {
    const q = btn.dataset.search;
    document.getElementById('searchInput').value = q;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector('[data-page="search"]').classList.add('active');
    search(q);
  };
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
  if (e.code === 'ArrowLeft' && audio) audio.currentTime = Math.max(0, audio.currentTime - 5);
  if (e.code === 'ArrowRight' && audio) audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 5);
});

loadTrending();
</script>
</body>
</html>
