<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoti-Pipe</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-elevated: #1a1a1a;
            --bg-highlight: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #1ed760;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 240px;
            background: #000;
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo svg { width: 28px; height: 28px; fill: #fff; }

        .nav-item, .playlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active { color: #fff; }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
        .playlist-item:hover { color: #fff; }
        .playlist-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, #1f1f1f 0%, var(--bg-base) 300px);
        }

        .top-bar {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            gap: 16px;
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-container svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: 500px;
            border: none;
            background: var(--bg-highlight);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus { box-shadow: 0 0 0 2px #fff; }
        .search-input::placeholder { color: var(--text-secondary); }

        .instance-selector {
            padding: 6px 10px;
            border-radius: 4px;
            background: var(--bg-highlight);
            color: #fff;
            border: 1px solid #444;
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 32px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 20px 0 16px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--bg-elevated);
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-align: left;
            color: #fff;
            width: 100%;
            position: relative;
        }
        .card:hover { background: var(--bg-highlight); }
        .card:hover .play-overlay { opacity: 1; transform: translateY(0); }

        .card-img-wrap { position: relative; margin-bottom: 14px; }
        .card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            object-fit: cover;
            background: var(--bg-highlight);
        }
        .play-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(8px);
            transition: 0.3s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .play-overlay svg { width: 22px; height: 22px; fill: #000; margin-left: 2px; }
        .card-title {
            font-weight: 700;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .track-list { display: flex; flex-direction: column; gap: 2px; }
        .track-row {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: none;
            color: #fff;
            text-align: left;
            width: 100%;
            font-size: 14px;
        }
        .track-row:hover { background: rgba(255,255,255,0.08); }
        .track-num { color: var(--text-secondary); text-align: center; }
        .track-row:hover .track-num { display: none; }
        .track-play { display: none; text-align: center; }
        .track-row:hover .track-play { display: block; }
        .track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .track-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-highlight);
        }
        .track-details { min-width: 0; }
        .track-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--text-secondary); font-size: 12px; }
        .track-dur { color: var(--text-secondary); font-size: 13px; }

        .player-bar {
            height: 80px;
            min-height: 80px;
            background: #181818;
            border-top: 1px solid #282828;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        .player-bar.hidden { display: none; }

        .now-playing { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .player-img {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            object-fit: cover;
            flex-shrink: 0;
            background: #333;
            cursor: pointer;
        }
        .player-info { min-width: 0; }
        .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 11px; color: var(--text-secondary); }

        .player-controls { display: flex; flex-direction: column; align-items: center; gap: 6px; max-width: 600px; width: 100%; margin: 0 auto; }
        .ctrl-btns { display: flex; align-items: center; gap: 12px; }
        .ctrl-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            transition: 0.2s;
        }
        .ctrl-btn:hover { color: #fff; }
        .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .play-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn svg { width: 16px; height: 16px; fill: #000; }

        .progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .time { font-size: 10px; color: var(--text-secondary); min-width: 35px; text-align: center; }
        .prog-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .prog-bar:hover { height: 6px; }
        .prog-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
        }
        .prog-bar:hover .prog-fill { background: var(--accent); }

        .extra-ctrl { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .vol-bar {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
        }
        .vol-bar:hover { height: 6px; }
        .vol-fill { height: 100%; background: #fff; border-radius: 2px; width: 70%; }
        .vol-bar:hover .vol-fill { background: var(--accent); }

        .loading, .error-msg {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .error-msg { color: #ff6b6b; flex-direction: column; gap: 12px; text-align: center; }
        .error-msg button, .retry-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .content-area::-webkit-scrollbar { width: 10px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .player-bar { grid-template-columns: 1fr 1fr; }
            .extra-ctrl { display: none; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12"/><circle cx="12" cy="12" r="5" fill="#000"/></svg>
                Spoti-Pipe
            </div>
            <button class="nav-item active" data-page="home">
                <svg viewBox="0 0 24 24"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>
                Home
            </button>
            <button class="nav-item" data-page="search">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
                Search
            </button>
            <div style="margin-top:auto;padding-top:20px;border-top:1px solid #222;">
                <p style="font-size:11px;color:var(--text-secondary);padding:0 12px;margin-bottom:8px;">QUICK PLAYLISTS</p>
                <button class="playlist-item" data-search="trending music 2024">🔥 Trending</button>
                <button class="playlist-item" data-search="top hits 2024">🏆 Top Hits</button>
                <button class="playlist-item" data-search="lofi hip hop beats">🎵 LoFi Beats</button>
                <button class="playlist-item" data-search="rock classics">🎸 Rock Classics</button>
                <button class="playlist-item" data-search="jazz relaxing">🎷 Jazz Vibes</button>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2"/></svg>
                    <input type="text" class="search-input" placeholder="Search songs, artists..." id="searchInput">
                </div>
                <select class="instance-selector" id="instanceSelect" title="API Server">
                    <option value="">Auto-select server</option>
                </select>
            </div>
            <div class="content-area" id="contentArea">
                <div class="loading"><div class="spinner"></div>Loading...</div>
            </div>
        </div>
    </div>

    <div class="player-bar hidden" id="playerBar">
        <div class="now-playing">
            <img class="player-img" id="playerImg" src="" alt="">
            <div class="player-info">
                <div class="player-title" id="playerTitle">Nothing playing</div>
                <div class="player-artist" id="playerArtist">Select a track</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="ctrl-btns">
                <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
                <button class="play-btn" id="playBtn">▶</button>
                <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
            </div>
            <div class="progress-row">
                <span class="time" id="curTime">0:00</span>
                <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
        <div class="extra-ctrl">
            <button class="ctrl-btn" id="muteBtn" title="Mute">🔊</button>
            <div class="vol-bar" id="volBar"><div class="vol-fill" id="volFill"></div></div>
        </div>
    </div>

    <script>
    (function() {
        // ---- CONFIGURATION ----
        // These are Piped API instances. More at: https://github.com/TeamPiped/Piped/wiki/Instances
        const PIPED_INSTANCES = [
            'https://pipedapi.kavin.rocks',
            'https://pipedapi.tokhmi.xyz',
            'https://pipedapi.moomoo.me',
            'https://pipedapi.syncpundit.io',
            'https://piped-api.garudalinux.org',
            'https://pipedapi.adminforge.de',
            'https://pipedapi.leptons.xyz',
            'https://api.piped.video',
            'https://pipedapi.in.projectsegfau.lt',
            'https://pipedapi.smnz.de',
            'https://pipedapi.private.coffee',
        ];

        // Image proxy (some instances also proxy images on the same domain)
        // We'll try to use the same instance for images, falling back to direct
        const IMAGE_PROXIES = [
            'https://proxy.piped.private.coffee',
            'https://pipedproxy.kavin.rocks',
        ];

        // ---- STATE ----
        let currentInstance = null;
        let audio = null;
        let isPlaying = false;
        let queue = [];
        let queueIndex = -1;
        let volume = 0.7;
        let isMuted = false;

        // ---- HELPERS ----
        function formatTime(s) {
            if (!s || isNaN(s) || s < 0) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function getStreamUrl(videoId) {
            // Piped audio stream endpoint
            return `${currentInstance}/latest_version?id=${videoId}&itag=140`;
        }

        function getImageUrl(thumbnailUrl) {
            if (!thumbnailUrl) return '';
            // Try to proxy through piped if it's a youtube image
            if (thumbnailUrl.includes('i.ytimg.com') || thumbnailUrl.includes('yt3.ggpht.com')) {
                // Strip protocol for protocol-relative
                const clean = thumbnailUrl.replace(/^https?:/, '');
                // Use first image proxy
                return `${IMAGE_PROXIES[0]}${clean}`;
            }
            return thumbnailUrl;
        }

        function getVideoId(item) {
            if (item.url) {
                const url = new URL(item.url);
                return url.searchParams.get('v') || '';
            }
            return item.id || '';
        }

        // ---- API ----
        async function testInstance(url) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);
            try {
                const resp = await fetch(`${url}/trending?region=US`, { signal: controller.signal });
                clearTimeout(timeout);
                if (resp.ok) {
                    const data = await resp.json();
                    if (Array.isArray(data) && data.length > 0) return true;
                }
            } catch(e) { /* ignore */ }
            return false;
        }

        async function findBestInstance() {
            // Test instances in parallel (first 5 at a time for speed)
            for (let i = 0; i < PIPED_INSTANCES.length; i += 5) {
                const batch = PIPED_INSTANCES.slice(i, i + 5);
                const results = await Promise.all(batch.map(async url => {
                    const ok = await testInstance(url);
                    return ok ? url : null;
                }));
                const working = results.find(r => r !== null);
                if (working) return working;
            }
            throw new Error('No Piped instances are reachable');
        }

        async function apiFetch(endpoint) {
            if (!currentInstance) {
                currentInstance = await findBestInstance();
            }
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);
            try {
                const resp = await fetch(`${currentInstance}${endpoint}`, { signal: controller.signal });
                clearTimeout(timeout);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            } catch(e) {
                console.warn('API fetch failed:', e.message);
                // Try finding new instance and retry once
                currentInstance = null;
                currentInstance = await findBestInstance();
                const resp = await fetch(`${currentInstance}${endpoint}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return await resp.json();
            }
        }

        // ---- UI: Load Content ----
        async function loadTrending() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '<div class="loading"><div class="spinner"></div>Loading trending...</div>';
            try {
                const data = await apiFetch('/trending?region=US');
                const tracks = data.filter(item => item.type === 'stream').slice(0, 24);
                if (tracks.length === 0) throw new Error('No tracks found');

                const tracksJson = JSON.stringify(tracks.map(t => ({
                    title: t.title,
                    videoId: getVideoId(t),
                    thumbnail: t.thumbnail,
                    artist: t.uploaderName || t.uploader || 'Unknown',
                    duration: t.duration || 0
                })));

                area.innerHTML = `
                    <h2 class="section-title">🔥 Trending Now</h2>
                    <div class="card-grid">
                        ${tracks.map((t, i) => {
                            const vid = getVideoId(t);
                            const title = t.title || 'Unknown';
                            const artist = t.uploaderName || t.uploader || 'Unknown';
                            const thumb = getImageUrl(t.thumbnail);
                            return `
                            <div class="card" data-idx="${i}">
                                <div class="card-img-wrap">
                                    <img class="card-img" src="${thumb}" alt="" loading="lazy"
                                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22170%22 height=%22170%22><rect fill=%22%23333%22 width=%22170%22 height=%22170%22/><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%23666%22 dy=%22.3em%22 font-size=%2240%22>🎵</text></svg>'">
                                    <div class="play-overlay"><svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19" fill="black"/></svg></div>
                                </div>
                                <div class="card-title" title="${title}">${title}</div>
                                <div class="card-subtitle">${artist}</div>
                            </div>`;
                        }).join('')}
                    </div>
                `;

                // Store track data
                area.dataset.tracks = tracksJson;

                // Click handlers
                area.querySelectorAll('.card').forEach(card => {
                    card.addEventListener('click', () => {
                        const allTracks = JSON.parse(area.dataset.tracks);
                        const idx = parseInt(card.dataset.idx);
                        queue = allTracks;
                        playTrack(allTracks[idx], idx);
                    });
                });

            } catch(e) {
                area.innerHTML = `<div class="error-msg">
                    <h3>Couldn't load trending</h3>
                    <p>${e.message}</p>
                    <button onclick="App.loadTrending()">Retry</button>
                </div>`;
            }
        }

        async function search(query) {
            const area = document.getElementById('contentArea');
            if (!query || !query.trim()) return loadTrending();

            area.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
            try {
                const data = await apiFetch(`/search?q=${encodeURIComponent(query)}&filter=videos`);
                const results = (data.items || []).filter(item => item.type === 'stream').slice(0, 30);
                
                if (results.length === 0) {
                    area.innerHTML = `<h2 class="section-title" style="text-align:center;">No results for "${query}"</h2>`;
                    return;
                }

                const tracksJson = JSON.stringify(results.map(t => ({
                    title: t.title,
                    videoId: getVideoId(t),
                    thumbnail: t.thumbnail,
                    artist: t.uploaderName || t.uploader || 'Unknown',
                    duration: t.duration || 0
                })));

                area.innerHTML = `
                    <h2 class="section-title">Results for "${query}"</h2>
                    <div class="track-list">
                        ${results.map((t, i) => {
                            const title = t.title || 'Unknown';
                            const artist = t.uploaderName || t.uploader || 'Unknown';
                            const dur = formatTime(t.duration);
                            const thumb = getImageUrl(t.thumbnail);
                            return `
                            <div class="track-row" data-idx="${i}">
                                <span class="track-num">${i+1}</span>
                                <span class="track-play" style="display:none">▶</span>
                                <div class="track-info">
                                    <img class="track-thumb" src="${thumb}" loading="lazy"
                                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2240%22 height=%2240%22><rect fill=%22%23333%22 width=%2240%22 height=%2240%22/></svg>'">
                                    <div class="track-details">
                                        <div class="track-name">${title}</div>
                                        <div class="track-artist">${artist}</div>
                                    </div>
                                </div>
                                <span class="track-dur">${dur}</span>
                            </div>`;
                        }).join('')}
                    </div>
                `;

                area.dataset.tracks = tracksJson;

                area.querySelectorAll('.track-row').forEach(row => {
                    row.addEventListener('click', () => {
                        const allTracks = JSON.parse(area.dataset.tracks);
                        const idx = parseInt(row.dataset.idx);
                        queue = allTracks;
                        playTrack(allTracks[idx], idx);
                    });
                });

            } catch(e) {
                area.innerHTML = `<div class="error-msg">
                    <h3>Search failed</h3>
                    <p>${e.message}</p>
                    <button onclick="App.search('${query.replace(/'/g, "\\'")}')">Retry</button>
                </div>`;
            }
        }

        // ---- AUDIO PLAYBACK ----
        function playTrack(track, idx) {
            if (!track || !track.videoId) {
                console.error('Invalid track:', track);
                return;
            }
            queueIndex = idx;
            const playerBar = document.getElementById('playerBar');

            // Cleanup old audio
            if (audio) {
                audio.pause();
                audio.remove();
                audio = null;
            }

            // Update UI
            document.getElementById('playerImg').src = getImageUrl(track.thumbnail);
            document.getElementById('playerTitle').textContent = track.title || 'Unknown';
            document.getElementById('playerArtist').textContent = track.artist || 'Unknown';
            document.getElementById('totalTime').textContent = formatTime(track.duration);
            document.getElementById('curTime').textContent = '0:00';
            document.getElementById('progFill').style.width = '0%';
            playerBar.classList.remove('hidden');

            // Create audio element
            const streamUrl = getStreamUrl(track.videoId);
            console.log('Loading stream:', streamUrl);
            
            audio = new Audio();
            audio.crossOrigin = 'anonymous';
            audio.preload = 'auto';
            audio.volume = isMuted ? 0 : volume;

            audio.addEventListener('canplay', () => {
                console.log('Audio can play');
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayBtn();
                }).catch(err => {
                    console.warn('Autoplay blocked:', err);
                    document.getElementById('playerArtist').textContent = 'Click play to start';
                });
            });

            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    document.getElementById('progFill').style.width = pct + '%';
                    document.getElementById('curTime').textContent = formatTime(audio.currentTime);
                }
            });

            audio.addEventListener('ended', () => {
                if (queueIndex < queue.length - 1) {
                    playTrack(queue[queueIndex + 1], queueIndex + 1);
                } else {
                    isPlaying = false;
                    updatePlayBtn();
                }
            });

            audio.addEventListener('error', (e) => {
                console.error('Audio error:', audio?.error);
                const err = audio?.error;
                let msg = 'Error playing';
                if (err) {
                    switch(err.code) {
                        case MediaError.MEDIA_ERR_NETWORK: msg = 'Network error'; break;
                        case MediaError.MEDIA_ERR_DECODE: msg = 'Cannot decode audio'; break;
                        case MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED: msg = 'Format not supported'; break;
                        case MediaError.MEDIA_ERR_ABORTED: msg = 'Playback aborted'; break;
                    }
                }
                document.getElementById('playerArtist').textContent = msg + ' - try another track';
                isPlaying = false;
                updatePlayBtn();
            });

            audio.src = streamUrl;
            audio.load();
        }

        function updatePlayBtn() {
            document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
        }

        function togglePlay() {
            if (!audio) return;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
            } else {
                audio.play().then(() => {
                    isPlaying = true;
                }).catch(() => {
                    isPlaying = false;
                });
            }
            updatePlayBtn();
        }

        function playNext() {
            if (queue.length > 0 && queueIndex < queue.length - 1) {
                playTrack(queue[queueIndex + 1], queueIndex + 1);
            }
        }

        function playPrev() {
            if (audio && audio.currentTime > 3) {
                audio.currentTime = 0;
            } else if (queueIndex > 0) {
                playTrack(queue[queueIndex - 1], queueIndex - 1);
            }
        }

        // ---- INITIALIZATION ----
        async function init() {
            const sel = document.getElementById('instanceSelect');
            PIPED_INSTANCES.forEach(url => {
                const opt = document.createElement('option');
                opt.value = url;
                opt.textContent = new URL(url).hostname;
                sel.appendChild(opt);
            });

            sel.addEventListener('change', () => {
                if (sel.value) {
                    currentInstance = sel.value;
                    console.log('Switched to:', currentInstance);
                    loadTrending();
                } else {
                    currentInstance = null;
                    init();
                }
            });

            try {
                currentInstance = await findBestInstance();
                console.log('Using instance:', currentInstance);
                // Update selector
                const matchingOpt = Array.from(sel.options).find(o => o.value === currentInstance);
                if (matchingOpt) matchingOpt.selected = true;
            } catch(e) {
                console.error('No instances available:', e);
                document.getElementById('contentArea').innerHTML = `
                    <div class="error-msg">
                        <h3>No servers available</h3>
                        <p>All Piped API instances are unreachable.</p>
                        <p style="font-size:12px;opacity:0.7;">Check your internet, disable adblockers for this page, or try a VPN.</p>
                        <button onclick="location.reload()">🔄 Reload</button>
                    </div>`;
                return;
            }

            loadTrending();
        }

        // ---- EVENT LISTENERS ----
        document.getElementById('playBtn').addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', playNext);
        document.getElementById('prevBtn').addEventListener('click', playPrev);

        // Progress bar click
        document.getElementById('progBar').addEventListener('click', (e) => {
            if (!audio || !audio.duration) return;
            const rect = e.target.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        // Volume
        document.getElementById('volBar').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            document.getElementById('volFill').style.width = (volume * 100) + '%';
            if (audio) audio.volume = isMuted ? 0 : volume;
        });

        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
            document.getElementById('volFill').style.width = isMuted ? '0%' : (volume * 100) + '%';
            if (audio) audio.volume = isMuted ? 0 : volume;
        });

        // Search
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const q = e.target.value;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelector('[data-page="search"]').classList.add('active');
                search(q);
            }
        });

        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const page = item.dataset.page;
                if (page === 'home') {
                    document.getElementById('searchInput').value = '';
                    loadTrending();
                } else if (page === 'search') {
                    document.getElementById('searchInput').focus();
                }
            });
        });

        // Quick playlists
        document.querySelectorAll('.playlist-item').forEach(item => {
            item.addEventListener('click', () => {
                const q = item.dataset.search;
                if (q) {
                    document.getElementById('searchInput').value = q;
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.querySelector('[data-page="search"]').classList.add('active');
                    search(q);
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch(e.code) {
                case 'Space': e.preventDefault(); togglePlay(); break;
                case 'ArrowLeft': if (audio) audio.currentTime = Math.max(0, audio.currentTime - 5); break;
                case 'ArrowRight': if (audio) audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5); break;
                case 'ArrowUp': e.preventDefault(); volume = Math.min(1, volume + 0.1); if (audio) audio.volume = volume; document.getElementById('volFill').style.width = (volume * 100) + '%'; break;
                case 'ArrowDown': e.preventDefault(); volume = Math.max(0, volume - 0.1); if (audio) audio.volume = volume; document.getElementById('volFill').style.width = (volume * 100) + '%'; break;
            }
        });

        // Expose to global scope for retry buttons
        window.App = { loadTrending, search };

        // Start
        init();
    })();
    </script>
</body>
</html>
