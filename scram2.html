<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T9 | Browser</title>
    <link rel="stylesheet" href="/styles/defaults.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-tertiary: #1a1a25;
            --bg-hover: #22222f;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #7c5cfc;
            --accent-light: #9b83ff;
            --accent-dark: #5a3fd4;
            --gradient-1: linear-gradient(135deg, #7c5cfc 0%, #6d28d9 50%, #4f46e5 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #ff6b6b 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(19, 19, 26, 0.8);
            --glass-hover: rgba(26, 26, 37, 0.9);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html, #app {
            width: 100vw;
            height: 100vh;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(124, 92, 252, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(79, 172, 254, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(245, 87, 108, 0.04) 0%, transparent 50%);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        .browser-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: var(--shadow-md);
        }

        .sidebar-header {
            padding: 1.2rem 1rem 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 0.8rem;
        }

        .logo i {
            -webkit-text-fill-color: #7c5cfc;
            margin-right: 0.3rem;
        }

        .quick-access {
            padding: 0.5rem 0;
        }

        .quick-access-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            padding: 0 1rem;
        }

        .quick-link {
            aspect-ratio: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .quick-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .quick-link:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 25px rgba(124, 92, 252, 0.3);
        }

        .quick-link:hover::before {
            opacity: 0.1;
        }

        .quick-link img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            position: relative;
            z-index: 1;
        }

        .quick-link-icon {
            font-size: 1.4rem;
            color: var(--accent-light);
            position: relative;
            z-index: 1;
        }

        .tabs-section {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .tabs-section::-webkit-scrollbar {
            width: 4px;
        }

        .tabs-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .tabs-section::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }

        .section-header {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            padding: 0.75rem 1rem 0.25rem;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.8rem;
            margin: 0.1rem 0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.88rem;
            border: none;
            background: transparent;
            color: var(--text-primary);
            width: calc(100% - 1rem);
            text-align: left;
            position: relative;
        }

        .tab:hover {
            background: var(--bg-hover);
        }

        .tab.active {
            background: rgba(124, 92, 252, 0.15);
            font-weight: 500;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--gradient-1);
            border-radius: 0 3px 3px 0;
        }

        .tab-favicon {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .tab:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            color: #ff5e5e;
            background: rgba(255, 94, 94, 0.15);
        }

        .new-tab-btn {
            margin: 0.5rem 0.8rem 1rem;
            padding: 0.6rem;
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .new-tab-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(124, 92, 252, 0.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* Top Tabs Bar */
        .top-tabs-bar {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 0.8rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .top-tabs-bar::-webkit-scrollbar {
            height: 3px;
        }

        .top-tabs-bar::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 3px;
        }

        .top-tab {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
            color: var(--text-primary);
        }

        .top-tab:hover {
            background: var(--bg-hover);
        }

        .top-tab.active {
            background: var(--gradient-1);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(124, 92, 252, 0.4);
            font-weight: 500;
        }

        .top-tab-favicon {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }

        .top-tab-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 2px;
            border-radius: 50%;
            font-size: 0.75rem;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .top-tab-close:hover {
            opacity: 1;
            color: #ff5e5e;
        }

        .top-new-tab-btn {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border-radius: 50%;
            background: var(--gradient-1);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .top-new-tab-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(124, 92, 252, 0.5);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.8rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .nav-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .address-bar-container {
            flex: 1;
            position: relative;
        }

        .address-bar {
            width: 100%;
            padding: 0.55rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .address-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
            background: var(--bg-hover);
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            max-height: 350px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .suggestions-dropdown.visible {
            display: block;
        }

        .suggestion-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: var(--bg-hover);
        }

        .suggestion-icon {
            color: var(--text-secondary);
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
        }

        .suggestion-content {
            flex: 1;
            min-width: 0;
        }

        .suggestion-title {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .suggestion-url {
            font-size: 0.75rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .version-badge {
            background: var(--gradient-1);
            padding: 0.3rem 0.7rem;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        /* Iframe Container */
        .iframe-container {
            flex: 1;
            position: relative;
            background: #000;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .iframe-container iframe.hidden {
            display: none;
        }

        /* History Panel */
        .history-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 380px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .history-panel.visible {
            transform: translateX(0);
        }

        .history-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .history-close {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
        }

        .history-close:hover {
            background: var(--bg-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: var(--bg-hover);
        }

        .history-item img {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        .history-item-info {
            flex: 1;
            min-width: 0;
        }

        .history-item-title {
            font-size: 0.85rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-url {
            font-size: 0.75rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            z-index: 200;
            min-width: 160px;
            padding: 0.3rem;
            display: none;
        }

        .context-menu.visible {
            display: block;
        }

        .context-menu-item {
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }

        .context-menu-item:hover {
            background: var(--bg-hover);
        }

        .context-menu-separator {
            height: 1px;
            background: var(--border);
            margin: 0.3rem 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="/baremux/index.js"></script>
    <script src="/scram/scramjet.all.js"></script>
    <script src="config.js"></script>
    <script src="/scripts/theme.js"></script>

    <script>
        (function() {
            // ============ CONFIGURATION ============
            const CONFIG = {
                files: {
                    wasm: "/scram/scramjet.wasm.wasm",
                    all: "/scram/scramjet.all.js",
                    sync: "/scram/scramjet.sync.js",
                },
                transport: {
                    path: "/epoxy/index.mjs",
                    wsp: localStorage.getItem("proxServer") || "wss://gointospace.app/wisp/",
                },
                bareurl: (typeof _CONFIG !== 'undefined' && _CONFIG?.bareurl) || 
                        `${location.protocol === "https:" ? "https" : "http"}://${location.host}/bare/`,
                defaults: {
                    url: "https://start.duckduckgo.com/",
                    newpage: "/page/newtab.html",
                    serp: "https://search.brave.com/search?q=",
                },
                ui: {
                    favicon: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=",
                }
            };

            // ============ INITIALIZE SCRAMJET ============
            const { ScramjetController } = (typeof $scramjetLoadController === 'function' ? 
                $scramjetLoadController() : { ScramjetController: class {} });
            
            const scramjet = new ScramjetController({ files: CONFIG.files });
            scramjet.init();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register("./sw.js");
            }

            let connection;
            if (typeof BareMux !== 'undefined') {
                connection = new BareMux.BareMuxConnection("/baremux/worker.js");
                connection.setTransport(CONFIG.transport.path, [{ wisp: CONFIG.transport.wsp }]);
            }

            // ============ STATE ============
            let tabs = [];
            let activeTabId = null;
            let nextTabId = 1;
            const history = JSON.parse(localStorage.getItem("t9_browser_history") || "[]");

            function saveHistory() {
                localStorage.setItem("t9_browser_history", JSON.stringify(history.slice(-100)));
            }

            function addToHistory(url, title) {
                const existing = history.findIndex(h => h.url === url);
                if (existing !== -1) history.splice(existing, 1);
                history.push({ url, title, timestamp: Date.now(), favicon: getFavicon(url) });
                saveHistory();
            }

            function getFavicon(url) {
                try {
                    const domain = new URL(url).origin;
                    return `${CONFIG.ui.favicon}${encodeURIComponent(domain)}`;
                } catch {
                    return '';
                }
            }

            function createTab(url, pinned = false) {
                url = url || CONFIG.defaults.url;
                const frame = scramjet.createFrame();
                const tab = {
                    id: nextTabId++,
                    title: 'New Tab',
                    url: url,
                    frame: frame,
                    favicon: getFavicon(url),
                    pinned: pinned,
                };

                frame.frame.src = CONFIG.defaults.newpage;

                frame.addEventListener('urlchange', (e) => {
                    if (!e.url) return;
                    tab.url = e.url;
                    tab.favicon = getFavicon(e.url);
                    try {
                        const title = frame.frame.contentDocument?.title || new URL(e.url).hostname;
                        tab.title = title || 'Untitled';
                        addToHistory(e.url, tab.title);
                    } catch {
                        tab.title = new URL(e.url).hostname || 'Untitled';
                    }
                    render();
                    updateAddressBar();
                });

                tabs.push(tab);
                return tab;
            }

            function getCurrentTab() {
                return tabs.find(t => t.id === activeTabId);
            }

            function switchTab(tabId) {
                tabs.forEach(t => {
                    if (t.frame && t.frame.frame) t.frame.frame.classList.add('hidden');
                });
                activeTabId = tabId;
                const active = getCurrentTab();
                if (active && active.frame && active.frame.frame) {
                    active.frame.frame.classList.remove('hidden');
                }
                updateAddressBar();
                render();
            }

            function deleteTab(tabId) {
                const index = tabs.findIndex(t => t.id === tabId);
                if (index === -1) return;
                const tab = tabs[index];

                if (tab.frame && tab.frame.frame && tab.frame.frame.parentNode) {
                    tab.frame.frame.parentNode.removeChild(tab.frame.frame);
                }

                tabs.splice(index, 1);

                if (tabs.length === 0) {
                    const newTab = createTab();
                    document.getElementById('iframe-container').appendChild(newTab.frame.frame);
                    switchTab(newTab.id);
                } else if (activeTabId === tabId) {
                    const newIndex = Math.min(index, tabs.length - 1);
                    switchTab(tabs[newIndex].id);
                } else {
                    render();
                }
            }

            function pinTab(tabId) {
                const tab = tabs.find(t => t.id === tabId);
                if (tab) {
                    tab.pinned = !tab.pinned;
                    render();
                }
            }

            function navigateTo(url) {
                const active = getCurrentTab();
                if (!active) return;
                let finalUrl = url.trim();
                if (!finalUrl) return;
                if (!finalUrl.startsWith('http') && !finalUrl.includes('.')) {
                    finalUrl = CONFIG.defaults.serp + encodeURIComponent(finalUrl);
                } else if (!finalUrl.startsWith('http')) {
                    finalUrl = 'https://' + finalUrl;
                }
                active.url = finalUrl;
                active.favicon = getFavicon(finalUrl);
                active.frame.go(finalUrl);
                updateAddressBar();
                hideSuggestions();
            }

            function updateAddressBar() {
                const bar = document.getElementById('address-bar');
                const active = getCurrentTab();
                if (bar && active) {
                    bar.value = active.url;
                }
            }

            // ============ RENDERING ============
            function render() {
                renderSidebar();
                renderTopTabs();
            }

            function renderSidebar() {
                const container = document.getElementById('tabs-container');
                if (!container) return;
                container.innerHTML = '';

                const pinned = tabs.filter(t => t.pinned);
                const unpinned = tabs.filter(t => !t.pinned);

                if (pinned.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'section-header';
                    header.textContent = '⭐ Favorites';
                    container.appendChild(header);
                    pinned.forEach(t => container.appendChild(createSidebarTab(t)));
                }

                if (unpinned.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'section-header';
                    header.textContent = '📑 Tabs';
                    container.appendChild(header);
                    unpinned.forEach(t => container.appendChild(createSidebarTab(t)));
                }
            }

            function createSidebarTab(tab) {
                const div = document.createElement('div');
                div.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                div.innerHTML = `
                    <img class="tab-favicon" src="${tab.favicon}" onerror="this.style.display='none'" alt="" />
                    <span class="tab-title">${escapeHtml(tab.title)}</span>
                    <button class="tab-close" title="Close">×</button>
                `;
                div.addEventListener('click', () => switchTab(tab.id));
                div.querySelector('.tab-close').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTab(tab.id);
                });
                div.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showContextMenu(e.clientX, e.clientY, tab);
                });
                return div;
            }

            function renderTopTabs() {
                const scroll = document.getElementById('top-tabs-scroll');
                if (!scroll) return;
                scroll.innerHTML = '';
                tabs.forEach(tab => {
                    const chip = document.createElement('div');
                    chip.className = `top-tab ${tab.id === activeTabId ? 'active' : ''}`;
                    chip.innerHTML = `
                        <img class="top-tab-favicon" src="${tab.favicon}" onerror="this.style.display='none'" alt="" />
                        <span>${escapeHtml(tab.title.substring(0, 25))}</span>
                        <button class="top-tab-close">×</button>
                    `;
                    chip.addEventListener('click', () => switchTab(tab.id));
                    chip.querySelector('.top-tab-close').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTab(tab.id);
                    });
                    chip.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        showContextMenu(e.clientX, e.clientY, tab);
                    });
                    scroll.appendChild(chip);
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ SUGGESTIONS ============
            async function showSuggestions(query) {
                const dropdown = document.getElementById('suggestions-dropdown');
                if (!query || query.trim().length < 1) {
                    dropdown.classList.remove('visible');
                    return;
                }

                const lower = query.toLowerCase();
                const matches = history
                    .filter(h => h.url.toLowerCase().includes(lower) || h.title.toLowerCase().includes(lower))
                    .slice(0, 6);

                dropdown.innerHTML = '';

                if (matches.length === 0) {
                    dropdown.classList.remove('visible');
                    return;
                }

                matches.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerHTML = `
                        <i class="fas fa-history suggestion-icon"></i>
                        <div class="suggestion-content">
                            <div class="suggestion-title">${escapeHtml(m.title)}</div>
                            <div class="suggestion-url">${escapeHtml(m.url)}</div>
                        </div>
                    `;
                    item.addEventListener('click', () => {
                        navigateTo(m.url);
                    });
                    dropdown.appendChild(item);
                });

                dropdown.classList.add('visible');
            }

            function hideSuggestions() {
                const dropdown = document.getElementById('suggestions-dropdown');
                if (dropdown) dropdown.classList.remove('visible');
            }

            // ============ CONTEXT MENU ============
            function showContextMenu(x, y, tab) {
                hideContextMenu();
                const menu = document.createElement('div');
                menu.className = 'context-menu visible';
                menu.id = 'context-menu';
                menu.innerHTML = `
                    <div class="context-menu-item" data-action="pin">${tab.pinned ? '📌 Unpin Tab' : '📌 Pin Tab'}</div>
                    <div class="context-menu-separator"></div>
                    <div class="context-menu-item" data-action="duplicate">📋 Duplicate Tab</div>
                    <div class="context-menu-separator"></div>
                    <div class="context-menu-item" data-action="close">❌ Close Tab</div>
                `;

                menu.querySelector('[data-action="pin"]').addEventListener('click', () => {
                    pinTab(tab.id);
                    hideContextMenu();
                });
                menu.querySelector('[data-action="duplicate"]').addEventListener('click', () => {
                    const newTab = createTab(tab.url);
                    document.getElementById('iframe-container').appendChild(newTab.frame.frame);
                    switchTab(newTab.id);
                    hideContextMenu();
                });
                menu.querySelector('[data-action="close"]').addEventListener('click', () => {
                    deleteTab(tab.id);
                    hideContextMenu();
                });

                menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
                menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
                document.body.appendChild(menu);

                setTimeout(() => {
                    document.addEventListener('click', hideContextMenu, { once: true });
                }, 10);
            }

            function hideContextMenu() {
                const menu = document.getElementById('context-menu');
                if (menu) menu.remove();
            }

            // ============ HISTORY PANEL ============
            function toggleHistoryPanel() {
                const panel = document.getElementById('history-panel');
                if (panel.classList.contains('visible')) {
                    panel.classList.remove('visible');
                } else {
                    renderHistory();
                    panel.classList.add('visible');
                }
            }

            function renderHistory() {
                const list = document.getElementById('history-list');
                if (!list) return;
                list.innerHTML = '';
                const sorted = [...history].reverse();
                sorted.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const timeAgo = getTimeAgo(item.timestamp);
                    div.innerHTML = `
                        <img src="${item.favicon}" onerror="this.style.display='none'" alt="" />
                        <div class="history-item-info">
                            <div class="history-item-title">${escapeHtml(item.title)}</div>
                            <div class="history-item-url">${escapeHtml(item.url)}</div>
                        </div>
                        <span class="history-item-time">${timeAgo}</span>
                    `;
                    div.addEventListener('click', () => {
                        navigateTo(item.url);
                        toggleHistoryPanel();
                    });
                    list.appendChild(div);
                });
            }

            function getTimeAgo(timestamp) {
                const diff = Date.now() - timestamp;
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
                if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
                return Math.floor(diff / 86400000) + 'd ago';
            }

            // ============ INITIALIZATION ============
            window.addEventListener('load', () => {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="browser-container">
                        <!-- Sidebar -->
                        <div class="sidebar">
                            <div class="sidebar-header">
                                <div class="logo">
                                    <i class="fas fa-bolt"></i> T9 Browser
                                </div>
                                <div class="quick-access">
                                    <div class="quick-access-label">Quick Access</div>
                                    <div class="quick-grid" id="quick-grid"></div>
                                </div>
                            </div>
                            <div class="tabs-section" id="tabs-container"></div>
                            <button class="new-tab-btn" id="new-tab-sidebar">
                                <i class="fas fa-plus"></i> New Tab
                            </button>
                        </div>

                        <!-- Main Content -->
                        <div class="main-content">
                            <!-- Top Tabs -->
                            <div class="top-tabs-bar">
                                <div class="top-tabs-bar" id="top-tabs-scroll" style="display:flex;gap:0.4rem;flex:1;overflow-x:auto;"></div>
                                <button class="top-new-tab-btn" id="top-new-tab" title="New Tab">+</button>
                            </div>

                            <!-- Toolbar -->
                            <div class="toolbar">
                                <button class="nav-btn" id="btn-back" title="Back"><i class="fas fa-chevron-left"></i></button>
                                <button class="nav-btn" id="btn-forward" title="Forward"><i class="fas fa-chevron-right"></i></button>
                                <button class="nav-btn" id="btn-reload" title="Reload"><i class="fas fa-redo-alt"></i></button>
                                <div class="address-bar-container">
                                    <input class="address-bar" id="address-bar" placeholder="🔍 Search or enter URL..." autocomplete="off" autocapitalize="off" spellcheck="false" />
                                    <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
                                </div>
                                <button class="nav-btn" id="btn-history" title="History"><i class="fas fa-clock-rotate-left"></i></button>
                                <span class="version-badge">T9 v2.0</span>
                            </div>

                            <!-- Iframe Container -->
                            <div class="iframe-container" id="iframe-container"></div>
                        </div>
                    </div>

                    <!-- History Panel -->
                    <div class="history-panel" id="history-panel">
                        <div class="history-header">
                            <h3>📜 History</h3>
                            <button class="history-close" id="btn-history-close">×</button>
                        </div>
                        <div class="history-list" id="history-list"></div>
                    </div>
                `;

                // Quick Links
                const quickGrid = document.getElementById('quick-grid');
                const quickLinks = [
                    { name: 'YouTube', url: 'https://youtube.com', icon: 'fa-youtube' },
                    { name: 'DuckDuckGo', url: 'https://duckduckgo.com', icon: 'fa-feather' },
                    { name: 'TikTok', url: 'https://tiktok.com', icon: 'fa-music' },
                    { name: 'GitHub', url: 'https://github.com', icon: 'fa-code' },
                    { name: 'Reddit', url: 'https://reddit.com', icon: 'fa-reddit' },
                    { name: 'Twitter', url: 'https://twitter.com', icon: 'fa-x' },
                ];

                quickLinks.forEach(link => {
                    const btn = document.createElement('div');
                    btn.className = 'quick-link';
                    btn.title = link.name;
                    const img = document.createElement('img');
                    img.src = getFavicon(link.url);
                    img.alt = link.name;
                    img.onerror = () => {
                        btn.innerHTML = `<i class="fab ${link.icon} quick-link-icon"></i>`;
                    };
                    btn.appendChild(img);
                    btn.addEventListener('click', () => navigateTo(link.url));
                    quickGrid.appendChild(btn);
                });

                // Event Listeners
                document.getElementById('new-tab-sidebar').addEventListener('click', () => {
                    const tab = createTab();
                    document.getElementById('iframe-container').appendChild(tab.frame.frame);
                    switchTab(tab.id);
                });

                document.getElementById('top-new-tab').addEventListener('click', () => {
                    const tab = createTab();
                    document.getElementById('iframe-container').appendChild(tab.frame.frame);
                    switchTab(tab.id);
                });

                document.getElementById('btn-back').addEventListener('click', () => {
                    getCurrentTab()?.frame.back();
                });

                document.getElementById('btn-forward').addEventListener('click', () => {
                    getCurrentTab()?.frame.forward();
                });

                document.getElementById('btn-reload').addEventListener('click', () => {
                    getCurrentTab()?.frame.reload();
                });

                document.getElementById('btn-history').addEventListener('click', toggleHistoryPanel);
                document.getElementById('btn-history-close').addEventListener('click', toggleHistoryPanel);

                const addressBar = document.getElementById('address-bar');
                addressBar.addEventListener('input', (e) => showSuggestions(e.target.value));
                addressBar.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        navigateTo(addressBar.value);
                    } else if (e.key === 'Escape') {
                        hideSuggestions();
                    }
                });
                addressBar.addEventListener('blur', () => {
                    setTimeout(hideSuggestions, 150);
                });

                // Start first tab
                const firstTab = createTab();
                const iframeContainer = document.getElementById('iframe-container');
                iframeContainer.appendChild(firstTab.frame.frame);
                switchTab(firstTab.id);
            });
        })();
    </script>
</body>
</html>
