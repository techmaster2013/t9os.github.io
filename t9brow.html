<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>T9 | Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0c;
      --surface0: #111115;
      --surface1: #1b1b21;
      --surface2: #24242d;
      --border: #2d2d38;
      --text: #f0f0f5;
      --text2: #9898b0;
      --text3: #5e5e72;
      --accent: #b3a0ff;
      --accent-soft: rgba(179, 160, 255, 0.12);
      --accent-glow: rgba(179, 160, 255, 0.25);
      --green: #66d9a0;
      --red: #ff6b7c;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 7px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    #chrome {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ── TAB BAR ── */
    #tabbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 0 12px;
      background: var(--bg);
      height: 48px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabbar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--surface1);
      border: 1px solid transparent;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      padding: 0 14px;
      height: 38px;
      min-width: 140px;
      max-width: 190px;
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
      font-size: 0.8rem;
      color: var(--text2);
      flex-shrink: 0;
    }
    .tab:hover { background: var(--surface2); }
    .tab.active {
      background: var(--surface0);
      border-color: var(--border);
      color: var(--text);
      box-shadow: 0 -4px 8px rgba(0,0,0,0.4);
    }
    .tab .favicon {
      width: 15px; height: 15px;
      border-radius: 4px;
      object-fit: contain;
      display: none;
    }
    .tab .title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      font-weight: 500;
    }
    .tab .close {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      font-size: 14px;
      color: var(--text3);
      transition: all 0.15s;
    }
    .tab .close:hover { background: rgba(255,107,124,0.15); color: var(--red); }

    #new-tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      width: 34px; height: 34px;
      border-radius: var(--radius-md);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 2px;
      flex-shrink: 0;
    }
    #new-tab-btn:hover { background: var(--surface2); color: white; border-color: var(--accent); }

    /* ── NAVIGATION ── */
    #navbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface0);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface2); color: white; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    #url-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0 14px;
      height: 42px;
      transition: all var(--transition);
      gap: 10px;
    }
    #url-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    #lock-icon {
      font-size: 14px;
      color: var(--text3);
      flex-shrink: 0;
    }
    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
    }
    #url-input::placeholder { color: var(--text3); }
    #go-btn {
      color: var(--text2);
      font-weight: 600;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    #go-btn:hover { color: var(--accent); }

    /* UV status badge */
    #uv-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text3);
      white-space: nowrap;
      cursor: default;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    #uv-badge.ready {
      border-color: rgba(102, 217, 160, 0.3);
      color: var(--green);
      background: rgba(102, 217, 160, 0.08);
    }
    #uv-badge.loading {
      border-color: rgba(179, 160, 255, 0.3);
      color: var(--accent);
      background: var(--accent-soft);
    }
    #uv-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    #uv-badge.ready .dot { animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── CONTENT ── */
    #content {
      flex: 1;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }
    .frame-wrap {
      position: absolute;
      inset: 0;
      display: none;
      background: #0b0b0e;
    }
    .frame-wrap.active { display: block; }
    iframe {
      width: 100%; height: 100%;
      border: none;
      background: #ffffff;
    }

    /* MODERN NEW TAB */
    .newtab-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: radial-gradient(circle at 30% 30%, #1a1a25, var(--bg));
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #d9d0ff, #b3a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .search-box {
      background: var(--surface0);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 6px 6px 6px 22px;
      display: flex;
      align-items: center;
      width: min(540px, 85vw);
      backdrop-filter: blur(20px);
      transition: all var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
    }
    .quick-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .quick-link {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .quick-link:hover {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.5);
    }
    .quick-link img { width: 28px; height: 28px; border-radius: 6px; }
    .quick-link span { font-size: 0.75rem; font-weight: 500; color: var(--text2); }

    /* UV status on new tab */
    .uv-status-card {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: var(--text2);
    }
    .uv-status-card.ok { border-color: rgba(102,217,160,0.25); color: var(--green); background: rgba(102,217,160,0.06); }
    .uv-status-card.err { border-color: rgba(255,107,124,0.25); color: var(--red); background: rgba(255,107,124,0.06); }
    .uv-status-card.pending { border-color: rgba(179,160,255,0.25); color: var(--accent); background: var(--accent-soft); }

    .blocked-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 30px;
      background: var(--bg);
    }
    .blocked-page h2 { font-weight: 600; font-size: 1.8rem; }
    .blocked-page p { color: var(--text2); max-width: 400px; }
    .blocked-url {
      background: var(--surface1);
      padding: 10px 18px;
      border-radius: 40px;
      font-family: monospace;
      color: var(--accent);
      font-size: 0.8rem;
      word-break: break-all;
      max-width: 500px;
    }
    .open-btn {
      background: white;
      color: black;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .open-btn:hover { background: var(--accent); color: black; }
    .err-details {
      font-size: 0.75rem;
      color: var(--text3);
      max-width: 460px;
      line-height: 1.6;
      background: var(--surface1);
      padding: 12px 18px;
      border-radius: var(--radius-md);
      text-align: left;
    }

    #loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      z-index: 9999;
      box-shadow: 0 0 12px var(--accent);
      transition: width 0.4s ease;
      opacity: 0;
    }
    #loading-bar.active { opacity: 1; }
  </style>
</head>
<body>
<div id="loading-bar"></div>

<div id="chrome">
  <div id="tabbar">
    <button id="new-tab-btn">+</button>
  </div>

  <div id="navbar">
    <button class="nav-btn" id="btn-back" disabled>‹</button>
    <button class="nav-btn" id="btn-forward" disabled>›</button>
    <button class="nav-btn" id="btn-refresh">↻</button>
    <div id="url-wrap">
      <span id="lock-icon">🔒</span>
      <input id="url-input" type="text" placeholder="Search or enter URL" autocomplete="off" spellcheck="false" />
      <span id="go-btn">→</span>
    </div>
    <div id="uv-badge" class="loading">
      <span class="dot"></span>
      <span id="uv-label">UV…</span>
    </div>
    <button class="nav-btn" id="btn-home">⌂</button>
  </div>

  <div id="content"></div>
</div>

<!-- Ultraviolet core scripts — must load before the app script -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<script>
(function () {
  'use strict';

  // ── ULTRAVIOLET PROXY LAYER ────────────────────────────────────────────────
  // UV requires:
  //  1. /uv/uv.bundle.js   – Ultraviolet codec + runtime
  //  2. /uv/uv.config.js   – exposes __uv$config (prefix, bare, encodeUrl, etc.)
  //  3. /baremux/index.js  – BareMux transport
  //  4. A service worker   – registered at the UV prefix scope
  //
  // The service worker intercepts requests inside the prefix and rewrites them
  // through the bare server, so the iframe actually loads the remote page.

  const UV_PREFIX    = '/uv/service/';   // must match __uv$config.prefix
  const UV_SW_PATH   = '/uv/sw.js';      // service worker script served by your host
  const BARE_SERVER  = '/bare/';         // bare-server-node endpoint

  let uvReady = false;   // true once SW registered + active

  // ── Service-worker registration ──────────────────────────────────────────
  async function registerUVServiceWorker() {
    if (!('serviceWorker' in navigator)) {
      setUVBadge('err', 'SW N/A');
      return false;
    }

    try {
      // Register the UV service-worker scoped to its prefix.
      // The SW file itself is served by your backend (e.g. Express / static host).
      const reg = await navigator.serviceWorker.register(UV_SW_PATH, {
        scope: UV_PREFIX,
      });

      // Wait for the SW to become active (handles install → activate lifecycle).
      await waitForSWActive(reg);

      uvReady = true;
      setUVBadge('ready', 'UV ON');
      console.log('[Orion] Ultraviolet SW active:', reg.scope);
      return true;
    } catch (err) {
      console.warn('[Orion] UV SW registration failed:', err);
      setUVBadge('err', 'UV OFF');
      return false;
    }
  }

  function waitForSWActive(reg) {
    return new Promise((resolve) => {
      if (reg.active) { resolve(); return; }
      const sw = reg.installing || reg.waiting;
      if (!sw) { resolve(); return; }
      sw.addEventListener('statechange', function handler() {
        if (sw.state === 'activated') {
          sw.removeEventListener('statechange', handler);
          resolve();
        }
      });
      // Safety timeout — resolve anyway after 4 s so the UI isn't stuck
      setTimeout(resolve, 4000);
    });
  }

  // ── UV URL encoder ───────────────────────────────────────────────────────
  // __uv$config is injected by /uv/uv.config.js
  function encodeUVUrl(url) {
    try {
      const cfg = window.__uv$config;
      if (cfg && typeof cfg.encodeUrl === 'function') {
        return cfg.prefix + cfg.encodeUrl(url);
      }
    } catch (_) {}
    // Fallback: simple base64-like xor — matches default UV xor codec
    try {
      return UV_PREFIX + xorEncode(url);
    } catch (_) {
      return UV_PREFIX + btoa(url);
    }
  }

  // XOR codec (mirrors Ultraviolet's default codec exactly)
  function xorEncode(str) {
    let result = '';
    for (let i = 0; i < str.length; i++) {
      result += String.fromCharCode(str.charCodeAt(i) ^ 2);
    }
    try { return btoa(result); } catch (_) { return encodeURIComponent(result); }
  }

  // ── Badge helper ─────────────────────────────────────────────────────────
  function setUVBadge(state, label) {
    const badge = document.getElementById('uv-badge');
    const lbl   = document.getElementById('uv-label');
    badge.className = 'uv-badge ' + state;  // ready | loading | err
    badge.id = 'uv-badge'; // keep id
    lbl.textContent = label;
  }

  // Start SW registration immediately
  registerUVServiceWorker();


  // ── BROWSER CORE ──────────────────────────────────────────────────────────
  let tabs        = [];
  let activeTabId = null;
  let tabCounter  = 0;

  const HOME          = 'newtab';
  const SEARCH_ENGINE = 'https://www.google.com/search?q=';

  const QUICK_LINKS = [
    { label: 'Google',    url: 'https://www.google.com',       icon: 'https://www.google.com/favicon.ico' },
    { label: 'YouTube',   url: 'https://www.youtube.com',      icon: 'https://www.youtube.com/favicon.ico' },
    { label: 'Wikipedia', url: 'https://en.wikipedia.org',     icon: 'https://en.wikipedia.org/favicon.ico' },
    { label: 'GitHub',    url: 'https://github.com',           icon: 'https://github.com/favicon.ico' },
  ];

  const $  = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  // ── URL normalisation ────────────────────────────────────────────────────
  function normalizeUrl(raw) {
    raw = raw.trim();
    if (!raw || raw === HOME) return HOME;
    if (/^https?:\/\//i.test(raw)) return raw;
    if (/^[\w\-]+(\.[\w\-]+)+/.test(raw) && !raw.includes(' ')) return 'https://' + raw;
    return SEARCH_ENGINE + encodeURIComponent(raw);
  }

  function getDomain(url) {
    try { return new URL(url).hostname; } catch { return url; }
  }

  // ── Loading bar ──────────────────────────────────────────────────────────
  const loadBar = $('#loading-bar');
  function startLoading() {
    loadBar.style.width = '0%';
    loadBar.classList.add('active');
    requestAnimationFrame(() => { loadBar.style.width = '70%'; });
    setTimeout(() => { if (loadBar.classList.contains('active')) loadBar.style.width = '90%'; }, 1200);
  }
  function stopLoading() {
    loadBar.style.width = '100%';
    setTimeout(() => { loadBar.classList.remove('active'); loadBar.style.width = '0%'; }, 350);
  }

  // ── Tab management ───────────────────────────────────────────────────────
  function createTab(url = HOME) {
    const id  = ++tabCounter;
    const tab = { id, url, title: 'New Tab', favicon: null, history: [], historyPos: -1 };
    tabs.push(tab);

    const tabEl = document.createElement('div');
    tabEl.className   = 'tab';
    tabEl.dataset.id  = id;
    tabEl.innerHTML   = `
      <img class="favicon" src="" alt="" />
      <span class="title">New Tab</span>
      <span class="close" data-close="${id}">✕</span>`;
    tabEl.addEventListener('click', (e) => {
      if (e.target.classList.contains('close')) { closeTab(id); return; }
      switchTab(id);
    });
    $('#new-tab-btn').before(tabEl);

    const wrap       = document.createElement('div');
    wrap.className   = 'frame-wrap';
    wrap.dataset.id  = id;
    $('#content').appendChild(wrap);

    switchTab(id);
    navigateTo(url, id);
    return id;
  }

  function closeTab(id) {
    if (tabs.length <= 1) { createTab(); }
    const idx = tabs.findIndex(t => t.id === id);
    tabs = tabs.filter(t => t.id !== id);
    document.querySelector(`.tab[data-id="${id}"]`)?.remove();
    document.querySelector(`.frame-wrap[data-id="${id}"]`)?.remove();
    if (activeTabId === id) {
      const next = tabs[Math.min(idx, tabs.length - 1)];
      if (next) switchTab(next.id);
    }
  }

  function switchTab(id) {
    activeTabId = id;
    $$('.tab').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
    $$('.frame-wrap').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
    const tab = tabs.find(t => t.id === id);
    if (tab) updateNavFromTab(tab);
  }

  function getActiveTab() { return tabs.find(t => t.id === activeTabId); }
  function getTab(id)      { return tabs.find(t => t.id === id); }

  // ── Navigation ───────────────────────────────────────────────────────────
  function navigateTo(rawUrl, tabId) {
    const tab = tabId ? getTab(tabId) : getActiveTab();
    if (!tab) return;
    const url = normalizeUrl(rawUrl);
    tab.url   = url;

    if (!tab.history.length || tab.history[tab.historyPos] !== url) {
      tab.history    = tab.history.slice(0, tab.historyPos + 1);
      tab.history.push(url);
      tab.historyPos = tab.history.length - 1;
    }

    renderContent(tab.id);
    if (tab.id === activeTabId) updateNavFromTab(tab);
  }

  function renderContent(tabId) {
    const tab  = getTab(tabId);
    const wrap = document.querySelector(`.frame-wrap[data-id="${tabId}"]`);
    if (!wrap || !tab) return;
    wrap.innerHTML = '';

    if (tab.url === HOME) {
      wrap.appendChild(buildNewTabPage());
      updateTabLabel(tabId, 'New Tab', null);
      stopLoading();
      return;
    }

    startLoading();

    // ── UV proxy routing ─────────────────────────────────────────────────
    // If the UV service worker is active, route through it.
    // If not yet ready, try anyway — the SW may have been registered in a
    // previous page load and still be controlling this scope.
    const proxiedUrl = uvReady
      ? encodeUVUrl(tab.url)
      : encodeUVUrl(tab.url);   // attempt even if not confirmed ready yet

    const iframe = document.createElement('iframe');
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'fullscreen');
    // Note: sandbox restricts some sites; remove specific tokens if needed.
    iframe.setAttribute('sandbox',
      'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-pointer-lock');
    iframe.src = proxiedUrl;

    let loadHandled = false;
    const timeout = setTimeout(() => {
      if (loadHandled) return;
      loadHandled = true;
      stopLoading();
      // Show a helpful error that distinguishes UV issues from embed blocks
      showBlockedMessage(wrap, tab.url, uvReady);
    }, 8000);   // longer timeout to give SW time

    iframe.onload = () => {
      if (loadHandled) return;
      loadHandled = true;
      clearTimeout(timeout);
      stopLoading();

      const domain  = getDomain(tab.url);
      const favIcon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;
        const title = (doc && doc.title) ? doc.title : domain;
        updateTabLabel(tabId, title, favIcon);
      } catch {
        // Cross-origin — normal when proxied correctly; title will be domain
        updateTabLabel(tabId, domain, favIcon);
      }
      updateLockIcon(tab.url);
    };

    iframe.onerror = () => {
      if (loadHandled) return;
      loadHandled = true;
      clearTimeout(timeout);
      stopLoading();
      showBlockedMessage(wrap, tab.url, uvReady);
    };

    wrap.appendChild(iframe);
  }

  function showBlockedMessage(wrap, url, uvActive) {
    const isSearch = url.startsWith('https://www.google.com/search');
    const uvHint = uvActive
      ? 'The UV proxy is active but the site may still be blocking the request, or the bare server returned an error.'
      : 'The UV service worker is not active. Make sure <code>/uv/sw.js</code> is served correctly and the bare server at <code>/bare/</code> is running.';

    wrap.innerHTML = `
      <div class="blocked-page">
        <h2>🌐 Page unavailable</h2>
        <p>${getDomain(url)} could not be loaded${uvActive ? ' through the UV proxy' : ''}.</p>
        <span class="blocked-url">${url}</span>
        <button class="open-btn" onclick="window.open('${url.replace(/'/g, "\\'")}', '_blank')">Open externally ↗</button>
        <div class="err-details">
          <strong>UV status:</strong> ${uvActive ? '✅ Service worker active' : '⚠️ Service worker not confirmed'}<br/>
          ${uvHint}
        </div>
      </div>`;
    updateTabLabel(activeTabId, getDomain(url), null);
  }

  // ── New-tab page ─────────────────────────────────────────────────────────
  function buildNewTabPage() {
    const uvState = uvReady
      ? { cls: 'ok',      icon: '🛡️', msg: 'Ultraviolet proxy active — traffic is routed anonymously.' }
      : { cls: 'pending', icon: '⏳', msg: 'Waiting for UV service worker… ensure /uv/sw.js is served.' };

    const div = document.createElement('div');
    div.className = 'newtab-page';
    div.innerHTML = `
      <div class="logo">
        T9 </div>
      <div class="search-box">
        <input id="nt-search" type="text" placeholder="Search or enter address" autocomplete="off" />
      </div>
      <div class="quick-links">
        ${QUICK_LINKS.map(l => `
          <div class="quick-link" data-url="${l.url}">
            <img src="${l.icon}" onerror="this.style.display='none'" alt="${l.label}" />
            <span>${l.label}</span>
          </div>`).join('')}
      </div>
      <div class="uv-status-card ${uvState.cls}">
        <span>${uvState.icon}</span>
        <span>${uvState.msg}</span>
      </div>`;

    div.querySelector('#nt-search')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { navigateTo(e.target.value); e.target.blur(); }
    });
    div.querySelectorAll('.quick-link').forEach(el => {
      el.addEventListener('click', () => navigateTo(el.dataset.url));
    });
    return div;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function updateTabLabel(tabId, title, favicon) {
    const tabEl = document.querySelector(`.tab[data-id="${tabId}"]`);
    if (!tabEl) return;
    tabEl.querySelector('.title').textContent = title || 'Loading…';
    const img = tabEl.querySelector('.favicon');
    if (favicon) { img.src = favicon; img.style.display = 'inline'; }
    else img.style.display = 'none';
    const tab = getTab(tabId);
    if (tab) tab.title = title;
  }

  function updateNavFromTab(tab) {
    $('#url-input').value       = tab.url === HOME ? '' : tab.url;
    $('#btn-back').disabled     = tab.historyPos <= 0;
    $('#btn-forward').disabled  = tab.historyPos >= tab.history.length - 1;
    updateLockIcon(tab.url);
  }

  function updateLockIcon(url) {
    const icon = $('#lock-icon');
    if (url === HOME || url.startsWith('https://')) {
      icon.textContent = '🔒'; icon.style.color = 'var(--green)';
    } else {
      icon.textContent = '🔓'; icon.style.color = 'var(--text3)';
    }
  }

  // ── Event listeners ───────────────────────────────────────────────────────
  $('#new-tab-btn').addEventListener('click', () => createTab());
  $('#btn-home').addEventListener('click', () => navigateTo(HOME));

  $('#btn-back').addEventListener('click', () => {
    const tab = getActiveTab();
    if (tab && tab.historyPos > 0) {
      tab.historyPos--;
      tab.url = tab.history[tab.historyPos];
      renderContent(tab.id);
      updateNavFromTab(tab);
    }
  });

  $('#btn-forward').addEventListener('click', () => {
    const tab = getActiveTab();
    if (tab && tab.historyPos < tab.history.length - 1) {
      tab.historyPos++;
      tab.url = tab.history[tab.historyPos];
      renderContent(tab.id);
      updateNavFromTab(tab);
    }
  });

  $('#btn-refresh').addEventListener('click', () => {
    const tab = getActiveTab();
    if (tab) renderContent(tab.id);
  });

  const urlInput = $('#url-input');
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { navigateTo(urlInput.value); urlInput.blur(); }
    if (e.key === 'Escape') urlInput.blur();
  });
  urlInput.addEventListener('focus', () => urlInput.select());
  $('#go-btn').addEventListener('click', () => navigateTo(urlInput.value));

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === 't') { e.preventDefault(); createTab(); }
    if (mod && e.key === 'w') { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
    if (mod && e.key === 'l') { e.preventDefault(); urlInput.focus(); }
    if (mod && e.key === 'r') { e.preventDefault(); const t = getActiveTab(); if (t) renderContent(t.id); }
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  createTab();
})();
</script>
</body>
</html>
