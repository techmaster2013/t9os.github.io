<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#171a21}
body{font-family:'Noto Sans',sans-serif;color:#c7d5e0;display:flex;flex-direction:column}

/* NAV */
nav{
  background:#1b2838;
  border-bottom:1px solid #000;
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;
  flex-shrink:0;
}
.nav-logo{
  font-family:'Rajdhani',sans-serif;
  font-size:24px;font-weight:700;
  letter-spacing:3px;
  color:#fff;
  margin-right:24px;
}
.nav-logo span{color:#66c0f4}
.nav-tabs{display:flex;height:100%;flex:1}
.nav-tab{
  padding:0 14px;height:100%;
  display:flex;align-items:center;
  font-size:13px;color:#8f98a0;
  cursor:pointer;
  border-bottom:2px solid transparent;
  text-transform:uppercase;
}
.nav-tab:hover{color:#c7d5e0}
.nav-tab.active{color:#c7d5e0;border-bottom-color:#66c0f4}
.nav-search{
  background:#000;border:1px solid #333;
  padding:5px 10px;color:#c7d5e0;font-size:13px;
  outline:none;width:180px;
}
.nav-search:focus{border-color:#66c0f4}
.nav-search::placeholder{color:#666}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{
  width:180px;flex-shrink:0;
  background:#16202d;
  overflow-y:auto;
}
.sidebar-section{padding:10px 0}
.sidebar-heading{
  font-size:10px;color:#8f98a0;text-transform:uppercase;
  padding:6px 14px;
}
.sidebar-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;cursor:pointer;
  font-size:12px;color:#8f98a0;
  border-left:2px solid transparent;
}
.sidebar-item:hover{color:#c7d5e0}
.sidebar-item.active{color:#c7d5e0;border-left-color:#66c0f4}
.sidebar-item svg{width:14px;height:14px;opacity:.7}
.sidebar-divider{height:1px;background:#1a2430;margin:4px 0}
.tag-pill{
  display:inline-block;padding:2px 6px;
  font-size:10px;background:#1a2430;
  color:#8f98a0;cursor:pointer;
  margin:2px;
}
.tag-pill:hover{color:#66c0f4}
.tag-pill.active{background:#1a3a4a;color:#66c0f4}
.tag-cloud{padding:4px 10px}
.sort-select{
  background:#000;border:1px solid #333;
  color:#8f98a0;font-size:12px;padding:4px 8px;outline:none;
  margin:0 10px;width:calc(100% - 20px);
}
.sort-select option{background:#1b2838}

/* MAIN */
main{flex:1;overflow-y:auto;background:#1b2838}

/* HERO */
.hero{
  position:relative;width:100%;height:300px;overflow:hidden;
  background:#0d1b2a;
}
.hero-bg{position:absolute;inset:0}
.hero-capsule{
  width:55%;height:100%;object-fit:cover;
  opacity:.5;
}
.hero-gradient{
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 30%,rgba(27,40,56,.8) 60%,#1b2838 85%);
}
.hero-content{
  position:absolute;right:0;bottom:0;
  width:45%;padding:24px;
  display:flex;flex-direction:column;gap:8px;
}
.hero-label{font-size:10px;color:#66c0f4;text-transform:uppercase}
.hero-title{
  font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;
  color:#fff;
}
.hero-meta{font-size:12px;color:#8f98a0;display:flex;gap:10px;align-items:center}
.hero-tag{
  background:rgba(102,192,244,.15);border:1px solid rgba(102,192,244,.3);
  color:#66c0f4;padding:2px 6px;font-size:10px;
}
.hero-play-btn{
  background:#5c9a2e;border:none;color:#fff;
  padding:10px 24px;
  font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;text-transform:uppercase;
  width:fit-content;
}
.hero-play-btn:hover{background:#6dbf40}
.hero-dots{position:absolute;bottom:10px;left:20px;display:flex;gap:5px}
.hero-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.25);cursor:pointer;
}
.hero-dot.active{background:#66c0f4}

/* SECTION */
.section-bar{
  display:flex;align-items:center;
  padding:12px 20px;
  border-bottom:1px solid #1a2430;
}
.section-title{
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;
  color:#c7d5e0;
}
.section-count{
  background:#1a2430;padding:2px 8px;
  font-size:11px;color:#8f98a0;margin-left:8px;
}

/* GRID */
.game-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:6px;padding:10px 20px 20px;
}
.game-card{
  background:#16202d;overflow:hidden;
  cursor:pointer;
  border:1px solid #1a2430;
}
.game-card:hover{border-color:#66c0f4}
.card-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.card-thumb-placeholder{
  width:100%;aspect-ratio:16/9;
  background:#0d1b2a;
  display:flex;align-items:center;justify-content:center;
}
.card-thumb-placeholder svg{width:36px;height:36px;opacity:.15}
.card-body{padding:8px 10px}
.card-name{font-size:12px;color:#c7d5e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-author{font-size:11px;color:#8f98a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.card-tag-mini{font-size:9px;background:#1a2430;color:#8f98a0;padding:1px 4px}
.card-footer{padding:6px 10px;border-top:1px solid #1a2430}
.card-play{
  width:100%;background:#3a7a1e;border:none;
  color:#fff;padding:5px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;text-transform:uppercase;
}
.card-play:hover{background:#4a9a2e}

/* STATUS */
.status-msg{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px;color:#8f98a0;gap:12px;font-size:13px;
  grid-column:1/-1;
}
.spinner{
  width:30px;height:30px;
  border:3px solid #1a3a4a;
  border-top-color:#66c0f4;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* VIEWER */
#viewer{
  position:fixed;inset:0;background:#000;z-index:9000;
  display:none;flex-direction:column;
}
.viewer-bar{
  background:#1b2838;border-bottom:1px solid #000;
  padding:0 12px;height:44px;display:flex;align-items:center;gap:10px;
}
.viewer-logo{font-family:'Rajdhani',sans-serif;font-size:13px;color:#66c0f4;opacity:.6}
.viewer-title{font-family:'Rajdhani',sans-serif;font-size:16px;color:#c7d5e0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer-author{font-size:11px;color:#8f98a0}
.viewer-actions{display:flex;gap:6px}
.viewer-btn{
  background:#1a2430;border:1px solid #2a3440;
  color:#c7d5e0;padding:4px 10px;
  font-size:11px;cursor:pointer;
}
.viewer-btn:hover{background:#2a3440}
.viewer-btn.close-btn{background:#3a2020;border-color:#4a3030}
.viewer-btn.close-btn:hover{background:#4a3030}
#gameFrame{flex:1;border:none;width:100%;background:#000}

/* INFO MODAL */
#infoOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9500;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.info-modal{
  background:#16202d;border:1px solid #2a3a4a;
  width:100%;max-width:480px;
}
.info-header{
  background:#1a2c3f;
  padding:16px 20px;border-bottom:1px solid #0d1b2a;
  display:flex;gap:12px;align-items:center;
}
.info-cover{width:64px;height:40px;object-fit:cover;background:#000}
.info-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff}
.info-author{font-size:11px;color:#8f98a0}
.info-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.info-row{display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid #1a2430;padding-bottom:8px}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-row label{color:#8f98a0;text-transform:uppercase;font-size:10px}
.info-row span{color:#c7d5e0}
.info-tags{display:flex;gap:4px;flex-wrap:wrap}
.info-tag{background:#1a3a4a;color:#66c0f4;padding:2px 6px;font-size:10px}
.info-footer{padding:12px 20px;background:#0d1b2a;border-top:1px solid #0d1b2a;display:flex;gap:8px;justify-content:flex-end}
.info-play-btn{
  background:#5c9a2e;border:none;color:#fff;
  padding:8px 20px;
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;text-transform:uppercase;
}
.info-play-btn:hover{background:#6dbf40}
.info-close-btn{
  background:#1a2430;border:1px solid #2a3440;
  color:#c7d5e0;padding:8px 16px;
  font-size:12px;cursor:pointer;
}
.info-close-btn:hover{background:#2a3440}

@media(max-width:768px){
  aside{width:140px}
  .hero{height:220px}
  .hero-content{width:55%;padding:16px}
  .hero-title{font-size:22px}
  .game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;padding:8px 12px 16px}
  .nav-search{width:120px}
}
@media(max-width:500px){
  aside{display:none}
  .hero-content{width:100%}
  .game-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">VAP<span>OR</span></div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="setTab(this,'store')">Store</div>
    <div class="nav-tab" onclick="setTab(this,'library')">Library</div>
    <div class="nav-tab" onclick="setTab(this,'community')">Community</div>
  </div>
  <input class="nav-search" type="text" placeholder="Search..." id="searchInput" oninput="applyFilters()">
</nav>

<div class="app">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-heading">Browse</div>
      <div class="sidebar-item active" onclick="setCategory(this,'all')" data-cat="all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        All Games
      </div>
      <div class="sidebar-item" onclick="setCategory(this,'featured')" data-cat="featured">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Featured
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Tags</div>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Sort</div>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="name">Name A–Z</option>
        <option value="name-desc">Name Z–A</option>
        <option value="id">Newest</option>
      </select>
    </div>
  </aside>

  <main>
    <div class="hero">
      <div class="hero-bg">
        <img class="hero-capsule" id="heroImg" alt="">
      </div>
      <div class="hero-gradient"></div>
      <div class="hero-content">
        <div class="hero-label">Featured Game</div>
        <div class="hero-title" id="heroTitle">Loading…</div>
        <div class="hero-meta">
          <span class="hero-tag">Free</span>
          <span id="heroAuthor"></span>
        </div>
        <button class="hero-play-btn" id="heroPlayBtn">▶ Play</button>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </div>

    <div class="section-bar">
      <span class="section-title" id="sectionTitle">All Games</span>
      <span class="section-count" id="gameCount">0</span>
    </div>
    <div class="game-grid" id="gameGrid">
      <div class="status-msg">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>
    </div>
  </main>
</div>

<div id="viewer">
  <div class="viewer-bar">
    <div class="viewer-logo">STEAM</div>
    <div class="viewer-title" id="viewerTitle"></div>
    <div class="viewer-author" id="viewerAuthor"></div>
    <div class="viewer-actions">
      <button class="viewer-btn" onclick="fullscreenGame()">Fullscreen</button>
      <button class="viewer-btn" onclick="openNewTab()">New Tab</button>
      <button class="viewer-btn" onclick="downloadGame()">Download</button>
      <button class="viewer-btn close-btn" onclick="closeGame()">Exit</button>
    </div>
  </div>
  <iframe id="gameFrame" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<div id="infoOverlay" onclick="if(event.target===this)this.style.display='none'">
  <div class="info-modal" onclick="event.stopPropagation()">
    <div class="info-header">
      <img class="info-cover" id="infoCover">
      <div>
        <div class="info-title" id="infoTitle"></div>
        <div class="info-author" id="infoAuthor"></div>
      </div>
    </div>
    <div class="info-body">
      <div class="info-row"><label>File</label><span id="infoFile"></span></div>
      <div class="info-row"><label>Source</label><span>Hydra Network</span></div>
      <div class="info-row" id="infoTagRow"><label>Tags</label><div class="info-tags" id="infoTags"></div></div>
    </div>
    <div class="info-footer">
      <button class="info-close-btn" onclick="document.getElementById('infoOverlay').style.display='none'">Close</button>
      <button class="info-play-btn" id="infoPlayBtn">▶ Play</button>
    </div>
  </div>
</div>

<script>
const BASES=["https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/","https://raw.githubusercontent.com/Hydra-Network/hydra-assets/main/"];
const DATA_URLS=["https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/gmes.json","https://raw.githubusercontent.com/Hydra-Network/hydra-assets/main/gmes.json"];

let zones=[],filtered=[],current=null,heroZones=[],heroIdx=0,heroTimer=null;
let cat='all',tag=null,sort='name';

// Simple cache
const cache={};

async function fetchData(){
  for(let url of DATA_URLS){
    try{
      let r=await fetch(url);
      if(!r.ok)continue;
      let data=await r.json();
      let seen=new Set();
      return data.filter(g=>{
        let k=(g.file_name||'').toLowerCase().trim();
        if(!k||seen.has(k))return false;
        seen.add(k);return true;
      });
    }catch(e){}
  }
  return [];
}

async function init(){
  zones=await fetchData();
  heroZones=zones.filter(z=>z.featured).slice(0,5);
  if(!heroZones.length)heroZones=zones.slice(0,5);
  buildHero();
  buildTags();
  applyFilters();
}

function buildHero(){
  if(!heroZones.length)return;
  let dots=document.getElementById('heroDots');
  dots.innerHTML='';
  heroZones.forEach((_,i)=>{
    let d=document.createElement('div');
    d.className='hero-dot'+(i===0?' active':'');
    d.onclick=()=>setHero(i);
    dots.appendChild(d);
  });
  setHero(0);
  heroTimer=setInterval(()=>setHero((heroIdx+1)%heroZones.length),4000);
}

function setHero(i){
  heroIdx=i;
  let z=heroZones[i];
  document.getElementById('heroTitle').textContent=z.title||z.name||z.file_name;
  document.getElementById('heroAuthor').textContent='by '+(z.author||'Hydra');
  let img=document.getElementById('heroImg');
  if(z.thumb){
    let url=BASES[0]+z.thumb.replace(/^\/+/,'');
    img.src=url;
    img.onerror=()=>{img.src=BASES[1]+z.thumb.replace(/^\/+/,'')};
  }else{
    img.src='';
  }
  document.getElementById('heroPlayBtn').onclick=()=>openGame(z);
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

function buildTags(){
  let tags=new Set();
  zones.forEach(z=>{if(Array.isArray(z.special))z.special.forEach(t=>tags.add(t))});
  let cloud=document.getElementById('tagCloud');
  cloud.innerHTML='';
  [...tags].slice(0,15).forEach(t=>{
    let p=document.createElement('span');
    p.className='tag-pill';
    p.textContent=t;
    p.onclick=()=>{
      tag=tag===t?null:t;
      document.querySelectorAll('.tag-pill').forEach(x=>x.classList.remove('active'));
      if(tag)p.classList.add('active');
      applyFilters();
    };
    cloud.appendChild(p);
  });
}

function setTab(el,tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function setCategory(el,c){
  cat=c;
  document.querySelectorAll('.sidebar-item[data-cat]').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters(){
  let q=document.getElementById('searchInput').value.toLowerCase();
  sort=document.getElementById('sortSelect').value;
  
  filtered=zones.filter(z=>{
    let name=(z.title||z.name||z.file_name||'').toLowerCase();
    if(q&&!name.includes(q))return false;
    if(tag&&!(z.special||[]).includes(tag))return false;
    if(cat==='featured'&&!z.featured)return false;
    return true;
  });
  
  if(sort==='name')filtered.sort((a,b)=>(a.title||a.name||a.file_name||'').localeCompare(b.title||b.name||b.file_name||''));
  else if(sort==='name-desc')filtered.sort((a,b)=>(b.title||b.name||b.file_name||'').localeCompare(a.title||a.name||a.file_name||''));
  else if(sort==='id')filtered.sort((a,b)=>(b.id||0)-(a.id||0));
  
  renderGrid();
}

function renderGrid(){
  let grid=document.getElementById('gameGrid');
  document.getElementById('gameCount').textContent=filtered.length;
  document.getElementById('sectionTitle').textContent=cat==='featured'?'Featured':'All Games';
  
  if(!filtered.length){
    grid.innerHTML='<div class="status-msg">No games found</div>';
    return;
  }
  
  // Use DocumentFragment for better performance
  let frag=document.createDocumentFragment();
  
  filtered.forEach(z=>{
    let card=document.createElement('div');
    card.className='game-card';
    let name=z.title||z.name||z.file_name||'';
    let author=z.author||'Hydra';
    let tags=Array.isArray(z.special)?z.special.slice(0,2):[];
    
    card.innerHTML=`
      <div class="card-thumb-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M6 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-2ZM14.5 10a.5.5 0 0 0-.5.5v2a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-2a.5.5 0 0 0-.5-.5h-2ZM8 6v2M10 4v2"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-name" title="${name}">${name}</div>
        <div class="card-author">${author}</div>
        ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="card-tag-mini">${t}</span>`).join('')}</div>`:''}
      </div>
      <div class="card-footer">
        <button class="card-play">Play</button>
      </div>`;
    
    card.querySelector('.card-play').onclick=e=>{e.stopPropagation();openGame(z)};
    card.onclick=()=>showInfo(z);
    frag.appendChild(card);
    
    // Load image async
    if(z.thumb)loadThumb(card,z.thumb);
  });
  
  grid.innerHTML='';
  grid.appendChild(frag);
}

function loadThumb(card,thumb){
  let img=new Image();
  img.className='card-thumb';
  let url=BASES[0]+thumb.replace(/^\/+/,'');
  img.onload=()=>{
    let placeholder=card.querySelector('.card-thumb-placeholder');
    if(placeholder)placeholder.replaceWith(img);
  };
  img.onerror=()=>{
    img.src=BASES[1]+thumb.replace(/^\/+/,'');
  };
  img.src=url;
}

async function openGame(z){
  current=z;
  document.getElementById('viewerTitle').textContent=z.title||z.name||z.file_name;
  document.getElementById('viewerAuthor').textContent='by '+(z.author||'Hydra');
  document.getElementById('viewer').style.display='flex';
  document.getElementById('infoOverlay').style.display='none';
  
  let frame=document.getElementById('gameFrame');
  frame.src='about:blank';
  
  for(let base of BASES){
    try{
      let r=await fetch(base+'gmes/'+z.file_name+'?t='+Date.now());
      if(!r.ok)continue;
      let html=await r.text();
      frame.contentDocument.open();
      frame.contentDocument.write(html);
      frame.contentDocument.close();
      return;
    }catch(e){}
  }
  alert('Failed to load game');
}

function closeGame(){
  document.getElementById('viewer').style.display='none';
  let f=document.getElementById('gameFrame');
  f.src='about:blank';
}

function fullscreenGame(){
  let f=document.getElementById('gameFrame');
  (f.requestFullscreen||f.webkitRequestFullscreen||f.msRequestFullscreen)?.call(f);
}

async function openNewTab(){
  if(!current)return;
  let w=window.open('about:blank','_blank');
  for(let base of BASES){
    try{
      let r=await fetch(base+'gmes/'+current.file_name+'?t='+Date.now());
      if(!r.ok)continue;
      let html=await r.text();
      w.document.open();w.document.write(html);w.document.close();return;
    }catch(e){}
  }
}

async function downloadGame(){
  if(!current)return;
  for(let base of BASES){
    try{
      let r=await fetch(base+'gmes/'+current.file_name+'?t='+Date.now());
      if(!r.ok)continue;
      let text=await r.text();
      let a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([text],{type:'text/html'}));
      a.download=(current.title||current.file_name)+'.html';
      a.click();
      URL.revokeObjectURL(a.href);
      return;
    }catch(e){}
  }
}

function showInfo(z){
  current=z;
  let name=z.title||z.name||z.file_name||'';
  document.getElementById('infoTitle').textContent=name;
  document.getElementById('infoAuthor').textContent='by '+(z.author||'Hydra');
  document.getElementById('infoFile').textContent=z.file_name;
  
  let img=document.getElementById('infoCover');
  if(z.thumb){
    img.src=BASES[0]+z.thumb.replace(/^\/+/,'');
    img.onerror=()=>{img.src=BASES[1]+z.thumb.replace(/^\/+/,'')};
  }
  
  let tags=Array.isArray(z.special)?z.special:[];
  document.getElementById('infoTags').innerHTML=tags.map(t=>`<span class="info-tag">${t}</span>`).join('');
  document.getElementById('infoTagRow').style.display=tags.length?'':'none';
  document.getElementById('infoPlayBtn').onclick=()=>openGame(z);
  document.getElementById('infoOverlay').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('viewer').style.display==='flex')closeGame();
    document.getElementById('infoOverlay').style.display='none';
  }
});

init().catch(err=>{
  document.getElementById('gameGrid').innerHTML='<div class="status-msg" style="color:#c94444">Failed to load: '+err.message+'</div>';
});
</script>
</body>
</html>
