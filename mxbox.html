
<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Emscripten App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#000;z-index:10}
#status{font-size:14px;margin-bottom:12px;color:#aaa}
#progress-container{width:320px;height:8px;background:#222;border-radius:4px;overflow:hidden}
#progress-bar{width:0%;height:100%;background:#4caf50;transition:width .2s ease}
#canvas{display:block;background:#000;outline:none}
</style>
</head>

<body>

<div id="loading">
<div id="status">Downloading...</div>
<div id="progress-container">
<div id="progress-bar"></div>
</div>
</div>

<canvas id="canvas" tabindex="-1"></canvas>

<script>
const canvas=document.getElementById("canvas")
const statusText=document.getElementById("status")
const progressBar=document.getElementById("progress-bar")
const loadingDiv=document.getElementById("loading")

function resizeCanvas(){
const dpr=window.devicePixelRatio||1
const w=window.innerWidth
const h=window.innerHeight
canvas.style.width=w+"px"
canvas.style.height=h+"px"
canvas.width=Math.floor(w*dpr)
canvas.height=Math.floor(h*dpr)
}

window.addEventListener("resize",resizeCanvas)

function hardResize(){
resizeCanvas()
requestAnimationFrame(resizeCanvas)
setTimeout(resizeCanvas,50)
setTimeout(resizeCanvas,200)
setTimeout(resizeCanvas,500)
}

function setStatus(text){
const m=text.match(/([^(]+)\((\d+)\/(\d+)\)/)
if(m){
const loaded=parseInt(m[2])
const total=parseInt(m[3])
const pct=(loaded/total)*100
progressBar.style.width=pct+"%"
statusText.textContent=m[1]+" "+Math.round(pct)+"%"
}else if(!text){
progressBar.style.width="100%"
statusText.textContent="Running"
setTimeout(()=>{
loadingDiv.style.display="none"
canvas.focus()
hardResize()
},200)
}else{
statusText.textContent=text
}
}

let cachedData=null

function loadData(){
const xhr=new XMLHttpRequest()
xhr.open("GET","https://nostaligafun.pages.dev/games/games-accualy/OTHER/MinecraftLegacyConsoleEdition_Data/Minecraft.Client.data",true)
xhr.responseType="arraybuffer"

xhr.onprogress=e=>{
if(e.lengthComputable){
const pct=(e.loaded/e.total)*100
progressBar.style.width=pct+"%"
statusText.textContent="Downloading "+Math.round(pct)+"%"
}
}

xhr.onload=()=>{
cachedData=xhr.response
statusText.textContent="Compiling shaders..."
startGame()
}

xhr.onerror=()=>{
statusText.textContent="Download failed"
}

xhr.send()
}

function startGame(){
const script=document.createElement("script")
script.src="Minecraft.Client.js"
script.onload=()=>{
hardResize()
}
document.body.appendChild(script)
}

var Module={
canvas:canvas,
setStatus:setStatus,
preRun:[hardResize],
onRuntimeInitialized(){
hardResize()
},
monitorRunDependencies(left){
this.totalDependencies=Math.max(this.totalDependencies||0,left)
setStatus(left?"Preparing... ("+(this.totalDependencies-left)+"/"+this.totalDependencies+")":"")
},
getPreloadedPackage(){
return cachedData
}
}

hardResize()
setStatus("Downloading...")
loadData()
</script>

</body>
</html>
