<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ultimate Game Hub · ultra</title>
  <style>
    :root {
      --p: #8fdcff;
      --a2: #a78bfa;
      --bg: #0a0a0f;
      --sur: rgba(255, 255, 255, 0.05);
      --bor: rgba(255, 255, 255, 0.08);
      --mut: rgba(255, 255, 255, 0.5);
      --r: 10px;
      --card-min: 130px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--p) #1a1a24;
      -webkit-tap-highlight-color: transparent;
    }
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-thumb { background: var(--p); border-radius: 3px; }

    header {
      position: sticky; top: 0; z-index: 500;
      background: #0d0d14;
      border-bottom: 1px solid var(--bor);
      padding: 8px 12px;
    }
    .hi {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .logo {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, var(--p), var(--a2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; white-space: nowrap; letter-spacing: -0.3px;
    }
    input, select {
      padding: 6px 10px; border: 1px solid var(--bor); border-radius: var(--r);
      background: #12121c; color: #fff; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    input { flex: 1; min-width: 140px; }
    input:focus { border-color: var(--p); }
    input::placeholder { color: var(--mut); }
    select option { background: #12121c; }
    #favBtn {
      padding: 6px 12px; border: 1px solid rgba(251, 191, 36, 0.5);
      border-radius: var(--r); background: rgba(251, 191, 36, 0.08);
      color: #fbbf24; font-size: 12px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .gc { color: var(--mut); font-size: 11px; white-space: nowrap; margin-left: auto; }

    main { max-width: 1400px; margin: 0 auto; padding: 16px 12px 30px; }
    .sec { margin-bottom: 24px; }
    .sh { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--bor); }
    .si { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; background: var(--sur); }
    .st { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.2px; }
    .sct { margin-left: auto; color: var(--mut); font-size: 10px; background: var(--sur); padding: 2px 8px; border-radius: 20px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min), 1fr));
      gap: 8px;
    }
    .card {
      position: relative; aspect-ratio: 1 / 1; border-radius: var(--r);
      overflow: hidden; cursor: pointer; border: 1px solid var(--bor);
      background: #1a1a26;
      transition: border-color 0.12s;
    }
    .card:hover { border-color: var(--p); z-index: 2; }
    .card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      background: #0f0f17;
    }
    .ct {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 600;
      text-align: center; padding: 6px; opacity: 0; transition: opacity 0.15s;
      background: rgba(0,0,0,0.75); z-index: 2; pointer-events: none;
    }
    .card:hover .ct { opacity: 1; }
    .cf {
      position: absolute; top: 5px; right: 5px; z-index: 5;
      background: rgba(0,0,0,0.6); border: none; color: #ccc;
      font-size: 15px; width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.12s, color 0.12s; line-height: 1;
    }
    .card:hover .cf, .cf.on { opacity: 1; }
    .cf.on { color: #fbbf24; }

    .sba {
      position: absolute; top: 5px; left: 5px; padding: 2px 6px;
      border-radius: 5px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px; z-index: 3;
    }
    .bgn{background:rgba(140,220,255,0.2);color:#8fdcff}
    .bgt{background:rgba(255,107,107,0.2);color:#ff6b6b}
    .bgh{background:rgba(167,139,250,0.2);color:#a78bfa}
    .bgno{background:rgba(74,222,128,0.2);color:#4ade80}
    .bgs{background:rgba(251,191,36,0.2);color:#fbbf24}
    .cn{color:#8fdcff}.ct2{color:#ff6b6b}.ch{color:#a78bfa}.cno{color:#4ade80}.cs{color:#fbbf24}
    .ibn{background:rgba(140,220,255,0.12)}.ibt{background:rgba(255,107,107,0.12)}.ibh{background:rgba(167,139,250,0.12)}.ibno{background:rgba(74,222,128,0.12)}.ibs{background:rgba(251,191,36,0.12)}

    /* Placeholder tile when image fails */
    .card-placeholder {
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#1a1a2e,#16213e);
      font-size:28px;user-select:none;
    }

    .ld { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 24px; color: var(--mut); font-size: 13px; grid-column: 1/-1; }
    .err-banner { display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);border-radius:var(--r);color:#ff6b6b;font-size:12px;grid-column:1/-1; }
    .sp { width: 22px; height: 22px; border: 2px solid rgba(140,220,255,0.15); border-top-color: var(--p); border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #gameOverlay {
      position: fixed; inset: 0; background: #000; z-index: 9999;
      display: none; flex-direction: column;
    }
    #gameOverlay.active { display: flex; }
    #gameHeader {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: #0d0d14; border-bottom: 1px solid var(--bor); flex-shrink: 0;
    }
    #gameTitle { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 10px; }
    #gameClose {
      background: rgba(255,107,107,0.2); border: 1px solid rgba(255,107,107,0.4);
      color: #ff6b6b; padding: 5px 12px; border-radius: var(--r);
      cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.15s;
    }
    #gameFrame { flex: 1; width: 100%; height: 100%; border: none; background: #000; display: block; }
    #gameLoader {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      display: flex; flex-direction: column; align-items: center; gap: 12px; pointer-events: none;
    }
    #gameErrMsg {
      display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      background:#0d0d14;border:1px solid var(--bor);border-radius:var(--r);
      padding:20px 28px;text-align:center;color:#ff6b6b;font-size:13px;
    }

    #fp { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 8000; display: none; align-items: flex-start; justify-content: flex-end; }
    .fd { width: min(360px,100vw); height: 100%; background: #0d0d14; border-left: 1px solid var(--bor); display: flex; flex-direction: column; animation: sli 0.15s ease; }
    @keyframes sli { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .fh { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--bor); }
    .fl { overflow-y: auto; flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .fi { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 9px; background: var(--sur); border: 1px solid var(--bor); cursor: pointer; }
    .fi img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }

    @media(max-width:680px) {
      :root { --card-min: 100px; }
      input { order: 3; width: 100%; min-width: unset; }
    }
  </style>
</head>

<div id="gameOverlay">
  <div id="gameHeader">
    <span id="gameTitle">Game</span>
    <button id="gameClose">✕ Close</button>
  </div>
  <div style="position:relative;flex:1;">
    <iframe id="gameFrame" allow="autoplay; fullscreen; gamepad; camera; microphone; accelerometer; gyroscope" allowfullscreen loading="lazy"></iframe>
    <div id="gameLoader"><div class="sp"></div><span style="color:var(--mut);font-size:13px">Loading…</span></div>
    <div id="gameErrMsg">⚠️ Could not load this game.<br><span style="color:var(--mut);font-size:11px;margin-top:6px;display:block">Try opening it in a new tab.</span><br><button id="openExtBtn" style="margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid var(--bor);background:var(--sur);color:#fff;cursor:pointer;font-size:12px;">Open in New Tab</button></div>
  </div>
</div>

<header>
  <div class="hi">
    <div class="logo">🎮 GameHub</div>
    <input type="text" id="sb" placeholder="Search games…" autocomplete="off">
    <select id="so"><option value="name">A–Z</option><option value="source">Source</option></select>
    <select id="fs">
      <option value="all">All</option>
      <option value="gnmath">GN-Math</option>
      <option value="t9">T9</option>
      <option value="hydra">Hydra</option>
      <option value="noah">Noah's</option>
      <option value="seabean">UGS</option>
      <option value="favorites">⭐ Favorites</option>
    </select>
    <button id="favBtn">⭐ <span id="fc2">0</span></button>
    <span class="gc" id="totalc">···</span>
  </div>
</header>

<main id="mainContent"></main>

<div id="fp">
  <div class="fd">
    <div class="fh"><h2 style="color:#fbbf24;font-size:1rem;">⭐ Favorites</h2><button id="closeFpBtn" style="background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;">✕</button></div>
    <div class="fl" id="fl"></div>
  </div>
</div>

  const NOAH_TITLES = ["Alien Hominid","Customer Support","The Deadseat","Fireboy & Watergirl","Pizza Tower","Bloons TD 1","Bloons TD 2","Bloons TD 3","Bloons TD 4","Bloons TD 5","Geometry Dash","Friday Night Funkin","Plants vs Zombies","Subway Surfers","Temple Run 2","Happy Wheels","Granny","Slope","Cookie Clicker","FNAF","FNAF 2","FNAF 3","FNAF 4","Undertale","Deltarune","Binding of Isaac","Portal","Doom","Minecraft","Terraria","Earn to Die","Earn to Die 2","Bart Blast","Bendy and the Ink Machine","Gacha Life","Among Us","Yandere Simulator","Quake III","Angry Birds","Candy Crush","Flappy Bird","Super Mario 64","Half Life","Jetpack Joyride","Slime Rancher","Cup Head","Rocket League","Street Fighter II","Fallout","Hollow Knight","Celeste","Hotline Miami","Getting Over It","Doki Doki Literature Club","Baldi's Basics","Granny 3","Granny 2","Kindergarten","Kindergarten 2","Kindergarten 3","Raft","Slender","Buckshot Roulette","WebFishing","ULTRAKILL","That's Not My Neighbor"];

  // Game icon emoji fallback pool (used when img fails to load)
  const EMOJI_POOL = ['🎮','🕹️','👾','🎲','🏆','⚔️','🚀','🔫','🧩','🏎️','⚽','🎯','🧸','🌍','🔮','💥','🦊','🐉','👻','🎳'];
  function emojiFor(name) { let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0; return EMOJI_POOL[h%EMOJI_POOL.length]; }

  const FK = 'ugh-favs-v1';
  let allGames = [];
  let favs = new Set();
  let currentGameUrl = '';

  const $ = id => document.getElementById(id);
  const main      = $('mainContent');
  const gameOverlay = $('gameOverlay');
  const gameFrame   = $('gameFrame');
  const gameTitle   = $('gameTitle');
  const gameLoader  = $('gameLoader');
  const gameErrMsg  = $('gameErrMsg');

  /* ── FAVORITES ── */
  function loadFavs() { try { const r=localStorage.getItem(FK); if(r) favs=new Set(JSON.parse(r)); } catch{} }
  function saveFavs() { try { localStorage.setItem(FK,JSON.stringify([...favs])); } catch{} }
  function gk(g) { return g.source+':'+g.id; }
  function isFav(g) { return favs.has(gk(g)); }

  /* ── SECTIONS ── */
  function buildSections() {
    main.innerHTML = '';
    const sources = ['gnmath','t9','hydra','noah','seabean'];
    const labels  = {gnmath:'GN-Math',t9:'T9',hydra:'Hydra',noah:"Noah's",seabean:'Sea Bean'};
    const icons   = {gnmath:'🌐',t9:'🔥',hydra:'⚡',noah:'📚',seabean:'🌊'};
    sources.forEach(src => {
      const sec = document.createElement('div');
      sec.className='sec'; sec.id='sec-'+src;
      sec.innerHTML=`<div class="sh"><div class="si ib${src.slice(0,2)}">${icons[src]}</div><span class="st c${src.slice(0,2)}">${labels[src]} Games</span><span class="sct" id="c-${src}">0</span></div><div id="cn-${src}" class="cards"><div class="ld"><div class="sp"></div>Loading…</div></div>`;
      main.appendChild(sec);
    });
  }

  const BADGE = {gnmath:'bgn',t9:'bgt',hydra:'bgh',noah:'bgno',seabean:'bgs'};

  function buildCard(g) {
    const card = document.createElement('div');
    card.className='card';
    card.dataset.name=g.name.toLowerCase();
    card.dataset.source=g.source;
    card.dataset.gk=gk(g);

    const badge=document.createElement('span');
    badge.className='sba '+(BADGE[g.source]||'bgn');
    badge.textContent=g.source.substring(0,2).toUpperCase();

    // Cover image — falls back to emoji placeholder on error
    const imgWrap=document.createElement('div');
    imgWrap.style.cssText='width:100%;height:100%;position:relative;';

    if (g.cover) {
      const img=document.createElement('img');
      img.src=g.cover;
      img.alt=g.name;
      img.loading='lazy';
      img.decoding='async';
      img.onerror=function(){
        this.style.display='none';
        const ph=document.createElement('div');
        ph.className='card-placeholder';
        ph.textContent=emojiFor(g.name);
        imgWrap.appendChild(ph);
      };
      imgWrap.appendChild(img);
    } else {
      const ph=document.createElement('div');
      ph.className='card-placeholder';
      ph.textContent=emojiFor(g.name);
      imgWrap.appendChild(ph);
    }

    const label=document.createElement('div');
    label.className='ct';
    label.textContent=g.name;

    const fav=document.createElement('button');
    fav.className='cf'+(isFav(g)?' on':'');
    fav.textContent=isFav(g)?'★':'☆';
    fav.title='Favorite';

    card.appendChild(badge);
    card.appendChild(imgWrap);
    card.appendChild(label);
    card.appendChild(fav);
    return card;
  }

  const gameMaps = {};

  function renderSection(key, games, errorMsg) {
    const container=$('cn-'+key);
    if(!container) return;
    const countEl=$('c-'+key);

    if(errorMsg) {
      container.innerHTML=`<div class="err-banner">⚠️ ${errorMsg}</div>`;
      if(countEl) countEl.textContent='!';
      return;
    }
    if(!games.length) {
      container.innerHTML='<div class="ld">No games found</div>';
      if(countEl) countEl.textContent='0';
      return;
    }

    const map=new Map();
    const frag=document.createDocumentFragment();
    games.forEach(g=>{map.set(gk(g),g);frag.appendChild(buildCard(g));});
    gameMaps[key]=map;
    container.innerHTML='';
    container.appendChild(frag);
    if(countEl) countEl.textContent=games.length;

    container.addEventListener('click',e=>{
      const card=e.target.closest('.card');
      if(!card) return;
      const g=map.get(card.dataset.gk);
      if(!g) return;
      if(e.target.closest('.cf')) {
        e.stopPropagation();
        const k=gk(g);
        favs.has(k)?favs.delete(k):favs.add(k);
        saveFavs();
        const btn=card.querySelector('.cf');
        btn.textContent=favs.has(k)?'★':'☆';
        btn.classList.toggle('on',favs.has(k));
        $('fc2').textContent=favs.size;
      } else {
        openGame(g);
      }
    });
  }

  function updateCounts() {
    let total=0;
    ['gnmath','t9','hydra','noah','seabean'].forEach(s=>{
      const n=allGames.filter(g=>g.source===s).length;
      const el=$('c-'+s);
      if(el&&el.textContent!=='!') el.textContent=n;
      total+=n;
    });
    $('totalc').textContent=total+' games';
  }

  /* ── FILTER / SORT ── */
  let filterRaf=0;
  function filterAll() {
    if(filterRaf) cancelAnimationFrame(filterRaf);
    filterRaf=requestAnimationFrame(()=>{
      const query=($('sb').value||'').toLowerCase();
      const sourceFilter=$('fs').value;
      const isFavFilter=sourceFilter==='favorites';
      const isAll=sourceFilter==='all';
      const sectionVisible={gnmath:0,t9:0,hydra:0,noah:0,seabean:0};
      const sectionTotal  ={gnmath:0,t9:0,hydra:0,noah:0,seabean:0};
      for(const card of main.querySelectorAll('.card')){
        const src=card.dataset.source;
        sectionTotal[src]=(sectionTotal[src]||0)+1;
        const nameOk=!query||card.dataset.name.includes(query);
        const srcOk =isAll?true:isFavFilter?favs.has(card.dataset.gk):src===sourceFilter;
        const show  =nameOk&&srcOk;
        card.style.display=show?'':'none';
        if(show) sectionVisible[src]=(sectionVisible[src]||0)+1;
      }
      ['gnmath','t9','hydra','noah','seabean'].forEach(s=>{
        const sec=$('sec-'+s);
        if(sec) sec.style.display=(sectionTotal[s]>0&&sectionVisible[s]===0)?'none':'';
      });
      filterRaf=0;
    });
  }

  function sortAll() {
    const by=$('so').value;
    ['gnmath','t9','hydra','noah','seabean'].forEach(s=>{
      const container=$('cn-'+s);
      if(!container) return;
      const cards=[...container.querySelectorAll('.card')];
      cards.sort((a,b)=>{
        const va=by==='name'?a.dataset.name:a.dataset.source;
        const vb=by==='name'?b.dataset.name:b.dataset.source;
        return va.localeCompare(vb);
      });
      const frag=document.createDocumentFragment();
      cards.forEach(c=>frag.appendChild(c));
      container.appendChild(frag);
    });
  }

  /* ── GAME LAUNCHER ──
     Strategy:
     1. T9 games and external URLs → set iframe.src directly (no fetch needed).
     2. Hydra / GN / Noah / Sea → try fetch + blob first to handle CORS games.
        On redirect error or fetch failure, fall back to setting iframe.src directly.
        If all fail, show the error panel with "Open in New Tab" option.
  ── */
  function showGameError(url) {
    gameLoader.style.display='none';
    gameErrMsg.style.display='block';
    currentGameUrl=url;
  }

  function hideGameError() {
    gameErrMsg.style.display='none';
  }

  function openGame(g) {
    // External games (not jsDelivr/githack CDN) open in new tab
    const isExternal = g.ext ||
      (g.url && g.url.startsWith('http') &&
       !g.url.includes('jsdelivr') &&
       !g.url.includes('githack') &&
       !g.url.includes('raw.githubusercontent'));

    if(isExternal) { window.open(g.url,'_blank'); return; }

    gameOverlay.classList.add('active');
    gameTitle.textContent=g.name;
    gameLoader.style.display='flex';
    hideGameError();
    document.body.style.overflow='hidden';
    currentGameUrl=g.url;

    // T9: direct src (they are local relative paths)
    if(g.source==='t9') {
      gameFrame.src=g.url;
      return;
    }

    // Multi-CDN for Hydra
    let urls=[g.url];
    if(g.source==='hydra') {
      const file=g.url.split('gmes/').pop();
      urls=HB.map(b=>b+'gmes/'+file);
    }

    tryLoadGame(urls, 0, g.name, g.url);
  }

  // jsDelivr returns 200 OK but body = "Couldn't find the requested file /N.html in repo/html."
  // when the file doesn't exist at a pinned SHA. Detect it and swap to @main — same logic as gn-math.dev.
  function gnMainFallback(url) {
    // Replace any @<sha> segment in a jsdelivr gh URL with @main
    return url.replace(/(cdn\.jsdelivr\.net\/gh\/[^@]+)@[a-f0-9]{7,40}\//, '$1@main/');
  }

  async function tryLoadGame(urls, index, name, fallbackUrl) {
    if(index>=urls.length) {
      // All CDN attempts failed — try direct iframe src as last resort
      const last=fallbackUrl||urls[0];
      gameLoader.style.display='flex';
      gameFrame.src=last;
      return;
    }

    const url=urls[index];
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);

    try {
      const res=await fetch(url, {signal:ctrl.signal, redirect:'follow'});
      clearTimeout(timer);
      if(!res.ok) throw new Error('HTTP '+res.status);
      let html=await res.text();

      // jsDelivr 200 + "Couldn't find the requested file" — file missing at this SHA
      if(html.trimStart().startsWith("Couldn't find the requested file")) {
        const mainUrl=gnMainFallback(url);
        if(mainUrl !== url) {
          // Retry with @main (same fallback gn-math.dev uses)
          const r2=await fetch(mainUrl+'?t='+Date.now(), {redirect:'follow'});
          if(r2.ok) html=await r2.text();
          else throw new Error('main fallback HTTP '+r2.status);
        } else {
          throw new Error('file not found and no SHA to replace');
        }
      }

      // Still got the error after @main retry? Bail to next URL.
      if(html.trimStart().startsWith("Couldn't find the requested file")) {
        throw new Error('file not found on @main either');
      }

      const blob=new Blob([html],{type:'text/html'});
      const blobUrl=URL.createObjectURL(blob);
      if(gameFrame._blobUrl) URL.revokeObjectURL(gameFrame._blobUrl);
      gameFrame._blobUrl=blobUrl;
      gameFrame.src=blobUrl;
    } catch(e) {
      clearTimeout(timer);
      tryLoadGame(urls, index+1, name, fallbackUrl);
    }
  }

  function closeGame() {
    if(gameFrame._blobUrl){URL.revokeObjectURL(gameFrame._blobUrl);delete gameFrame._blobUrl;}
    gameFrame.src='about:blank';
    gameOverlay.classList.remove('active');
    gameLoader.style.display='none';
    hideGameError();
    document.body.style.overflow='';
    currentGameUrl='';
  }

  gameFrame.addEventListener('load',()=>{ gameLoader.style.display='none'; hideGameError(); });
  gameFrame.addEventListener('error',()=>{ showGameError(currentGameUrl); });
  $('gameClose').onclick=closeGame;
  $('openExtBtn').onclick=()=>{ if(currentGameUrl) window.open(currentGameUrl,'_blank'); };
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&gameOverlay.classList.contains('active')) closeGame(); });

  /* ── FAV PANEL ── */
  function renderFavPanel() {
    const list=$('fl');
    list.innerHTML='';
    const favGames=allGames.filter(g=>favs.has(gk(g)));
    if(!favGames.length){list.innerHTML='<div style="color:var(--mut);text-align:center;padding:24px;">No favorites yet</div>';return;}
    const frag=document.createDocumentFragment();
    favGames.forEach(g=>{
      const div=document.createElement('div');
      div.className='fi';
      if(g.cover){
        div.innerHTML=`<img src="${g.cover}" alt="${g.name}" onerror="this.outerHTML='<div style=\\'width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;\\'>🎮</div>'"><div style="flex:1"><div style="font-weight:600;font-size:13px">${g.name}</div><div style="font-size:10px;color:var(--mut)">${g.source}</div></div><button class="fr" style="background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;">✕</button>`;
      } else {
        div.innerHTML=`<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;">🎮</div><div style="flex:1"><div style="font-weight:600;font-size:13px">${g.name}</div><div style="font-size:10px;color:var(--mut)">${g.source}</div></div><button class="fr" style="background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;">✕</button>`;
      }
      div.querySelector('.fr').onclick=e=>{e.stopPropagation();favs.delete(gk(g));saveFavs();$('fc2').textContent=favs.size;renderFavPanel();};
      div.onclick=()=>{closeFP();openGame(g);};
      frag.appendChild(div);
    });
    list.appendChild(frag);
  }

  function openFP(){$('fp').style.display='flex';renderFavPanel();document.body.style.overflow='hidden';}
  function closeFP(){$('fp').style.display='none';document.body.style.overflow='';}
  $('favBtn').onclick=openFP;
  $('closeFpBtn').onclick=closeFP;
  $('fp').addEventListener('click',e=>{if(e.target===$('fp'))closeFP();});

  /* ── DATA LOADERS ── */

  // Mirrors the SHA resolution from the actual gn-math.dev site:
  //   1. Try GitHub API for latest commit SHA -> versioned zones URL
  //   2. Fall back to sha.txt (gn-math xml repo)
  //   3. Fall back to @latest zones URL
  // HTML URL is resolved the same way (SHA -> @main fallback).
  async function loadGN() {
    const cfg = GN_CONFIG;
    let zonesURL = cfg.zonesBase;
    let htmlURL  = cfg.htmlFallback;

    // Step 1: try GitHub API for SHA
    try {
      const shaRes = await fetch(cfg.shaAPI + '?t=' + Date.now());
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        const sha = shaJson[0]?.sha;
        if (sha) {
          zonesURL = 'https://cdn.jsdelivr.net/gh/freebuisness/assets@' + sha + '/zones.json';
          htmlURL  = cfg.htmlURLBase + sha;
        }
      } else throw new Error('SHA API ' + shaRes.status);
    } catch(e1) {
      // Step 2: fall back to sha.txt
      try {
        const txtRes = await fetch(cfg.shaTxt + '?t=' + Date.now());
        if (txtRes.ok) {
          const sha = (await txtRes.text()).trim();
          if (sha) {
            zonesURL = 'https://cdn.jsdelivr.net/gh/freebuisness/assets@' + sha + '/zones.json';
            htmlURL  = cfg.htmlURLBase + sha;
          }
        }
      } catch(e2) {
        console.warn('GN SHA fallbacks failed, using @latest:', e2.message);
      }
    }

    // Step 3: fetch zones
    try {
      const res = await fetch(zonesURL + '?t=' + Date.now(), { redirect: 'follow' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error('bad data');
      const games = data.map(z => ({
        id:     String(z.id),
        name:   z.name,
        cover:  (z.cover||'').replace('{COVER_URL}', cfg.coverURL).replace('{HTML_URL}', htmlURL),
        url:    (z.url||'').replace('{COVER_URL}', cfg.coverURL).replace('{HTML_URL}', htmlURL),
        source: 'gnmath'
      }));
      return { games, anyFailed: false };
    } catch(e) {
      console.warn('GN zones fetch failed:', e.message);
      return { games: [], anyFailed: true };
    }
  }

  async function loadHydra() {
    for(const base of HB) {
      try {
        const res=await fetch(base+'gmes.json?t='+Date.now(),{redirect:'follow'});
        if(!res.ok) continue;
        const data=await res.json();
        if(!Array.isArray(data)) continue;
        const seen=new Set(),games=[];
        data.forEach(g=>{
          const k=(g.file_name||'').toLowerCase().trim();
          if(!k||seen.has(k)) return;
          seen.add(k);
          games.push({
            id:k,name:g.title||g.file_name,
            cover:(g.thumb||'').replace(/^\//,'') ? HB[0]+g.thumb.replace(/^\//,'') : '',
            url:base+'gmes/'+g.file_name,source:'hydra'
          });
        });
        return games;
      } catch{}
    }
    return [];
  }

  async function loadNoah() {
    const games=[];
    try {
      const res=await fetch(BESTSAB_API+'?t='+Date.now(),{redirect:'follow'});
      if(res.ok) {
        const data=await res.json();
        if(Array.isArray(data)) {
          data.forEach((g,i)=>games.push({
            id:'bs'+i,name:g.name||'?',
            cover:(g.cover||'').replace('{COVER_URL}',BESTSAB_COVER).replace('{HTML_URL}',BESTSAB_HTML),
            url:(g.url||'').replace('{HTML_URL}',BESTSAB_HTML),
            source:'noah'
          }));
        }
      }
    } catch{}
    NOAH_TITLES.forEach((t,i)=>games.push({
      id:'noah'+i,name:t,
      cover:`${NOAH_BASE}/images/${(i%400)+1}.jpg`,
      url:`${NOAH_BASE}/games/${(i%400)+1}.html`,
      source:'noah'
    }));
    return games;
  }

  async function loadSea() {
    const games=[];
    try {
      const res=await fetch(SEA_JSON+'?t='+Date.now(),{redirect:'follow'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      data.forEach(e=>{
        let name=e.name||'';
        if(name.toLowerCase().startsWith('cl')) name=name.slice(2);
        let url=e.url||'',cover=e.cover||'';
        for(const [ph,v] of Object.entries(SEA_SRC)){url=url.replace(ph,v);cover=cover.replace(ph,v);}
        games.push({id:String(e.id||name),name,cover,url,source:'seabean'});
      });
    } catch(e){console.warn('Sea bean failed:',e.message);}
    return games;
  }

  function loadT9G() {
    return T9.map((g,i)=>({
      id:'t9'+i,
      name:g.name,
      // Only prefix cover with base if it's not already absolute
      cover: g.img.startsWith('http') ? g.img : (T9_COVER_BASE + g.img),
      url:g.href,
      source:'t9',
      ext:g.href.startsWith('http')
    }));
  }

  /* ── INIT ── */
  const yieldToMain=()=>new Promise(r=>setTimeout(r,0));

  async function init() {
    loadFavs();
    $('fc2').textContent=favs.size;
    buildSections();

    const [gnResult, t9g, hy, no, sea] = await Promise.all([
      loadGN(),
      Promise.resolve(loadT9G()),
      loadHydra(),
      loadNoah(),
      loadSea()
    ]);

    const {games: gn, anyFailed: gnFailed} = gnResult;

    allGames=[...gn,...t9g,...hy,...no,...sea];

    renderSection('gnmath', gn, gnFailed ? 'GN-Math source is currently unavailable (CDN returned an error). Other sources still work.' : null);
    await yieldToMain();
    renderSection('t9', t9g);
    await yieldToMain();
    renderSection('hydra', hy.length ? hy : [], hy.length===0 ? 'Hydra source unavailable right now.' : null);
    await yieldToMain();
    renderSection('noah', no);
    await yieldToMain();
    renderSection('seabean', sea);

    updateCounts();
  }

  let debounce=0;
  $('sb').addEventListener('input',()=>{clearTimeout(debounce);debounce=setTimeout(filterAll,100);});
  $('fs').addEventListener('change',filterAll);
  $('so').addEventListener('change',sortAll);

  init();
})();
</script>
