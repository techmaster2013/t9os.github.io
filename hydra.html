    <script>
        const container = document.getElementById('container');
        const zoneViewer = document.getElementById('zoneViewer');
        let zoneFrame = document.getElementById('zoneFrame');
        const searchBar = document.getElementById('searchBar');
        const sortOptions = document.getElementById('sortOptions');
        const filterOptions = document.getElementById('filterOptions');
        const tooltip = document.getElementById('tooltip');

        // ── Hydra Network source ──────────────────────────────────────────────
        const HYDRA_BASES = [
            "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/",
            "https://raw.githubusercontent.com/Hydra-Network/hydra-assets/main/",
            "https://raw.githack.com/Hydra-Network/hydra-assets/main/"
        ];

        const SOURCES = [
            {
                key: 'hydra',
                label: 'Hydra Network',
                zonesurls: [
                    "https://cdn.jsdelivr.net/gh/Hydra-Network/hydra-assets@main/gmes.json",
                    "https://raw.githubusercontent.com/Hydra-Network/hydra-assets/main/gmes.json",
                    "https://raw.githack.com/Hydra-Network/hydra-assets/main/gmes.json"
                ],
                gamePrefix: "gmes/",
                thumbPrefix: "/",
                bases: HYDRA_BASES
            }
        ];

        let zones = [];
        let popularityData = {};
        const featuredContainer = document.getElementById('featuredZones');

        function toTitleCase(str) {
            return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substring(1).toLowerCase());
        }

        // ── Fetch zones from Hydra Network ────────────────────────────────────
        async function fetchSourceZones(src) {
            for (const url of src.zonesurls) {
                try {
                    const res = await fetch(url);
                    if (!res.ok) continue;
                    const json = await res.json();
                    // Dedupe by file_name
                    const seen = new Set();
                    const deduped = json.filter(g => {
                        const key = (g.file_name || "").toLowerCase().trim();
                        if (!key || seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });
                    return deduped.map(g => ({ ...g, _source: src.key }));
                } catch {}
            }
            throw new Error("Failed to fetch zones from " + src.label);
        }

        // ── Build cover/game URLs for Hydra ───────────────────────────────────
        function getSrc(zone) {
            return SOURCES.find(s => s.key === zone._source) || SOURCES[0];
        }

        function resolveURL(zone) {
            const src = getSrc(zone);
            const base = src.bases[0];
            return base + src.gamePrefix + zone.file_name;
        }

        function resolveCover(zone) {
            // zone.thumb may be a path like "/gmes/thumb.png" or similar
            const src = getSrc(zone);
            if (!zone.thumb) return "";
            const clean = zone.thumb.replace(/^\/+/, '');
            return src.bases[0] + src.thumbPrefix + clean;
        }

        function buildImageWithFallback(zone) {
            if (!zone.thumb) return "";
            const src = getSrc(zone);
            const clean = zone.thumb.replace(/^\/+/, '');
            const urls = src.bases.map(b => b + src.thumbPrefix + clean);
            return urls[0];
        }

        // ── Load all sources ──────────────────────────────────────────────────
        async function listZones() {
            container.innerHTML = "Loading...";
            try {
                const results = await Promise.allSettled(SOURCES.map(src => fetchSourceZones(src)));
                zones = [];
                results.forEach((r, i) => {
                    if (r.status === 'fulfilled') {
                        if (i === 0 && r.value.length > 0) r.value[0].featured = true;
                        zones.push(...r.value);
                    }
                });

                sortZones();

                // Handle ?id= deep link
                const search = new URLSearchParams(window.location.search);
                const id = search.get('id');
                const srcParam = search.get('src');
                if (id) {
                    const zone = zones.find(z => (z.file_name === id || z.id + '' === id) && (!srcParam || z._source === srcParam));
                    if (zone) openZone(zone);
                }

                // Build tag filter from available data
                let alltags = [];
                for (const obj of zones) {
                    if (Array.isArray(obj.special)) alltags.push(...obj.special);
                }
                alltags = [...new Set(alltags)];
                const filteroption = document.getElementById("filterOptions");
                while (filteroption.children.length > 1) filteroption.removeChild(filteroption.lastElementChild);
                for (const tag of alltags) {
                    const opt = document.createElement("option");
                    opt.value = tag;
                    opt.textContent = toTitleCase(tag);
                    filteroption.appendChild(opt);
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = `Error loading games: ${error}`;
            }
        }

        // ── Sort & display ────────────────────────────────────────────────────
        function sortZones() {
            const sortBy = sortOptions.value;
            if (sortBy === 'name') {
                zones.sort((a, b) => (a.title || a.name || "").localeCompare(b.title || b.name || ""));
            } else if (sortBy === 'id') {
                zones.sort((a, b) => (a.id || 0) - (b.id || 0));
            }
            if (featuredContainer.innerHTML === "") {
                displayFeaturedZones(zones.filter(z => z.featured));
            }
            displayZones(zones);
        }

        function makeZoneItem(file) {
            const zoneItem = document.createElement("div");
            zoneItem.className = "zone-item";
            zoneItem.onclick = () => openZone(file);

            const img = document.createElement("img");
            const thumbUrl = resolveCover(file);
            img.dataset.src = thumbUrl;
            img.alt = file.title || file.name || file.file_name || "";
            img.loading = "lazy";
            img.className = "lazy-zone-img";

            img.addEventListener('mouseenter', e => {
                tooltip.textContent = file.title || file.name || file.file_name || "";
                tooltip.classList.add('show');
            });
            img.addEventListener('mousemove', e => {
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top  = e.clientY + 15 + 'px';
            });
            img.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

            zoneItem.appendChild(img);

            const button = document.createElement("button");
            button.textContent = file.title || file.name || file.file_name || "";
            button.onclick = e => { e.stopPropagation(); openZone(file); };
            zoneItem.appendChild(button);

            return zoneItem;
        }

        function attachLazyObserver(selector) {
            const lazyImages = document.querySelectorAll(selector + ' img.lazy-zone-img');
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        const src = getSrc({ _source: 'hydra' });
                        const clean = img.dataset.src;
                        img.src = clean;
                        img.onerror = function() {
                            // Try fallback bases
                            const baseIdx = parseInt(img.dataset.fallback || '0');
                            const hydra = SOURCES[0];
                            if (baseIdx < hydra.bases.length - 1) {
                                img.dataset.fallback = baseIdx + 1;
                                const zone = zones.find(z => {
                                    const url = resolveCover(z);
                                    return url === img.dataset.src || img.dataset.src.includes(z.thumb || '');
                                });
                                if (zone) {
                                    const c = (zone.thumb || '').replace(/^\/+/, '');
                                    img.src = hydra.bases[baseIdx + 1] + hydra.thumbPrefix + c;
                                }
                            }
                        };
                        img.classList.remove("lazy-zone-img");
                        obs.unobserve(img);
                    }
                });
            }, { rootMargin: "100px", threshold: 0.1 });
            lazyImages.forEach(img => observer.observe(img));
        }

        // ── Open / close zone ─────────────────────────────────────────────────
        async function openZone(file) {
            const src = getSrc(file);
            const bases = src.bases;
            let html = null;

            for (const base of bases) {
                try {
                    const res = await fetch(base + src.gamePrefix + file.file_name + "?t=" + Date.now());
                    if (!res.ok) continue;
                    html = await res.text();
                    break;
                } catch {}
            }

            if (!html) {
                alert("Failed to load game.");
                return;
            }

            if (zoneFrame.contentDocument === null) {
                zoneFrame = document.createElement("iframe");
                zoneFrame.id = "zoneFrame";
                zoneViewer.appendChild(zoneFrame);
            }
            zoneFrame.contentDocument.open();
            zoneFrame.contentDocument.write(html.replace(/<\/script>/gi, '</scr' + 'ipt>'));
            zoneFrame.contentDocument.close();
            document.getElementById('zoneName').textContent = file.title || file.name || file.file_name;
            document.getElementById('zoneId').textContent = file.file_name;
            document.getElementById('zoneSource').textContent = file._source;
            document.getElementById('zoneAuthor').textContent = "by " + (file.author || "Hydra Network");
            if (file.authorLink) document.getElementById('zoneAuthor').href = file.authorLink;
            zoneViewer.style.display = "flex";
            const u = new URL(window.location);
            u.searchParams.set('id', file.file_name);
            u.searchParams.set('src', file._source);
            history.pushState(null, '', u.toString());
        }

        function aboutBlank() {
            const id  = document.getElementById('zoneId').textContent;
            const key = document.getElementById('zoneSource').textContent;
            const zone = zones.find(z => z.file_name === id && z._source === key);
            const newWindow = window.open("about:blank", "_blank");
            const src = getSrc(zone);
            const tryFetch = async () => {
                for (const base of src.bases) {
                    try {
                        const res = await fetch(base + src.gamePrefix + zone.file_name + "?t=" + Date.now());
                        if (!res.ok) continue;
                        const html = await res.text();
                        if (newWindow) {
                            newWindow.document.open();
                            newWindow.document.write(html);
                            newWindow.document.close();
                        }
                        return;
                    } catch {}
                }
            };
            tryFetch();
        }

        function closeZone() {
            zoneViewer.style.display = "none";
            if (zoneFrame.parentNode) zoneViewer.removeChild(zoneFrame);
            const u = new URL(window.location);
            u.searchParams.delete('id');
            u.searchParams.delete('src');
            history.pushState(null, '', u.toString());

        function downloadZone() {
            const id  = document.getElementById('zoneId').textContent;
            const key = document.getElementById('zoneSource').textContent;
            const zone = zones.find(z => z.file_name === id && z._source === key);
            const src = getSrc(zone);
            const tryFetch = async () => {
                for (const base of src.bases) {
                    try {
                        const res = await fetch(base + src.gamePrefix + zone.file_name + "?t=" + Date.now());
                        if (!res.ok) continue;
                        const text = await res.text();
                        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
                        const url  = URL.createObjectURL(blob);
                        const a    = document.createElement('a');
                        a.href = url;
                        a.download = (zone.title || zone.name || zone.file_name) + ".html";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        return;
                    } catch {}
                }
            };
            tryFetch();
        }

        // ── Data export / import ──────────────────────────────────────────────
        function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
            if (typeof obj === 'string') return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
            if (obj instanceof Uint8Array) return obj.length > maxArrayLen ? `[Uint8Array too large (${obj.length} bytes), truncated]` : obj;
            if (Array.isArray(obj)) return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
            if (obj && typeof obj === 'object') {
                const newObj = {};
                for (const key in obj) { if (obj.hasOwnProperty(key)) newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen); }
                return newObj;
            }
            return obj;
        }

        async function saveData() {
            alert("This might take a while, dont touch anything other than this OK button");
            const result = {};
            result.cookies = document.cookie;
            result.localStorage = {...localStorage};
            result.sessionStorage = {...sessionStorage};
            result.indexedDB = {};
            const dbs = await indexedDB.databases();
            for (const dbInfo of dbs) {
                if (!dbInfo.name) continue;
                result.indexedDB[dbInfo.name] = {};
                await new Promise((resolve, reject) => {
                    const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
                    openRequest.onerror = () => reject(openRequest.error);
                    openRequest.onsuccess = () => {
                        const db = openRequest.result;
                        const storeNames = Array.from(db.objectStoreNames);
                        if (storeNames.length === 0) { resolve(); return; }
                        const transaction = db.transaction(storeNames, "readonly");
                        const storePromises = [];
                        for (const storeName of storeNames) {
                            result.indexedDB[dbInfo.name][storeName] = [];
                            const store = transaction.objectStore(storeName);
                            const getAllRequest = store.getAll();
                            const p = new Promise((res, rej) => {
                                getAllRequest.onsuccess = () => {
                                    result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                                    res();
                                };
                                getAllRequest.onerror = () => rej(getAllRequest.error);
                            });
                            storePromises.push(p);
                        }
                        Promise.all(storePromises).then(() => resolve());
                    };
                });
            }
            result.caches = {};
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
                const cache = await caches.open(cacheName);
                const requests = await cache.keys();
                result.caches[cacheName] = [];
                for (const req of requests) {
                    const response = await cache.match(req);
                    if (!response) continue;
                    const cloned = response.clone();
                    const contentType = cloned.headers.get('content-type') || '';
                    let body;
                    try {
                        if (contentType.includes('application/json')) body = await cloned.json();
                        else if (contentType.includes('text') || contentType.includes('javascript')) body = await cloned.text();
                        else { const buffer = await cloned.arrayBuffer(); body = btoa(String.fromCharCode(...new Uint8Array(buffer))); }
                    } catch { body = '[Unable to read body]'; }
                    result.caches[cacheName].push({ url: req.url, body, contentType });
                }
            }
            alert("Done, wait for the download to come");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
            link.download = `${Date.now()}.data`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function (e) {
                const data = JSON.parse(e.target.result);
                if (data.cookies) data.cookies.split(';').forEach(cookie => { document.cookie = cookie.trim(); });
                if (data.localStorage) for (const key in data.localStorage) localStorage.setItem(key, data.localStorage[key]);
                if (data.sessionStorage) for (const key in data.sessionStorage) sessionStorage.setItem(key, data.sessionStorage[key]);
                if (data.indexedDB) {
                    for (const dbName in data.indexedDB) {
                        const stores = data.indexedDB[dbName];
                        await new Promise((resolve, reject) => {
                            const request = indexedDB.open(dbName, 1);
                            request.onupgradeneeded = e => {
                                const db = e.target.result;
                                for (const storeName in stores) {
                                    if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                                }
                            };
                            request.onsuccess = e => {
                                const db = e.target.result;
                                const transaction = db.transaction(Object.keys(stores), 'readwrite');
                                transaction.onerror = () => reject(transaction.error);
                                let pendingStores = Object.keys(stores).length;
                                for (const storeName in stores) {
                                    const objectStore = transaction.objectStore(storeName);
                                    objectStore.clear().onsuccess = () => {
                                        for (const item of stores[storeName]) objectStore.put(item);
                                        if (--pendingStores === 0) resolve();
                                    };
                                }
                            };
                            request.onerror = () => reject(request.error);
                        });
                    }
                }
                if (data.caches) {
                    for (const cacheName in data.caches) {
                        const cache = await caches.open(cacheName);
                        await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
                        for (const entry of data.caches[cacheName]) {
                            let responseBody;
                            if (entry.contentType.includes('application/json')) responseBody = JSON.stringify(entry.body);
                            else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) responseBody = entry.body;
                            else {
                                const binaryStr = atob(entry.body);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                                responseBody = bytes.buffer;
                            }
                            await cache.put(entry.url, new Response(responseBody, { headers: new Headers({ 'content-type': entry.contentType }) }));
                        }
                    }
                }
                alert("Data loaded");
            };
            alert("This might take a while, dont touch anything other than this OK button");
            reader.readAsText(file);
        }
