<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cool bikes</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: auto;
  background-image:url("space2.png");
}

#searchBar{
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border-radius: 15px;
  border: 2px solid white;
  background: rgba(0,0,0,0.5);
  color: white;
  z-index: 1000;
}

#imageContainer{
  margin-top: 70px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.btn{
  width: 200px;
  height: 200px;
  border-radius: 100px;
  transition: .2s;
  object-fit: cover;
}
.btn:hover{
  transform: translateY(-5px);
  border-radius: 40px;
}

#tooltip {
  position: fixed;
  background: rgba(0,0,0,0.9);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 14px;
  pointer-events: none;
  opacity: 0;
  transition: .2s;
  z-index: 10000;
}

#tooltip.show{
  opacity: 1;
}

#viewer{
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  z-index: 9999;
}

#viewer iframe{
  width: 100%;
  height: 100%;
  border: none;
}

#closeBtn{
  position: absolute;
  top: 10px;
  right: 15px;
  background: red;
  color: white;
  padding: 10px;
  cursor: pointer;
  z-index: 10000;
}
</style>
</head>

<body>

<input id="searchBar" placeholder="Search games...">
<div id="tooltip"></div>
<div id="imageContainer"></div>

<div id="viewer">
  <div id="closeBtn">X</div>
  <iframe id="gameFrame">
    <iframe
  src="https://colormagic.app/media?ref=t9os.space"
  title="ColorMagic"
  width="300"
  height="168"
  style="border:0; width:300px; height:168px;"
  loading="lazy"
  allow="clipboard-write"
></iframe>
  </iframe>
</div>

<script>
const jsonUrl     = "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/for-a-friedn-@main/1.json";
const source1URL  = "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Folder-1@main/";
const source2URL  = "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Folder-2@main/";
const source3URL  = "https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Folder-3@main/";

const urlMap = {
  "{HTML_URL1}":  source1URL,
  "{HTML_URL2}":  source2URL,
  "{HTML_URL3}":  source3URL,
  "{COVER_URL1}": source1URL,
  "{COVER_URL2}": source2URL,
  "{COVER_URL3}": source3URL,
};

function resolvePlaceholders(str) {
  return str.replace(/\{(HTML|COVER)_URL\d\}/g, match => urlMap[match] ?? match);
}

function cleanName(name) {

  return name.replace(/^cl/i, "");
}


const container = document.getElementById("imageContainer");
const tooltip   = document.getElementById("tooltip");

async function loadGames() {
  container.innerHTML = "Loading...";
  try {
    const data = await fetch(jsonUrl).then(r => r.json());

    games = data.map(entry => ({
      name:  cleanName(entry.name),
      url:   resolvePlaceholders(entry.url),
      cover: resolvePlaceholders(entry.cover),
    }));

    displayGames(games);
  } catch(e) {
    container.innerHTML = "Failed to load games";
    console.error(e);
  }
}

function displayGames(list) {
  container.innerHTML = "";
  list.forEach(game => {
    const a = document.createElement("a");
    a.href = "#";

    const img = document.createElement("img");
    img.className = "btn";
    img.src = game.cover;
    img.alt = game.name;

    img.onerror = () => { img.src = "classwork2.png"; };

    a.onclick = (e) => {
      e.preventDefault();
      openGame(game.url);
    };

    img.onmouseenter = () => {
      tooltip.textContent = game.name;
      tooltip.classList.add("show");
    };

    img.onmousemove = (e) => {
      tooltip.style.left = e.clientX + 15 + "px";
      tooltip.style.top  = e.clientY + 15 + "px";
    };

    img.onmouseleave = () => {
      tooltip.classList.remove("show");
    };

    a.appendChild(img);
    container.appendChild(a);
  });
}

document.getElementById("searchBar").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  displayGames(games.filter(g => g.name.toLowerCase().includes(q)));
});

let currentBlobUrl = null;

function openGame(url) {
  const viewer = document.getElementById("viewer");
  const frame  = document.getElementById("gameFrame");
  viewer.style.display = "block";
  frame.src = "";

  fetch(url)
    .then(r => r.text())
    .then(html => {
      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      const blob = new Blob([html], { type: "text/html" });
      currentBlobUrl = URL.createObjectURL(blob);
      frame.src = currentBlobUrl;
    })
    .catch(err => {
      console.error("Failed to load game:", err);
      frame.src = url; 
    });
}

document.getElementById("closeBtn").onclick = () => {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("gameFrame").src = "";
  if (currentBlobUrl) {
    URL.revokeObjectURL(currentBlobUrl);
    currentBlobUrl = null;
  }
};

loadGames();
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const select = document.getElementById("background-select");
  const upload = document.getElementById("background-upload");
  const body = document.body;

  function setBackground(src) {
    body.style.backgroundImage = src ? `url(${src})` : "";
    localStorage.setItem("selectedBackground", src || "");
  }

  const savedBg = localStorage.getItem("selectedBackground");
  if (savedBg) setBackground(savedBg);

  select.addEventListener("change", () => {
    if (select.value) {
      setBackground(select.value);
    }
  });

  upload.addEventListener("change", () => {
    const file = upload.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      setBackground(reader.result); 
      select.value = ""; 
    };
    reader.readAsDataURL(file);
  });
});
</script>
</body>
</html>
