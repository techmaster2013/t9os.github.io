<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Game Hub</title>
<style>
:root{--p:#8fdcff;--a2:#a78bfa;--bg:#0a0a0f;--sur:rgba(255,255,255,0.06);--bor:rgba(255,255,255,0.09);--mut:rgba(255,255,255,0.5);--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:system-ui,sans-serif;background:var(--bg);color:#fff;overflow-x:hidden}
body::-webkit-scrollbar{width:4px}body::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}
header{position:sticky;top:0;z-index:500;background:#0d0d14;border-bottom:1px solid var(--bor);padding:8px 14px}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--p),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
input,select{padding:7px 11px;border:1px solid var(--bor);border-radius:var(--r);background:#12121c;color:#fff;font-size:13px;outline:none}
input{flex:1;min-width:160px}input:focus{border-color:var(--p)}input::placeholder{color:var(--mut)}
select option{background:#12121c}
#favBtn{padding:7px 12px;border:1px solid rgba(251,191,36,0.4);border-radius:var(--r);background:rgba(251,191,36,0.08);color:#fbbf24;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.gc{color:var(--mut);font-size:12px;white-space:nowrap}
main{max-width:1400px;margin:0 auto;padding:20px 14px 40px}
.sec{margin-bottom:32px}
.sh{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--bor)}
.si{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.st{font-size:1rem;font-weight:700}
.sct{margin-left:auto;color:var(--mut);font-size:11px;background:var(--sur);padding:2px 9px;border-radius:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
.card{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--bor);background:var(--sur);transition:transform .15s,border-color .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);border-color:var(--p);box-shadow:0 6px 20px rgba(140,220,255,0.1)}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.ct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;padding:8px;opacity:0;transition:opacity .15s;background:rgba(0,0,0,0.72);z-index:2}
.card:hover .ct{opacity:1}
.cf{position:absolute;top:5px;right:5px;z-index:5;background:rgba(0,0,0,0.55);border:none;color:var(--mut);font-size:13px;width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;line-height:1}
.card:hover .cf,.cf.on{opacity:1}.cf.on{color:#fbbf24}
.sba{position:absolute;top:5px;left:5px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;z-index:3}
.bgn{background:rgba(140,220,255,0.18);color:#8fdcff}.bgt{background:rgba(255,107,107,0.18);color:#ff6b6b}
.bgh{background:rgba(167,139,250,0.18);color:#a78bfa}.bgno{background:rgba(74,222,128,0.18);color:#4ade80}
.bgs{background:rgba(251,191,36,0.18);color:#fbbf24}
.cn{color:#8fdcff}.ct2{color:#ff6b6b}.ch{color:#a78bfa}.cno{color:#4ade80}.cs{color:#fbbf24}
.ibn{background:rgba(140,220,255,0.1)}.ibt{background:rgba(255,107,107,0.1)}.ibh{background:rgba(167,139,250,0.1)}.ibno{background:rgba(74,222,128,0.1)}.ibs{background:rgba(251,191,36,0.1)}
.ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px;color:var(--mut);font-size:13px}
.sp{width:24px;height:24px;border:2px solid rgba(140,220,255,0.15);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.em{color:#ff6b6b;text-align:center;padding:16px;font-size:13px}
#fp{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:8000;display:none;align-items:flex-start;justify-content:flex-end}
.fd{width:min(380px,100vw);height:100%;background:#0d0d14;border-left:1px solid var(--bor);display:flex;flex-direction:column;animation:sli .18s ease}
@keyframes sli{from{transform:translateX(100%)}to{transform:translateX(0)}}
.fh{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--bor)}
.fh h2{font-size:.95rem;font-weight:700;color:#fbbf24}.fhc{background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer}
.fl{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:7px}
.fi{display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;background:var(--sur);border:1px solid var(--bor);cursor:pointer;transition:border-color .12s}
.fi:hover{border-color:var(--p)}.fi img{width:44px;height:44px;object-fit:cover;border-radius:6px;background:var(--bg)}
.fin{flex:1;min-width:0}.fn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fs2{font-size:10px;color:var(--mut);margin-top:1px}
.fr{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:4px;line-height:1}.fr:hover{color:#ff6b6b}
.fe{color:var(--mut);text-align:center;padding:30px 16px;font-size:13px}
#tt{position:fixed;background:rgba(8,8,18,0.96);color:#fff;padding:5px 11px;border-radius:6px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:99999;white-space:nowrap;border:1px solid var(--bor);max-width:200px;overflow:hidden;text-overflow:ellipsis}
#tt.on{opacity:1}

/* Fullscreen game overlay */
#gameOverlay{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column}
#gameOverlay.active{display:flex}
#gameHeader{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0d0d14;border-bottom:1px solid var(--bor);flex-shrink:0}
#gameTitle{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:12px}
#gameClose{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);color:#ff6b6b;padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s}
#gameClose:hover{background:rgba(255,107,107,0.25)}
#gameFrame{flex:1;width:100%;border:none;height:100%;background:#000}
#gameLoader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none}
#gameLoader .sp{width:36px;height:36px;border-width:3px}
#gameLoader span{color:var(--mut);font-size:13px}

@media(max-width:768px){.cards{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}input{order:3;width:100%;min-width:unset}}
@media(max-width:480px){.cards{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}}
</style>
</head>

<span id="tt"></span>

<div id="gameOverlay">
  <div id="gameHeader">
    <span id="gameTitle">Game</span>
    <button id="gameClose" onclick="closeGame()">✕ Close</button>
  </div>
  <div style="position:relative;flex:1;">
    <iframe id="gameFrame" allow="autoplay;fullscreen;gamepad;camera;microphone;accelerometer;gyroscope" allowfullscreen></iframe>
    <div id="gameLoader">
      <div class="sp"></div>
      <span id="gameLoaderText">Loading game...</span>
    </div>
  </div>
</div>

    <div id="cn-t9" class="cards"><div class="ld"><div class="sp"></div>Loading...</div></div>
  </div>
  <div class="sec" id="sec-hydra">
    <div class="sh"><div class="si ibh">⚡</div><span class="st ch">Hydra Network</span><span class="sct" id="c-hydra">0</span></div>
    <div id="cn-hydra" class="cards"><div class="ld"><div class="sp"></div>Loading...</div></div>
  </div>
  <div class="sec" id="sec-noah">
    <div class="sh"><div class="si ibno">📚</div><span class="st cno">Noah's Tutoring</span><span class="sct" id="c-noah">0</span></div>
    <div id="cn-noah" class="cards"><div class="ld"><div class="sp"></div>Loading...</div></div>
  </div>
  <div class="sec" id="sec-seabean">
    <div class="sh"><div class="si ibs">🌊</div><span class="st cs">Sea Bean Games</span><span class="sct" id="c-seabean">0</span></div>
    <div id="cn-seabean" class="cards"><div class="ld"><div class="sp"></div>Loading...</div></div>
  </div>
</main>

let allGames=[],favs=new Set();
const FK='ugh-favs-v1';
function loadFavs(){try{const r=localStorage.getItem(FK);if(r)favs=new Set(JSON.parse(r));}catch{}}
function saveFavs(){try{localStorage.setItem(FK,JSON.stringify([...favs]));}catch{}}
function gk(g){return g.source+':'+g.id}
function isFav(g){return favs.has(gk(g))}

const E=id=>document.getElementById(id);
function showTT(e,t){const el=E('tt');el.textContent=t;el.classList.add('on');el.style.left=Math.min(e.clientX+14,window.innerWidth-210)+'px';el.style.top=(e.clientY+12)+'px';}
function hideTT(){E('tt').classList.remove('on')}

function mkCard(g){
  const d=document.createElement('div');
  d.className='card';d.dataset.name=g.name.toLowerCase();d.dataset.source=g.source;d.dataset.gk=gk(g);
  const bm={gnmath:'bgn',t9:'bgt',hydra:'bgh',noah:'bgno',seabean:'bgs'};
  const lm={gnmath:'GN',t9:'T9',hydra:'H',noah:'Noah',seabean:'Sea'};
  const fav=isFav(g);
  d.innerHTML=`<span class="sba ${bm[g.source]||'bgn'}">${lm[g.source]||'?'}</span><img src="${g.cover||''}" alt="${g.name}" loading="lazy" onerror="this.style.display='none'"><div class="ct">${g.name}</div><button class="cf${fav?' on':''}">${fav?'★':'☆'}</button>`;
  d.querySelector('.cf').onclick=e=>{e.stopPropagation();toggleFav(g,d);};
  d.onclick=()=>openGame(g);
  d.onmouseenter=e=>showTT(e,g.name);d.onmousemove=e=>showTT(e,g.name);d.onmouseleave=hideTT;
  return d;
}

function toggleFav(g,card){
  const k=gk(g);favs.has(k)?favs.delete(k):favs.add(k);saveFavs();
  const btn=card&&card.querySelector('.cf');
  if(btn){btn.textContent=favs.has(k)?'★':'☆';btn.classList.toggle('on',favs.has(k));}
  E('fc2').textContent=favs.size;
}

function render(cid,games){
  const c=E(cid);c.innerHTML='';
  if(!games.length){c.innerHTML='<div class="em">No games found.</div>';return;}
  const f=document.createDocumentFragment();
  games.forEach(g=>f.appendChild(mkCard(g)));
  c.appendChild(f);
}
function updCounts(){
  let tot=0;
  ['gnmath','t9','hydra','noah','seabean'].forEach(s=>{
    const n=allGames.filter(g=>g.source===s).length;E('c-'+s).textContent=n;tot+=n;
  });
  E('totalc').textContent=tot+' games';
}

// ── LOADERS ──
async function loadGN(){
  const games=[];
  for(const src of GN_SOURCES){
    try{
      let url=src.zonesurls[0];
      try{const sha=(await(await fetch(src.shaAPI+'?t='+Date.now())).json())[0]?.sha;if(sha)url=src.shaFmt(sha);}catch{}
      const data=await(await fetch(url+'?t='+Date.now())).json();
      data.forEach(z=>games.push({id:String(z.id),name:z.name,cover:(z.cover||'').replace('{COVER_URL}',src.coverURL).replace('{HTML_URL}',src.htmlURL),url:(z.url||'').replace('{COVER_URL}',src.coverURL).replace('{HTML_URL}',src.htmlURL),source:'gnmath'}));
    }catch(e){console.error('GN:',e);}
  }
  return games;
}
async function loadHydra(){
  for(const base of HB){
    try{
      const data=await(await fetch(base+'gmes.json?t='+Date.now())).json();
      if(!Array.isArray(data))continue;
      const seen=new Set(),games=[];
      data.forEach(g=>{
        const k=(g.file_name||'').toLowerCase().trim();if(!k||seen.has(k))return;seen.add(k);
        const th=(g.thumb||'').replace(/^\/+/,'');
        games.push({id:k,name:g.title||g.file_name,cover:th?(HB[0]+th):'',url:base+'gmes/'+g.file_name,source:'hydra'});
      });
      return games;
    }catch(e){console.error('Hydra:',e);}
  }
  return[];
}
async function loadNoah(){
  const games=[];
  try{
    const data=await(await fetch(BESTSAB_API+'?t='+Date.now())).json();
    data.forEach((g,i)=>games.push({id:'bs'+i,name:g.name||'Unknown',cover:(g.cover||'').replace('{COVER_URL}',BESTSAB_COVER).replace('{HTML_URL}',BESTSAB_HTML),url:(g.url||'').replace('{HTML_URL}',BESTSAB_HTML),source:'noah'}));
  }catch(e){console.error('BestSab:',e);}
  NOAH_TITLES.forEach((t,i)=>games.push({id:'noah'+i,name:t,cover:`${NOAH_BASE}/images/${(i%400)+1}.jpg`,url:`${NOAH_BASE}/games/${(i%400)+1}.html`,source:'noah'}));
  return games;
}
async function loadSea(){
  const games=[];
  try{
    const data=await(await fetch(SEA_JSON+'?t='+Date.now())).json();
    data.forEach(e=>{
      let name=e.name||'';if(name.toLowerCase().startsWith('cl'))name=name.slice(2);
      let url=e.url||'',cover=e.cover||'';
      for(const[ph,v]of Object.entries(SEA_SRC)){url=url.replace(ph,v);cover=cover.replace(ph,v);}
      games.push({id:String(e.id||name),name,cover,url,source:'seabean'});
    });
  }catch(e){console.error('Sea:',e);}
  return games;
}
function loadT9G(){
  return T9.map((g,i)=>({id:'t9'+i,name:g.name,cover:g.img,url:g.href,source:'t9',ext:g.href.startsWith('http')}));
}

// ── GAME LAUNCHER (IFRAME-BASED) ──
function openGame(g){
  const overlay = E('gameOverlay');
  const frame = E('gameFrame');
  const title = E('gameTitle');
  const loader = E('gameLoader');
  const loaderText = E('gameLoaderText');
  
  // Pure external URL → new tab
  if(g.ext || (g.url && g.url.startsWith('http') && !g.url.includes('jsdelivr') && !g.url.includes('githack') && !g.url.includes('githubusercontent'))){
    window.open(g.url, '_blank');
    return;
  }
  
  // T9 relative paths → navigate in iframe using current origin
  if(g.source === 't9'){
    frame.src = g.url;
    title.textContent = g.name;
    overlay.classList.add('active');
    loader.style.display = 'flex';
    loaderText.textContent = 'Loading ' + g.name + '...';
    document.body.style.overflow = 'hidden';
    return;
  }
  
  // CDN games → fetch HTML and load via blob URL in iframe (executes scripts properly)
  overlay.classList.add('active');
  title.textContent = g.name;
  loader.style.display = 'flex';
  loaderText.textContent = 'Loading ' + g.name + '...';
  document.body.style.overflow = 'hidden';
  
  // Build candidate URLs
  let urls = [g.url];
  if(g.source === 'hydra'){
    const file = g.url.split('gmes/').pop();
    urls = HB.map(b => b + 'gmes/' + file);
  }
  
  // Try each URL
  tryLoadGame(urls, 0, frame, loader, g.name);
}

async function tryLoadGame(urls, index, frame, loader, gameName){
  if(index >= urls.length){
    loader.style.display = 'none';
    frame.src = 'about:blank';
    alert('Could not load ' + gameName + '. Try opening it in a new tab manually.');
    return;
  }
  
  try{
    const res = await fetch(urls[index]);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    
    // Create blob URL from the HTML content
    const blob = new Blob([html], {type: 'text/html'});
    const blobUrl = URL.createObjectURL(blob);
    
    // Store the URL for cleanup
    frame._blobUrl = blobUrl;
    
    frame.src = blobUrl;
  }catch(e){
    console.error('Failed URL:', urls[index], e);
    tryLoadGame(urls, index + 1, frame, loader, gameName);
  }
}

function closeGame(){
  const overlay = E('gameOverlay');
  const frame = E('gameFrame');
  const loader = E('gameLoader');
  
  // Clean up blob URL
  if(frame._blobUrl){
    URL.revokeObjectURL(frame._blobUrl);
    delete frame._blobUrl;
  }
  
  frame.src = 'about:blank';
  overlay.classList.remove('active');
  loader.style.display = 'none';
  document.body.style.overflow = '';
}

// Hide loader when iframe loads
E('gameFrame').addEventListener('load', function(){
  E('gameLoader').style.display = 'none';
});

// Error handling for iframe
E('gameFrame').addEventListener('error', function(){
  E('gameLoader').style.display = 'none';
  alert('Failed to load the game. The resource might be unavailable.');
});

// ── FILTER / SORT ──
function filterAll(){
  const q=E('sb').value.toLowerCase(),sec=E('fs').value;
  document.querySelectorAll('.card').forEach(c=>{
    const ms=c.dataset.name.includes(q);
    const mv=sec==='all'?true:sec==='favorites'?favs.has(c.dataset.gk):c.dataset.source===sec;
    c.style.display=(ms&&mv)?'':'none';
  });
  ['gnmath','t9','hydra','noah','seabean'].forEach(s=>{
    const el=E('sec-'+s);if(!el)return;
    if(sec!=='all'&&sec!==s&&sec!=='favorites'){el.style.display='none';return;}
    el.style.display=el.querySelectorAll('.card:not([style*="display: none"])').length?'':'none';
  });
}
function sortAll(){
  const by=E('so').value;
  ['cn-gnmath','cn-t9','cn-hydra','cn-noah','cn-seabean'].forEach(cid=>{
    const c=E(cid);const cards=[...c.querySelectorAll('.card')];
    cards.sort((a,b)=>a.dataset[by==='name'?'name':'source'].localeCompare(b.dataset[by==='name'?'name':'source']));
    cards.forEach(x=>c.appendChild(x));
  });
}

// ── FAV PANEL ──
function openFP(){renderFP();E('fp').style.display='flex';document.body.style.overflow='hidden';}
function closeFP(){E('fp').style.display='none';document.body.style.overflow='';}
function renderFP(){
  const list=E('fl');list.innerHTML='';
  const fg=allGames.filter(g=>favs.has(gk(g)));
  if(!fg.length){list.innerHTML='<div class="fe">No favorites yet.<br>Click ☆ on any card!</div>';return;}
  fg.forEach(g=>{
    const d=document.createElement('div');d.className='fi';
    d.innerHTML=`<img src="${g.cover||''}" alt="${g.name}" onerror="this.style.display='none'"><div class="fin"><div class="fn">${g.name}</div><div class="fs2">${g.source==='noah'?"Noah's":g.source.toUpperCase()}</div></div><button class="fr">✕</button>`;
    d.querySelector('.fr').onclick=e=>{
      e.stopPropagation();favs.delete(gk(g));saveFavs();E('fc2').textContent=favs.size;
      const c=document.querySelector(`.card[data-gk="${gk(g)}"]`);
      if(c){const b=c.querySelector('.cf');b.textContent='☆';b.classList.remove('on');}renderFP();
    };
    d.onclick=()=>{closeFP();openGame(g);};list.appendChild(d);
  });
}

async function init(){
  loadFavs();E('fc2').textContent=favs.size;
  const[gn,t9g,hy,no,sea]=await Promise.all([loadGN(),Promise.resolve(loadT9G()),loadHydra(),loadNoah(),loadSea()]);
  allGames=[...gn,...t9g,...hy,...no,...sea];
  render('cn-gnmath',gn);render('cn-t9',t9g);render('cn-hydra',hy);render('cn-noah',no);render('cn-seabean',sea);
  updCounts();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(E('gameOverlay').classList.contains('active')){
      closeGame();
    }else if(E('fp').style.display==='flex'){
      closeFP();
    }
  }
});
