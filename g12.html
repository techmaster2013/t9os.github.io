<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ultimate Game Hub · ultra</title>
  <style>
    :root {
      --p: #8fdcff;
      --a2: #a78bfa;
      --bg: #0a0a0f;
      --sur: rgba(255,255,255,0.05);
      --bor: rgba(255,255,255,0.08);
      --mut: rgba(255,255,255,0.5);
      --r: 10px;
      --card-min: 130px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      height:100%;
      font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);
      color:#fff;
      overflow-x:hidden;
      scrollbar-width:thin;
      scrollbar-color:var(--p) #1a1a24;
      -webkit-tap-highlight-color:transparent;
    }
    body::-webkit-scrollbar{width:4px}
    body::-webkit-scrollbar-thumb{background:var(--p);border-radius:3px}

    header{
      position:sticky;top:0;z-index:500;
      background:#0d0d14f2;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-bottom:1px solid var(--bor);
      padding:8px 12px;
      contain:layout style;
    }
    .hi{
      max-width:1400px;margin:0 auto;
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    }
    .logo{
      font-size:18px;font-weight:800;
      background:linear-gradient(135deg,var(--p),var(--a2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;white-space:nowrap;letter-spacing:-.3px;
    }
    input,select{
      padding:6px 10px;border:1px solid var(--bor);border-radius:var(--r);
      background:#12121c;color:#fff;font-size:13px;outline:none;
      transition:border-color .2s;
    }
    input{flex:1;min-width:140px}
    input:focus{border-color:var(--p)}
    input::placeholder{color:var(--mut)}
    select option{background:#12121c}
    #favBtn{
      padding:6px 12px;border:1px solid rgba(251,191,36,.5);border-radius:var(--r);
      background:rgba(251,191,36,.08);color:#fbbf24;font-size:12px;font-weight:700;
      cursor:pointer;white-space:nowrap;transition:background .2s;
    }
    .gc{color:var(--mut);font-size:11px;white-space:nowrap;margin-left:auto}

    main{max-width:1400px;margin:0 auto;padding:16px 12px 30px;contain:layout style}
    .sec{margin-bottom:24px}
    .sh{
      display:flex;align-items:center;gap:8px;margin-bottom:10px;
      padding-bottom:8px;border-bottom:1px solid var(--bor);
    }
    .si{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--sur)}
    .st{font-size:.95rem;font-weight:700;letter-spacing:-.2px}
    .sct{margin-left:auto;color:var(--mut);font-size:10px;background:var(--sur);padding:2px 8px;border-radius:20px}

    /* ── GRID ── */
    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(var(--card-min),1fr));
      gap:8px;
      contain:layout style;
    }

    /* ── CARD ── */
    .card{
      position:relative;
      aspect-ratio:1/1;
      border-radius:var(--r);
      overflow:hidden;
      cursor:pointer;
      border:1px solid var(--bor);
      background:#1a1a26;
      transition:transform .15s ease,border-color .15s,box-shadow .15s;
      contain:strict;          /* GPU isolation per card */
      will-change:transform;
    }
    .card:hover{
      transform:translateY(-3px);
      border-color:var(--p);
      box-shadow:0 8px 18px rgba(140,220,255,.12);
      z-index:2;
    }
    .card img{
      width:100%;height:100%;
      object-fit:cover;display:block;
      background:#0f0f17;
    }
    /* Tooltip via data-attr + CSS – zero JS on mousemove */
    .card::after{
      content:attr(data-name);
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:600;text-align:center;padding:6px;
      opacity:0;transition:opacity .18s;
      background:rgba(0,0,0,.78);
      backdrop-filter:blur(2px);
      pointer-events:none;
      white-space:normal;
      word-break:break-word;
    }
    .card:hover::after{opacity:1}

    /* Fav star */
    .cf{
      position:absolute;top:5px;right:5px;z-index:5;
      background:rgba(0,0,0,.65);border:none;
      color:#ccc;font-size:15px;
      width:28px;height:28px;border-radius:50%;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .15s,color .15s;
      backdrop-filter:blur(4px);
    }
    .card:hover .cf,.cf.on{opacity:1}
    .cf.on{color:#fbbf24;text-shadow:0 0 6px #fbbf24}

    /* Badges */
    .sba{
      position:absolute;top:5px;left:5px;
      padding:2px 6px;border-radius:5px;
      font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
      z-index:3;backdrop-filter:blur(4px);
    }
    .bgn{background:rgba(140,220,255,.2);color:#8fdcff}
    .bgt{background:rgba(255,107,107,.2);color:#ff6b6b}
    .bgh{background:rgba(167,139,250,.2);color:#a78bfa}
    .bgno{background:rgba(74,222,128,.2);color:#4ade80}
    .bgs{background:rgba(251,191,36,.2);color:#fbbf24}
    .cn{color:#8fdcff}.ct2{color:#ff6b6b}.ch{color:#a78bfa}.cno{color:#4ade80}.cs{color:#fbbf24}
    .ibn{background:rgba(140,220,255,.12)}.ibt{background:rgba(255,107,107,.12)}.ibh{background:rgba(167,139,250,.12)}.ibno{background:rgba(74,222,128,.12)}.ibs{background:rgba(251,191,36,.12)}

    /* Loading */
    .ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--mut);font-size:13px;grid-column:1/-1}
    .sp{width:22px;height:22px;border:2px solid rgba(140,220,255,.15);border-top-color:var(--p);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Sentinel for virtual render */
    .sentinel{height:1px;grid-column:1/-1;pointer-events:none}

    /* Game overlay */
    #gameOverlay{
      position:fixed;inset:0;background:#000;z-index:9999;
      display:none;flex-direction:column;
      will-change:transform;transform:translateZ(0);
    }
    #gameOverlay.active{display:flex}
    #gameHeader{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px;background:#0d0d14;
      border-bottom:1px solid var(--bor);flex-shrink:0;
    }
    #gameTitle{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:10px}
    #gameClose{
      background:rgba(255,107,107,.2);border:1px solid rgba(255,107,107,.4);
      color:#ff6b6b;padding:5px 12px;border-radius:var(--r);cursor:pointer;
      font-size:12px;font-weight:600;transition:background .15s;
    }
    #gameFrame{flex:1;width:100%;height:100%;border:none;background:#000;display:block}
    #gameLoader{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      display:flex;flex-direction:column;align-items:center;gap:12px;pointer-events:none;
    }

    /* Fav panel */
    #fp{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:8000;display:none;align-items:flex-start;justify-content:flex-end}
    .fd{width:min(360px,100vw);height:100%;background:#0d0d14;border-left:1px solid var(--bor);display:flex;flex-direction:column;animation:sli .15s ease}
    @keyframes sli{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .fh{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--bor)}
    .fl{overflow-y:auto;flex:1;padding:8px;display:flex;flex-direction:column;gap:6px}
    .fi{display:flex;align-items:center;gap:8px;padding:8px;border-radius:9px;background:var(--sur);border:1px solid var(--bor);cursor:pointer}
    .fi img{width:40px;height:40px;object-fit:cover;border-radius:6px}

    @media(max-width:680px){
      :root{--card-min:100px}
      input{order:3;width:100%;min-width:unset}
    }

    /* Hidden cards via class instead of inline style (faster toggling) */
    .card.hidden{display:none}
    .sec.hidden{display:none}
  </style>
</head>
<body>

<!-- GAME OVERLAY -->
<div id="gameOverlay">
  <div id="gameHeader">
    <span id="gameTitle">Game</span>
    <button id="gameClose">✕ Close</button>
  </div>
  <div style="position:relative;flex:1">
    <iframe id="gameFrame" allow="autoplay;fullscreen;gamepad;camera;microphone;accelerometer;gyroscope" allowfullscreen loading="lazy"></iframe>
    <div id="gameLoader"><div class="sp"></div><span style="color:var(--mut);font-size:13px">Loading...</span></div>
  </div>
</div>

<header>
  <div class="hi">
    <div class="logo"></div>
    <input type="text" id="sb" placeholder="Search games…" autocomplete="off" spellcheck="false">
    <select id="so"><option value="name">A–Z</option><option value="source">Source</option></select>
    <select id="fs">
      <option value="all">All</option>
      <option value="gnmath">GN-Math</option>
      <option value="t9">T9</option>
      <option value="hydra">Hydra</option>
      <option value="noah">Noah's</option>
      <option value="seabean">UGS</option>
      <option value="favorites">⭐ Favorites</option>
    </select>
    <button id="favBtn">⭐ <span id="fc2">0</span></button>
    <span class="gc" id="totalc">···</span>
  </div>
</header>

<main id="mainContent"></main>

<!-- Card template – cloned for each card (faster than innerHTML) -->
<template id="cardTpl">
  <div class="card">
    <span class="sba"></span>
    <img alt="" loading="lazy" decoding="async">
    <button class="cf">☆</button>
  </div>
</template>

<div id="fp">
  <div class="fd">
    <div class="fh">
      <h2 style="color:#fbbf24;font-size:1rem">⭐ Favorites</h2>
      <button id="closeFpBtn" style="background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="fl" id="fl"></div>
  </div>
</div>

const NOAH_TITLES=["Alien Hominid","Customer Support","The Deadseat","Fireboy & Watergirl","Pizza Tower","Bloons TD 1","Bloons TD 2","Bloons TD 3","Bloons TD 4","Bloons TD 5","Geometry Dash","Friday Night Funkin","Plants vs Zombies","Subway Surfers","Temple Run 2","Happy Wheels","Granny","Slope","Cookie Clicker","FNAF","FNAF 2","FNAF 3","FNAF 4","Undertale","Deltarune","Binding of Isaac","Portal","Doom","Minecraft","Terraria","Earn to Die","Earn to Die 2","Bart Blast","Bendy and the Ink Machine","Gacha Life","Among Us","Yandere Simulator","Quake III","Angry Birds","Candy Crush","Flappy Bird","Super Mario 64","Half Life","Jetpack Joyride","Slime Rancher","Cup Head","Rocket League","Street Fighter II","Fallout","Hollow Knight","Celeste","Hotline Miami","Getting Over It","Doki Doki Literature Club","Baldi's Basics","Granny 3","Granny 2","Kindergarten","Kindergarten 2","Kindergarten 3","Raft","Slender","Buckshot Roulette","WebFishing","ULTRAKILL","That's Not My Neighbor"];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
const FK='ugh-favs-v1';
let allGames=[];
let favs=new Set();
// Per-source arrays kept for sorting
const bySource={gnmath:[],t9:[],hydra:[],noah:[],seabean:[]};

/* ═══════════════════════════════════════════════════════
   DOM REFS (all grabbed once)
═══════════════════════════════════════════════════════ */
const $id=id=>document.getElementById(id);
const mainEl=$id('mainContent');
const gameOverlay=$id('gameOverlay');
const gameFrame=$id('gameFrame');
const gameTitle=$id('gameTitle');
const gameLoader=$id('gameLoader');
const fpEl=$id('fp');
const flEl=$id('fl');
const sbEl=$id('sb');
const fsEl=$id('fs');
const soEl=$id('so');
const fc2El=$id('fc2');
const totalcEl=$id('totalc');
const cardTpl=$id('cardTpl');

/* ═══════════════════════════════════════════════════════
   FAVS
═══════════════════════════════════════════════════════ */
function loadFavs(){try{const r=localStorage.getItem(FK);if(r)favs=new Set(JSON.parse(r))}catch{}}
function saveFavs(){try{localStorage.setItem(FK,JSON.stringify([...favs]))}catch{}}
function gk(g){return g.source+':'+g.id}
function isFav(g){return favs.has(gk(g))}

/* ═══════════════════════════════════════════════════════
   SECTION BUILDER
═══════════════════════════════════════════════════════ */
const SECTIONS=[
  {key:'gnmath',label:'GN-Math Games',icon:'🌐',bc:'bgn',ic:'ibn'},
  {key:'t9',    label:'T9 Games',     icon:'🔥',bc:'bgt',ic:'ibt'},
  {key:'hydra', label:'Hydra Games',  icon:'⚡',bc:'bgh',ic:'ibh'},
  {key:'noah',  label:"Noah's Games", icon:'📚',bc:'bgno',ic:'ibno'},
  {key:'seabean',label:'Sea Bean Games',icon:'🌊',bc:'bgs',ic:'ibs'},
];
const COL_CLS={gnmath:'cn',t9:'ct2',hydra:'ch',noah:'cno',seabean:'cs'};

function buildSections(){
  const frag=document.createDocumentFragment();
  SECTIONS.forEach(({key,label,icon,ic})=>{
    const sec=document.createElement('div');
    sec.className='sec';sec.id='sec-'+key;
    sec.innerHTML=`<div class="sh"><div class="si ${ic}">${icon}</div><span class="st ${COL_CLS[key]}">${label}</span><span class="sct" id="c-${key}">0</span></div><div id="cn-${key}" class="cards"><div class="ld"><div class="sp"></div>Loading…</div></div>`;
    frag.appendChild(sec);
  });
  mainEl.appendChild(frag);
}

/* ═══════════════════════════════════════════════════════
   CARD FACTORY (template clone – fastest method)
═══════════════════════════════════════════════════════ */
const BADGE_MAP={gnmath:'bgn',t9:'bgt',hydra:'bgh',noah:'bgno',seabean:'bgs'};

function makeCard(g){
  const clone=cardTpl.content.cloneNode(true);
  const card=clone.querySelector('.card');
  // Data attrs used for filtering & CSS tooltip
  card.dataset.gk=gk(g);
  card.dataset.name=g.name.toLowerCase();
  card.dataset.source=g.source;
  card.setAttribute('data-name',g.name); // CSS ::after tooltip

  const badge=clone.querySelector('.sba');
  badge.className='sba '+(BADGE_MAP[g.source]||'bgn');
  badge.textContent=g.source.substring(0,2).toUpperCase();

  const img=clone.querySelector('img');
  img.src=g.cover||'';
  img.alt=g.name;

  const favBtn=clone.querySelector('.cf');
  if(isFav(g)){favBtn.textContent='★';favBtn.classList.add('on')}

  return card;
}

/* ═══════════════════════════════════════════════════════
   RENDER SECTION (single DocumentFragment pass)
═══════════════════════════════════════════════════════ */
function renderSection(key,games){
  const container=$id('cn-'+key);
  if(!container)return;
  const countEl=$id('c-'+key);

  if(!games.length){
    container.innerHTML='<div class="ld">No games</div>';
    if(countEl)countEl.textContent='0';
    return;
  }

  const frag=document.createDocumentFragment();
  games.forEach(g=>frag.appendChild(makeCard(g)));
  container.innerHTML='';  // clear spinner
  container.appendChild(frag);
  if(countEl)countEl.textContent=games.length;
}

/* ═══════════════════════════════════════════════════════
   EVENT DELEGATION – one listener per container
   handles clicks on card body AND fav button
═══════════════════════════════════════════════════════ */
function attachDelegation(containerId,games){
  const container=$id(containerId);
  if(!container)return;
  // Build lookup map for O(1) game access
  const map=new Map(games.map(g=>[gk(g),g]));

  container.addEventListener('click',e=>{
    const card=e.target.closest('.card');
    if(!card)return;
    const g=map.get(card.dataset.gk);
    if(!g)return;

    if(e.target.closest('.cf')){
      // Toggle fav
      const k=gk(g);
      favs.has(k)?favs.delete(k):favs.add(k);
      saveFavs();
      const btn=card.querySelector('.cf');
      const on=favs.has(k);
      btn.textContent=on?'★':'☆';
      btn.classList.toggle('on',on);
      fc2El.textContent=favs.size;
    } else {
      openGame(g);
    }
  },{ passive:true });
}

/* ═══════════════════════════════════════════════════════
   FILTER & SORT  (class toggle, no style.display writes)
═══════════════════════════════════════════════════════ */
let filterRaf=0;
function filterAll(){
  if(filterRaf)cancelAnimationFrame(filterRaf);
  filterRaf=requestAnimationFrame(()=>{
    const query=sbEl.value.toLowerCase();
    const src=fsEl.value;
    const isFavFilter=src==='favorites';

    // Toggle visibility per card via class (no reflow per card)
    const cards=mainEl.querySelectorAll('.card');
    for(const card of cards){
      const nameOk=!query||card.dataset.name.includes(query);
      const srcOk=src==='all'?true:isFavFilter?favs.has(card.dataset.gk):card.dataset.source===src;
      card.classList.toggle('hidden',!(nameOk&&srcOk));
    }

    // Hide sections with zero visible cards
    for(const {key} of SECTIONS){
      const sec=$id('sec-'+key);
      if(!sec)continue;
      const total=sec.querySelectorAll('.card').length;
      const hidden=sec.querySelectorAll('.card.hidden').length;
      sec.classList.toggle('hidden',total>0&&hidden===total);
    }
    filterRaf=0;
  });
}

function sortSection(key){
  const container=$id('cn-'+key);
  if(!container)return;
  const by=soEl.value;
  const cards=[...container.querySelectorAll('.card')];
  cards.sort((a,b)=>(by==='name'?a.dataset.name:a.dataset.source).localeCompare(by==='name'?b.dataset.name:b.dataset.source));
  const frag=document.createDocumentFragment();
  cards.forEach(c=>frag.appendChild(c));
  container.appendChild(frag);
}
function sortAll(){SECTIONS.forEach(s=>sortSection(s.key))}

/* ═══════════════════════════════════════════════════════
   GAME LAUNCHER
═══════════════════════════════════════════════════════ */
function openGame(g){
  if(g.ext||(g.url&&g.url.startsWith('http')&&!g.url.includes('jsdelivr')&&!g.url.includes('githack'))){
    window.open(g.url,'_blank');return;
  }
  gameOverlay.classList.add('active');
  gameTitle.textContent=g.name;
  gameLoader.style.display='flex';
  document.body.style.overflow='hidden';

  if(g.source==='t9'){gameFrame.src=g.url;return}

  let urls=[g.url];
  if(g.source==='hydra'){
    const file=g.url.split('gmes/').pop();
    urls=HB.map(b=>b+'gmes/'+file);
  }
  tryLoadGame(urls,0,g.name);
}

async function tryLoadGame(urls,idx,name){
  if(idx>=urls.length){gameLoader.style.display='none';alert('Could not load '+name);return}
  try{
    const res=await fetch(urls[idx]);
    if(!res.ok)throw 0;
    const blob=new Blob([await res.text()],{type:'text/html'});
    const blobUrl=URL.createObjectURL(blob);
    if(gameFrame._blobUrl)URL.revokeObjectURL(gameFrame._blobUrl);
    gameFrame._blobUrl=blobUrl;
    gameFrame.src=blobUrl;
  }catch{tryLoadGame(urls,idx+1,name)}
}

function closeGame(){
  if(gameFrame._blobUrl){URL.revokeObjectURL(gameFrame._blobUrl);delete gameFrame._blobUrl}
  gameFrame.src='about:blank';
  gameOverlay.classList.remove('active');
  gameLoader.style.display='none';
  document.body.style.overflow='';
}

gameFrame.addEventListener('load',()=>{gameLoader.style.display='none'});
gameFrame.addEventListener('error',()=>{gameLoader.style.display='none'});
$id('gameClose').onclick=closeGame;
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&gameOverlay.classList.contains('active'))closeGame()});

/* ═══════════════════════════════════════════════════════
   FAVORITES PANEL
═══════════════════════════════════════════════════════ */
function renderFavPanel(){
  flEl.innerHTML='';
  const favGames=allGames.filter(g=>favs.has(gk(g)));
  if(!favGames.length){flEl.innerHTML='<div style="color:var(--mut);text-align:center;padding:24px">No favorites</div>';return}
  const frag=document.createDocumentFragment();
  favGames.forEach(g=>{
    const div=document.createElement('div');
    div.className='fi';
    div.innerHTML=`<img src="${g.cover||''}" alt="${g.name}" loading="lazy" onerror="this.style.display='none'"><div style="flex:1"><div style="font-weight:600;font-size:13px">${g.name}</div><div style="font-size:10px;color:var(--mut)">${g.source}</div></div><button class="fr" style="background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer">✕</button>`;
    div.querySelector('.fr').addEventListener('click',e=>{
      e.stopPropagation();
      favs.delete(gk(g));saveFavs();
      fc2El.textContent=favs.size;
      renderFavPanel();
    },{once:true});
    div.addEventListener('click',()=>{closeFP();openGame(g)});
    frag.appendChild(div);
  });
  flEl.appendChild(frag);
}
function openFP(){fpEl.style.display='flex';renderFavPanel();document.body.style.overflow='hidden'}
function closeFP(){fpEl.style.display='none';document.body.style.overflow=''}
$id('favBtn').onclick=openFP;
$id('closeFpBtn').onclick=closeFP;
fpEl.addEventListener('click',e=>{if(e.target===fpEl)closeFP()});

/* ═══════════════════════════════════════════════════════
   DATA LOADERS
═══════════════════════════════════════════════════════ */
async function loadGN(){
  const games=[];
  for(const src of GN_SOURCES){
    try{
      let url=src.zonesurls[0];
      try{const sha=(await(await fetch(src.shaAPI+'?t='+Date.now())).json())[0]?.sha;if(sha)url=src.shaFmt(sha)}catch{}
      const data=await(await fetch(url+'?t='+Date.now())).json();
      data.forEach(z=>games.push({
        id:String(z.id),name:z.name,
        cover:(z.cover||'').replace('{COVER_URL}',src.coverURL).replace('{HTML_URL}',src.htmlURL),
        url:(z.url||'').replace('{COVER_URL}',src.coverURL).replace('{HTML_URL}',src.htmlURL),
        source:'gnmath'
      }));
    }catch(e){console.warn('GN source failed',e)}
  }
  return games;
}

async function loadHydra(){
  for(const base of HB){
    try{
      const data=await(await fetch(base+'gmes.json?t='+Date.now())).json();
      if(!Array.isArray(data))continue;
      const seen=new Set(),games=[];
      data.forEach(g=>{
        const k=(g.file_name||'').toLowerCase().trim();if(!k||seen.has(k))return;
        seen.add(k);
        games.push({id:k,name:g.title||g.file_name,cover:g.thumb?HB[0]+g.thumb.replace(/^\//,''):'',url:base+'gmes/'+g.file_name,source:'hydra'});
      });
      return games;
    }catch{}
  }
  return[];
}

async function loadNoah(){
  const games=[];
  try{
    const data=await(await fetch(BESTSAB_API+'?t='+Date.now())).json();
    data.forEach((g,i)=>games.push({
      id:'bs'+i,name:g.name||'?',
      cover:(g.cover||'').replace('{COVER_URL}',BESTSAB_COVER).replace('{HTML_URL}',BESTSAB_HTML),
      url:(g.url||'').replace('{HTML_URL}',BESTSAB_HTML),source:'noah'
    }));
  }catch{}
  NOAH_TITLES.forEach((t,i)=>games.push({id:'noah'+i,name:t,cover:`${NOAH_BASE}/images/${(i%400)+1}.jpg`,url:`${NOAH_BASE}/games/${(i%400)+1}.html`,source:'noah'}));
  return games;
}

async function loadSea(){
  const games=[];
  try{
    const data=await(await fetch(SEA_JSON+'?t='+Date.now())).json();
    data.forEach(e=>{
      let name=e.name||'';if(name.toLowerCase().startsWith('cl'))name=name.slice(2);
      let url=e.url||'',cover=e.cover||'';
      for(const[ph,v]of Object.entries(SEA_SRC)){url=url.replace(ph,v);cover=cover.replace(ph,v)}
      games.push({id:String(e.id||name),name,cover,url,source:'seabean'});
    });
  }catch{}
  return games;
}

function loadT9G(){
  return T9.map((g,i)=>({id:'t9'+i,name:g.name,cover:g.img,url:g.href,source:'t9',ext:g.href.startsWith('http')}));
}

/* ═══════════════════════════════════════════════════════
   INCREMENTAL RENDER HELPER
   Renders a section, then yields to the browser before continuing
═══════════════════════════════════════════════════════ */
function yieldToMain(){return new Promise(r=>setTimeout(r,0))}

async function renderIncrementally(sections){
  for(const[key,games] of sections){
    renderSection(key,games);
    attachDelegation('cn-'+key,games);
    await yieldToMain(); // let browser paint between sections
  }
  // Final count
  let total=0;
  SECTIONS.forEach(s=>{total+=bySource[s.key].length});
  totalcEl.textContent=total+' games';
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
async function init(){
  loadFavs();
  fc2El.textContent=favs.size;
  buildSections();

  // Fetch all sources in parallel
  const [gn,t9g,hy,no,sea]=await Promise.all([
    loadGN(),
    Promise.resolve(loadT9G()),
    loadHydra(),
    loadNoah(),
    loadSea()
  ]);

  bySource.gnmath=gn;
  bySource.t9=t9g;
  bySource.hydra=hy;
  bySource.noah=no;
  bySource.seabean=sea;
  allGames=[...gn,...t9g,...hy,...no,...sea];

  // Render sections one at a time, yielding between each to avoid long tasks
  await renderIncrementally([
    ['gnmath',gn],
    ['t9',t9g],
    ['hydra',hy],
    ['noah',no],
    ['seabean',sea],
  ]);
}

/* ═══════════════════════════════════════════════════════
   INPUT LISTENERS  (debounced search)
═══════════════════════════════════════════════════════ */
let debounceTimer=0;
sbEl.addEventListener('input',()=>{
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(filterAll,120);
});
fsEl.addEventListener('change',filterAll);
soEl.addEventListener('change',sortAll);

init();
})();
</script>
